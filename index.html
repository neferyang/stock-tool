<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票估價分析工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--muted:#666;--border:#ddd;--accent:#2563eb;--al:#eff6ff;--green:#16a34a;--red:#dc2626;--yel:#d97706;--sbg:#f9fafb;--grad1:#2563eb;--grad2:#1d4ed8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg, #f8f9ff 0%, #fff 100%);color:var(--text);font-size:15px;line-height:1.75}
.wrap{max-width:880px;margin:0 auto;padding:24px 16px 60px}

/* ═══════════════ 表頭美化 ═══════════════ */
.header{background:linear-gradient(135deg, var(--grad1) 0%, var(--grad2) 100%);border-radius:16px;padding:32px 28px;margin-bottom:28px;color:#fff;box-shadow:0 10px 30px rgba(37, 99, 235, 0.15);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;right:-10%;width:200px;height:200px;background:rgba(255,255,255,0.1);border-radius:50%;z-index:0}
.header-content{position:relative;z-index:1}
h1{font-size:2rem;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
.vsub{font-size:.75rem;font-weight:600;color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:12px;vertical-align:middle;margin-left:12px;border:1px solid rgba(255,255,255,0.3);backdrop-filter:blur(10px)}
.sub{color:rgba(255,255,255,0.85);font-size:.95rem;margin-bottom:0;line-height:1.6}
/* ═══════════════ 搜尋框美化 ═══════════════ */
.sbox{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sbox input{flex:1;min-width:180px;padding:14px 18px;border:2px solid #e5e7eb;border-radius:12px;font-size:1rem;outline:none;transition:all .3s;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.sbox input::placeholder{color:#a3a3a3}
.sbox input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37, 99, 235, 0.1), 0 2px 8px rgba(0,0,0,0.04)}
.sbox button{padding:14px 32px;background:linear-gradient(135deg, var(--accent) 0%, #1d4ed8 100%);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(37, 99, 235, 0.3);transition:all .3s;white-space:nowrap}
.sbox button:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(37, 99, 235, 0.4)}
.sbox button:active{transform:translateY(0)}
.sbox button:disabled{background:#cbd5e1;box-shadow:none;cursor:not-allowed;transform:none}
.hint{font-size:.8rem;color:var(--muted);margin-bottom:20px;line-height:1.6;background:#f0f7ff;padding:12px 14px;border-radius:8px;border-left:3px solid var(--accent)}
#st{font-size:.875rem;color:var(--muted);min-height:22px;margin-bottom:16px}
#st.err{color:var(--red)}
.sh{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sn{font-size:1.4rem;font-weight:700}.sy{font-size:.9rem;color:var(--muted)}
.sp{font-size:2rem;font-weight:700}.pc{font-size:1rem;font-weight:600}
.up{color:var(--red)}.dn{color:var(--green)}
.itag{background:var(--al);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.sec{margin-bottom:28px}
.st2{font-size:1rem;font-weight:700;border-left:3px solid var(--accent);padding-left:10px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.card{background:var(--sbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.cl{font-size:.75rem;color:var(--muted)}.cv{font-size:1.05rem;font-weight:600}
.vt{width:100%;border-collapse:collapse;font-size:.9rem}
.vt th,.vt td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
.vt th{background:var(--sbg);font-weight:600;font-size:.8rem;color:var(--muted)}
.vt tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600;white-space:nowrap}
.bl{background:#dcfce7;color:#15803d}.bf{background:#fef9c3;color:#854d0e}.bh{background:#fee2e2;color:#b91c1c}.bn{background:#f3f4f6;color:#6b7280}
.vd{border-radius:10px;padding:16px 20px;margin-bottom:28px;border-left:4px solid}
.vd.buy{border-color:var(--red);background:#fff1f2}
.vd.hold{border-color:var(--yel);background:#fffbeb}
.vd.sell{border-color:var(--green);background:#f0fdf4}
.vdtit{font-weight:700;font-size:1.1rem;margin-bottom:6px}.vdbod{font-size:.875rem;line-height:1.8}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.tc{background:var(--sbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.tl{font-size:.75rem;color:var(--muted);margin-bottom:2px}
.tv{font-size:1rem;font-weight:600}.ts{font-size:.75rem;margin-top:2px}
.sb{color:var(--red)}.ss{color:var(--green)}.sn2{color:var(--yel)}
.cw{position:relative;height:260px;margin-bottom:8px}
.pb{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pbtn{padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;cursor:pointer;background:#fff}
.pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.divhr{border:none;border-top:1px solid var(--border);margin:24px 0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.pt-buy{color:var(--red);font-weight:600}
.pt-sell{color:var(--green);font-weight:600}
.pt-sup{color:var(--accent)}
.pt-res{color:var(--yel)}
.pt-neu{color:var(--muted)}
/* ═══════════════ 搜尋結果美化 ═══════════════ */
.search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid #e5e7eb;border-radius:12px;max-height:320px;overflow-y:auto;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.12);margin-top:8px}
.search-results ul{list-style:none;margin:0;padding:0}
.result-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.result-item:hover{background:#f8f9ff;border-radius:8px;padding-left:20px}
.result-item:last-child{border-bottom:none}
.result-item strong{color:#1a1a1a;font-weight:600}
.result-type{font-size:.75rem;color:#7c3aed;background:#f3e8ff;padding:3px 8px;border-radius:6px;font-weight:600}
.no-result{padding:20px 16px;color:var(--muted);text-align:center;font-size:.9rem}
/* ═══════════════ 響應式設計 ═══════════════ */
@media(max-width:640px){
  .header{padding:24px 20px;margin-bottom:20px}
  h1{font-size:1.6rem}
  .vsub{font-size:.65rem;padding:3px 8px}
  .sub{font-size:.85rem}
  .sbox{gap:8px}
  .sbox input{padding:12px 14px}
  .sbox button{padding:12px 24px;font-size:.95rem}
  .hint{font-size:.75rem;padding:10px 12px}
  .grid{grid-template-columns:repeat(2,1fr)}
  .tgrid{grid-template-columns:repeat(2,1fr)}
  .sp{font-size:1.5rem}
  .vt{font-size:.8rem}
  .vt th,.vt td{padding:7px 8px}
}

@media(max-width:480px){
  .header{padding:20px 16px;border-radius:12px}
  h1{font-size:1.4rem;margin-bottom:6px}
  .sub{font-size:.8rem;margin-bottom:0}
  .sbox{flex-direction:column}
  .sbox input{min-width:100%;padding:12px 14px}
  .sbox button{width:100%;padding:12px 20px}
  .hint{font-size:.7rem;padding:8px 10px;margin-bottom:16px}
}
</style>
</head>
<body>
<div class="wrap">
<!-- ═══════════════ 美化表頭 ═══════════════ -->
<div class="header">
  <div class="header-content">
    <h1>📊 股票估價分析工具 <span class="vsub">v4.32 (30股+圖表)</span></h1>
    <p class="sub">💡 支援台股、美股、ETF 的智能搜尋與全面估值分析。資料來源：Yahoo Finance + TWSE + Finnhub</p>
  </div>
</div>

<!-- ═══════════════ 搜尋框 ═══════════════ -->
<div class="sbox" style="position:relative;">
  <input type="text" id="ti" placeholder="🔍 輸入代號或名稱... 如 2330、台積電、AAPL" autocomplete="off" autocapitalize="characters"/>
  <button id="btn" onclick="go()">分析</button>
  <!-- 搜尋結果下拉菜單 -->
  <div id="search-results" class="search-results hidden">
    <ul id="results-list"></ul>
  </div>
</div>

<!-- ═══════════════ 使用提示 ═══════════════ -->
<p class="hint">
  <strong>✨ 使用提示：</strong><br>
  🇹🇼 台股輸入數字代號（自動加 .TW）；🇺🇸 美股直接輸入英文代號；⏎ 按 Enter 也可查詢<br>
  📌 範例：<code style="background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:4px;">2330</code> <code style="background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:4px;">台積電</code> <code style="background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:4px;">AAPL</code> <code style="background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:4px;">0050</code> <code style="background:rgba(0,0,0,0.05);padding:2px 6px;border-radius:4px;">SPY</code>
</p>
<div id="st"></div>
<div id="res" class="hidden"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
// v4.15：中文股票名稱搜尋（TWSE 動態加載）
// v4.17：美股模糊搜尋（US 股票列表）
// ════════════════════════════════════════════════════════
let STOCK_CACHE = null;  // 緩存 TWSE 上市公司列表
let US_STOCK_CACHE = null;  // 緩存美股列表

async function initStockCache() {
  // 優先順序改為：本地 JSON → TWSE API → corsproxy → 示例數據

  // 備援 1：優先從本地 JSON 檔案加載（最快最可靠）
  try {
    const resp = await fetch('twse-stocks.json', {signal: AbortSignal.timeout(5000)});
    if (resp.ok) {
      STOCK_CACHE = await resp.json();
      console.log(`✅ 台股數據已加載 (本地 JSON，${STOCK_CACHE.length} 支股票)`);
      return;
    }
  } catch(e) {
    console.warn('⚠️ 本地 JSON 加載失敗:', e.message);
  }

  // 備援 2：使用 TWSE API 直連
  try {
    const url = 'https://openapi.twse.com.tw/v1/opendata/t187ap03_L';
    const resp = await fetch(url, {signal: AbortSignal.timeout(8000)});
    if (resp.ok) {
      STOCK_CACHE = await resp.json();
      console.log(`✅ 台股名稱緩存已加載 (TWSE API，${STOCK_CACHE.length} 支上市公司)`);
      return;
    }
  } catch(e) {
    console.warn('⚠️ TWSE API 直連失敗:', e.message);
  }

  // 備援 3：使用 corsproxy
  try {
    const url = 'https://openapi.twse.com.tw/v1/opendata/t187ap03_L';
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
    const resp = await fetch(proxyUrl, {signal: AbortSignal.timeout(10000)});
    if (resp.ok) {
      STOCK_CACHE = await resp.json();
      console.log(`✅ 台股名稱緩存已加載 (corsproxy，${STOCK_CACHE.length} 支上市公司)`);
      return;
    }
  } catch(e) {
    console.warn('⚠️ TWSE corsproxy 備援失敗:', e.message);
  }

  // 最後備援：使用示例數據
  console.warn('⚠️ 使用本地示例數據');
  STOCK_CACHE = [
    // 科技 - 半導體
    {Code:'2330',CHName:'台積電',Name:'TSMC',Type:'上市'},
    {Code:'2454',CHName:'聯發科',Name:'MTK',Type:'上市'},
    {Code:'8299',CHName:'群聯',Name:'Phison',Type:'上市'},
    {Code:'2308',CHName:'台達電',Name:'Delta',Type:'上市'},
    {Code:'3529',CHName:'積威',Name:'',Type:'上市'},
    {Code:'2303',CHName:'聯電',Name:'UMC',Type:'上市'},
    {Code:'2388',CHName:'威盛',Name:'VIA',Type:'上市'},
    {Code:'2379',CHName:'瑞昱',Name:'Realtek',Type:'上市'},
    {Code:'2408',CHName:'南茂',Name:'Nanya',Type:'上市'},
    {Code:'2407',CHName:'智磊',Name:'CHEMI',Type:'上市'},
    // 汽車
    {Code:'2207',CHName:'和泰',Name:'HotAI',Type:'上市'},
    {Code:'2201',CHName:'裕隆',Name:'Yulon',Type:'上市'},
    {Code:'2227',CHName:'裕日車',Name:'YRC',Type:'上市'},
    // 電子
    {Code:'2317',CHName:'鴻海',Name:'Hon Hai',Type:'上市'},
    {Code:'2412',CHName:'中華電',Name:'CHT',Type:'上市'},
    {Code:'3711',CHName:'日月光',Name:'ASE',Type:'上市'},
    {Code:'2498',CHName:'宏達電',Name:'HTC',Type:'上市'},
    {Code:'2371',CHName:'大同',Name:'Tatung',Type:'上市'},
    {Code:'2448',CHName:'晶電',Name:'Epistar',Type:'上市'},
    {Code:'2449',CHName:'京元電',Name:'Elite',Type:'上市'},
    // 傳統
    {Code:'1101',CHName:'台泥',Name:'TCC',Type:'上市'},
    {Code:'1102',CHName:'亞泥',Name:'ACC',Type:'上市'},
    {Code:'1110',CHName:'台糖',Name:'TSC',Type:'上市'},
    {Code:'1605',CHName:'華新科',Name:'HSI',Type:'上市'},
    {Code:'1707',CHName:'葡萄王',Name:'GrapeFruit',Type:'上市'},
    {Code:'1210',CHName:'大成',Name:'TATUNG',Type:'上市'},
    // 金融
    {Code:'2887',CHName:'台新金',Name:'TSCB',Type:'上市'},
    {Code:'2890',CHName:'永豐金',Name:'Sinopac',Type:'上市'},
    {Code:'2892',CHName:'第一金',Name:'FUBON',Type:'上市'},
    {Code:'2891',CHName:'中信金',Name:'CHINFIN',Type:'上市'},
    {Code:'2884',CHName:'玉山金',Name:'ESUNBANK',Type:'上市'},
    {Code:'2886',CHName:'兆豐金',Name:'MEGABANK',Type:'上市'},
    {Code:'2889',CHName:'國泰金',Name:'CATHAYLIFE',Type:'上市'},
    {Code:'2882',CHName:'國票金',Name:'NTB',Type:'上市'},
    {Code:'2880',CHName:'華南金',Name:'HUANAN',Type:'上市'},
    // 航運
    {Code:'2603',CHName:'長榮',Name:'Evergreen',Type:'上市'},
    {Code:'2609',CHName:'陽明',Name:'Yang Ming',Type:'上市'},
    {Code:'2618',CHName:'長華',Name:'',Type:'上市'},
    {Code:'2606',CHName:'裕民',Name:'TCI',Type:'上市'},
    // ETF
    {Code:'0050',CHName:'台灣50',Name:'ETF',Type:'上市'},
    {Code:'0056',CHName:'高股息',Name:'ETF',Type:'上市'},
    {Code:'006208',CHName:'富邦台灣',Name:'ETF',Type:'上市'},
    // 其他
    {Code:'2845',CHName:'元大金',Name:'YuantaFH',Type:'上市'},
    {Code:'1217',CHName:'廣宇',Name:'',Type:'上市'},
    {Code:'1713',CHName:'國化',Name:'',Type:'上市'},
    {Code:'2888',CHName:'新光金',Name:'SinopacLife',Type:'上市'},
    {Code:'1301',CHName:'台塑',Name:'Formosa',Type:'上市'},
    {Code:'1326',CHName:'天傑',Name:'',Type:'上市'},
    {Code:'2353',CHName:'鴻準',Name:'HHM',Type:'上市'},
    {Code:'2405',CHName:'浩鼎',Name:'PCI',Type:'上市'}
  ];
  console.log(`⚠️ 示例數據加載 (${STOCK_CACHE.length} 支) - 完整數據需 TWSE API 可用`);
}

// 加載美股列表
async function initUSStockCache() {
  try {
    const resp = await fetch('us-stocks.json', {signal: AbortSignal.timeout(5000)});
    if (resp.ok) {
      US_STOCK_CACHE = await resp.json();
      console.log(`✅ 美股數據已加載 (${US_STOCK_CACHE.length} 支股票)`);
      return;
    }
  } catch(e) {
    console.warn('⚠️ 美股列表加載失敗:', e.message);
    US_STOCK_CACHE = [];
  }
}

function searchStock(keyword) {
  if (!keyword || keyword.length < 1) return [];

  let results = [];
  const kw = keyword.toLowerCase();

  // 搜尋台股
  if (STOCK_CACHE && STOCK_CACHE.length > 0) {
    const twResults = STOCK_CACHE.filter(c=> {
      try {
        return (c.Code && c.Code.includes(keyword)) ||
               (c.CHName && c.CHName.toLowerCase().includes(kw)) ||
               (c.Name && c.Name.toLowerCase().includes(kw));
      } catch(e) {
        return false;
      }
    });
    results = results.concat(twResults);
  }

  // 搜尋美股
  if (US_STOCK_CACHE && US_STOCK_CACHE.length > 0) {
    const usResults = US_STOCK_CACHE.filter(c=> {
      try {
        return (c.Code && c.Code.toUpperCase().includes(keyword.toUpperCase())) ||
               (c.Name && c.Name.toLowerCase().includes(kw));
      } catch(e) {
        return false;
      }
    });
    results = results.concat(usResults);
  }

  // 去重並限制結果數量
  const seen = new Set();
  results = results.filter(r => {
    const key = `${r.Code}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 15);

  console.log(`[searchStock] 搜尋 "${keyword}" → 找到 ${results.length} 筆`);
  return results;
}

function displaySearchResults(results) {
  const resultsDiv = document.getElementById('search-results');
  const resultsList = document.getElementById('results-list');

  if (results.length === 0) {
    resultsList.innerHTML = '<li class="no-result">找不到相符的股票</li>';
    resultsDiv.classList.remove('hidden');
    return;
  }

  resultsList.innerHTML = results.map((r, idx) => {
    const isTW = r.Type && (r.Type.includes('上市') || r.Type.includes('上櫃') || r.Type.includes('興櫃'));
    const displayName = r.CHName || r.Name || r.Code;
    const typeLabel = isTW ? `<span style="color:#16a34a">🟢 ${r.Type || '上市'}</span>` : `<span style="color:#2563eb">🔵 美股</span>`;
    return `<li class="result-item" data-code="${r.Code}" data-name="${displayName}" data-idx="${idx}">\
      <div>\
        <strong>${displayName}</strong> (${r.Code})\
      </div>\
      ${typeLabel}\
    </li>`;
  }).join('');

  // 添加事件委託監聽
  resultsList.querySelectorAll('.result-item').forEach(item => {
    item.addEventListener('click', function() {
      const code = this.getAttribute('data-code');
      const name = this.getAttribute('data-name');
      selectStock(code, name);
    });
  });

  resultsDiv.classList.remove('hidden');
}

function selectStock(code, name) {
  document.getElementById('ti').value = code;
  document.getElementById('search-results').classList.add('hidden');
  go();
}

// 搜尋輸入框事件監聽 - 改進版（兼容不同加載時機）
function initSearchFeature() {
  console.log('[initSearchFeature] Starting...');

  // 立即初始化 STOCK_CACHE 和 US_STOCK_CACHE（不等待異步完成）
  initStockCache().then(() => {
    console.log('[initSearchFeature] STOCK_CACHE ready:', STOCK_CACHE ? STOCK_CACHE.length : 0);
  });

  initUSStockCache().then(() => {
    console.log('[initSearchFeature] US_STOCK_CACHE ready:', US_STOCK_CACHE ? US_STOCK_CACHE.length : 0);
  });

  const input = document.getElementById('ti');
  if (!input) {
    console.warn('[initSearchFeature] Input element not found, retrying...');
    setTimeout(initSearchFeature, 100);
    return;
  }

  console.log('[initSearchFeature] Input element found, binding events');

  // 搜尋去抖動（Debounce）：延遲 300ms 才執行搜尋，避免重複計算
  let searchTimeout = null;
  input.addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    const keyword = e.target.value.trim();

    if (keyword.length === 0) {
      document.getElementById('search-results').classList.add('hidden');
      return;
    }

    // 延遲 300ms 執行搜尋
    searchTimeout = setTimeout(() => {
      const results = searchStock(keyword);
      console.log('[searchInput] Debounced search found', results.length, 'results for:', keyword);
      displaySearchResults(results);
    }, 300);
  });

  // 點擊外部關閉下拉菜單
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.sbox')) {
      document.getElementById('search-results').classList.add('hidden');
    }
  });
}

// v8/chart：台股美股都可透過 corsproxy 抓到
async function yfFetch(sym) {
  const url1 = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2y`;
  const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2y`;
  const hdrs = {'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36','Accept':'application/json'};

  // 直連（美股通常可用）
  for (const url of [url1, url2]) {
    try {
      const r = await fetch(url, {headers:hdrs, signal:AbortSignal.timeout(8000)});
      if (r.ok) { const d = await r.json(); if (d?.chart?.result?.[0]) return d.chart.result[0]; }
    } catch(e) {}
  }

  // corsproxy 備援（台股靠這個）
  console.log('[yfFetch] trying corsproxy for', sym);
  try {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url1), {signal:AbortSignal.timeout(18000)});
    console.log('[yfFetch] corsproxy status:', r.status, 'for', sym);
    if (r.ok) {
      const d = await r.json();
      if (d?.chart?.result?.[0]) { console.log('[yfFetch] corsproxy ok'); return d.chart.result[0]; }
      // 404 = 代號不存在
      if (r.status === 404) return null;
    }
    if (r.status === 404) return null;
  } catch(e) { console.log('[yfFetch] corsproxy error:', e.message); }
  return null;
}

// quoteSummary：直連（美股）或 corsproxy（台股備援）
async function yfSummary(sym) {
  const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${sym}?modules=price,summaryDetail,defaultKeyStatistics,financialData`;
  const hdrs = {'User-Agent':'Mozilla/5.0','Accept':'application/json'};
  const isTW = sym.endsWith('.TW') || sym.endsWith('.TWO');

  // 直連 query1 + query2（美股成功率 >95%，台股 ~50%）
  for (const base of ['https://query1.finance.yahoo.com','https://query2.finance.yahoo.com']) {
    try {
      const u = url.replace('query1.finance.yahoo.com', base.replace('https://',''));
      const r = await fetch(u, {headers:hdrs, signal:AbortSignal.timeout(8000)});
      if (r.ok) { const d = await r.json(); if (d?.quoteSummary?.result?.[0]) return d.quoteSummary.result[0]; }
    } catch(e) {}
  }

  // 僅台股使用 corsproxy 備援（美股直接返回以加快速度）
  if (isTW) {
    try {
      const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {signal:AbortSignal.timeout(10000)});
      console.log('[yfSummary] 台股 corsproxy', r.status, sym);
      if (r.ok) { const d = await r.json(); if (d?.quoteSummary?.result?.[0]) return d.quoteSummary.result[0]; }
    } catch(e) { console.warn('[yfSummary] corsproxy 備援失敗'); }
  }
  return null;
}

// 通用 fetch（直連 + corsproxy 備援）
async function safeFetch(url) {
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(8000)});
    if (r.ok) return await r.json();
  } catch(e) {}
  try {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {signal:AbortSignal.timeout(12000)});
    if (r.ok) return await r.json();
  } catch(e) {}
  return null;
}

// TWSE（上市）：本益比/P/B/殖利率（BWIBBU_ALL 含更多資料，BWIBBU_d 備援）
async function twseFetch() {
  const d = await safeFetch('https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL');
  if (d && d.length > 0) return d;
  return await safeFetch('https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_d');

// Finnhub API：美股基本面數據（P/E、EPS、ROE 等）
// ════════════════════════════════════════════════════════
async function finnhubFetch(symbol) {
  if (!symbol) return null;

  const FINNHUB_KEY = 'd8f8m4hr01qub7kgc2j0d8f8m4hr01qub7kgc2jg';
  console.log('[finnhubFetch] Optimized: Only fetching Metric for', symbol);

  try {
    // 優化：只取 Metric（Quote 和 Profile 由 yfSummary 提供）
    const metricUrl = `https://finnhub.io/api/v1/stock/metric?symbol=${symbol}&metric=all&token=${FINNHUB_KEY}`;

    const metricResp = await fetch(metricUrl, {signal: AbortSignal.timeout(6000)}).catch(e => {
      console.warn('[finnhubFetch] Metric fetch timeout/error:', e.message);
      return {ok: false, status: 0};
    });

    const metric = metricResp.ok ? await metricResp.json() : null;
    console.log('[finnhubFetch] Metric response keys:', metric?.metric ? Object.keys(metric.metric).length : 0);

    // 提取估值數據（Finnhub Metric API 的正確字段名）
    let valuation = {};
    if (metric && metric.metric) {
      const m = metric.metric;
      valuation = {
        pe: m.peTTM || null,           // P/E Ratio TTM
        pb: m.pb || m.pbAnnual || null, // P/B Ratio
        roe: m.roeTTM || null,         // ROE TTM（已是百分比，無需轉換）
        eps: m.epsTTM || null,          // EPS TTM
        dividend: m.currentDividendYieldTTM || null, // Dividend Yield TTM
        divPerShare: m.dividendPerShareTTM || null  // DPS TTM
      };
      console.log('[finnhubFetch] ✅ Got Finnhub Metric data for', symbol);
      return {valuation: valuation};
    } else {
      console.warn('[finnhubFetch] ⚠️ Metric data unavailable for', symbol);
    }
  } catch(e) {
    console.error('[finnhubFetch] Fatal error:', e.message, e.stack);
  }

  return null;
}

// 公開資訊觀測站公告集成 (P1 優化版)
// ════════════════════════════════════════════════════════
async function newsAnnouncementsFetch(code) {
  if (!code) return null;
  try {
    console.log(`[公告] 正在查詢 ${code} 的最新公告...`);

    // 方案 A：TWSE 重大訊息 API（推薦）
    // ────────────────────────────────────────────────
    try {
      const mopsUrl = `https://openapi.twse.com.tw/v1/mopsfin/mops_t187ap05_${code}`;
      const r = await fetch(mopsUrl, {signal:AbortSignal.timeout(8000)});

      if (r.ok) {
        const data = await r.json();
        if (Array.isArray(data) && data.length > 0) {
          // 排序並取前 10 則
          const sorted = data.sort((a, b) => {
            const dateA = a.Date || a['公告日期'] || '0000-00-00';
            const dateB = b.Date || b['公告日期'] || '0000-00-00';
            return dateB.localeCompare(dateA);
          }).slice(0, 10);

          const items = sorted.map(item => ({
            date: item.Date || item['公告日期'] || '',
            title: item.Title || item['公告標題'] || item['新聞標題'] || '',
            type: item.Type || (item['公告標題']?.includes('重大') ? 'M' : 'C'),
            url: item.URL || item['連結'] || null
          })).filter(x => x.title);

          if (items.length > 0) {
            console.log(`[公告] ✅ TWSE API 成功取得 ${items.length} 則公告`);
            return {
              items: items,
              count: data.length,
              lastDate: items[0]?.date || '',
              source: 'TWSE'
            };
          }
        }
      }
    } catch(twseErr) {
      console.log('[公告] TWSE API 失敗:', twseErr.message);
    }

    // 方案 B：MOPS 網站爬蟲（備援）
    // ────────────────────────────────────────────────
    try {
      // MOPS 公開資訊觀測站查詢 URL
      const mopsPageUrl = `https://mops.twse.com.tw/mops/web/t05_query?code=${code}`;
      console.log(`[公告] 使用備援方案，爬取 MOPS 頁面...`);

      const pageResp = await fetch(mopsPageUrl, {signal:AbortSignal.timeout(8000)});
      if (pageResp.ok) {
        const html = await pageResp.text();

        // 正則匹配公告列表（簡單解析）
        // <tr><td>日期</td><td>公司</td><td>標題</td><td>...</td></tr>
        const pattern = /<tr[^>]*>[\s\S]*?<\/tr>/g;
        const rows = html.match(pattern) || [];

        const items = [];
        for (let row of rows.slice(1, 11)) {  // 取前 10 則（跳過表頭）
          const cellPattern = /<td[^>]*>([^<]+)<\/td>/g;
          const cells = [];
          let cell;
          while ((cell = cellPattern.exec(row)) !== null) {
            cells.push(cell[1].trim());
          }

          if (cells.length >= 3) {
            items.push({
              date: cells[0] || '',
              title: cells[2] || '',
              type: cells[2]?.includes('重大') ? 'M' : 'C',
              url: null
            });
          }
        }

        if (items.length > 0) {
          console.log(`[公告] ✅ MOPS 爬蟲成功取得 ${items.length} 則公告`);
          return {
            items: items,
            count: items.length,
            lastDate: items[0]?.date || '',
            source: 'MOPS'
          };
        }
      }
    } catch(mopsErr) {
      console.log('[公告] MOPS 爬蟲失敗:', mopsErr.message);
    }

  } catch(e) {
    console.warn('[公告] 公告查詢異常:', e.message);
  }

  // 備援方案：回傳參考公告連結
  console.log('[公告] ⚠️ 使用備援方案');
  return {
    items: [{
      date: new Date().toISOString().split('T')[0],
      title: '📌 查詢公開資訊觀測站瞭解最新公告',
      type: 'C',
      url: `https://mops.twse.com.tw/mops/web/t05_query?code=${code}`
    }],
    count: 0,
    lastDate: '',
    source: 'FALLBACK'
  };
}

// 動態企業分類映射 (TWSE/TPEX OpenAPI)
// ════════════════════════════════════════════════════════
let COMPANY_INDUSTRY_MAP = new Map();  // {公司代碼} → {產業名稱}
let lastIndustrySync = null;           // 最後同步時間

async function loadLatestIndustryData() {
  try {
    console.log('[產業數據] 正在從 TWSE/TPEX 同步官方企業分類...');

    // 上市公司（TWSE - 代碼對應表）
    const twseUrl = "https://openapi.twse.com.tw/v1/opendata/t187ap03_L";
    let twseData = [];
    try {
      const twseResp = await fetch(twseUrl, {signal: AbortSignal.timeout(10000)});
      if (twseResp.ok) {
        twseData = await twseResp.json();
        console.log(`[TWSE] 獲得 ${twseData.length} 家上市公司`);
      }
    } catch(twseErr) {
      console.warn('[TWSE] API 請求失敗:', twseErr.message);
    }

    // 上櫃公司（TPEX - 代碼對應表）
    const tpexUrl = "https://www.tpex.org.tw/openapi/v1/mopsfin_t187ap03_O";
    let tpexData = [];
    try {
      const tpexResp = await fetch(tpexUrl, {signal: AbortSignal.timeout(10000)});
      if (tpexResp.ok) {
        tpexData = await tpexResp.json();
        console.log(`[TPEX] 獲得 ${tpexData.length} 家上櫃公司`);
      }
    } catch(tpexErr) {
      console.warn('[TPEX] API 請求失敗:', tpexErr.message);
    }

    // 合併上市 + 上櫃數據
    const allCompanies = [...twseData, ...tpexData];
    console.log(`[產業數據] 獲得 ${allCompanies.length} 家企業資訊`);

    // 建立快速查找表：公司代碼 → 產業名稱（中文）
    COMPANY_INDUSTRY_MAP = new Map();
    let successCount = 0;

    allCompanies.forEach(item => {
      // 兼容多種欄位名稱（TWSE 和 TPEX 格式可能不同）
      let code = item.Code || item['公司代號'] || item['代號'] || item.symbol;
      let industryCode = item.IndustryCode || item['產業代號'] || item['代碼'] || null;
      let industryName = item['產業別'] || item.Industry || null;

      if (!code) return;
      code = code.toString().trim();

      // 優先用產業名稱，次要用產業代碼轉換
      let finalIndustry = null;
      if (industryName && industryName.trim()) {
        finalIndustry = industryName.trim();
      } else if (industryCode) {
        const codeStr = industryCode.toString().trim().padStart(2, '0');
        finalIndustry = OFFICIAL_INDUSTRY_CODES[codeStr] || null;
      }

      if (finalIndustry) {
        COMPANY_INDUSTRY_MAP.set(code, finalIndustry);
        successCount++;
      }
    });

    lastIndustrySync = new Date();
    const successRate = allCompanies.length > 0 ? ((successCount / allCompanies.length) * 100).toFixed(1) : 0;
    console.log(`✅ 官方企業分類已同步完成 (${successCount}/${allCompanies.length} = ${successRate}%), 時間：${lastIndustrySync.toLocaleString()}`);

    // 成功率超過 80% 視為成功
    return successCount > allCompanies.length * 0.8;
  } catch(e) {
    console.warn('⚠️ 官方企業分類同步失敗:', e.message, '將使用備援方案');
    lastIndustrySync = null;
    return false;
  }
}

// 應用啟動時自動同步（非阻塞）
if (typeof document !== 'undefined') {
  loadLatestIndustryData();
}

    // 紡織
    ['textile|apparel|clothing|fashion', '紡織纖維'],

    // 化工
    ['chemical|chemical manufacture', '化學工業'],

    // 鋼鐵
    ['steel|iron|metal', '鋼鐵工業'],

    // 造紙
    ['paper|pulp|forest products', '造紙工業']
  ];

  for (const [pattern, officialName] of enMatches) {
    if (new RegExp(pattern).test(s)) {
      return {industry: officialName, confidence: 'high', details: {method: '英文Sector', sector}};
    }
  }

  // ─────────────────────────────────────────────────────────
  // L4：代號範圍推斷（台股）- 改為返回官方產業名稱
  // ─────────────────────────────────────────────────────────
  const codeNum = parseInt(sym.replace('.TW','').replace('.TWO',''));
  if (!isNaN(codeNum)) {
    for (const range of CODE_RANGE_MAP) {
      if (codeNum >= range.range[0] && codeNum <= range.range[1]) {
        // 將舊產業代碼轉換為官方產業名稱
        const oldIndustry = range.industry;
        const officialName = OLD_INDUSTRY_TO_OFFICIAL[oldIndustry] || '未分類';
        return {industry: officialName, confidence: 'medium', details: {method: '代號範圍推斷', code: codeNum, range: range.range}};
      }
    }
  }

  // ─────────────────────────────────────────────────────────
  // L5：預設
  // ─────────────────────────────────────────────────────────
  return {industry: '未分類', confidence: 'low', details: {method: '預設'}};
}

// 取得產業的估值參數（官方產業名稱版本）
function getIndustryParams(indKey) {
  return INDUSTRY_DB[indKey] || INDUSTRY_DB['未分類'];
}

// ════════════════════════════════════════════════════════
// 技術指標
// ════════════════════════════════════════════════════════
const maVal = (a,n) => { const c=a.filter(v=>v!=null); return c.length<n?null:c.slice(-n).reduce((s,v)=>s+v,0)/n; };
const maLine = (a,n) => a.map((_,i)=>{ if(i<n-1)return null; const sl=a.slice(i-n+1,i+1); return sl.some(v=>v==null)?null:sl.reduce((s,v)=>s+v,0)/n; });
function emaVal(a,n){ const c=a.filter(v=>v!=null); if(c.length<n)return null; const k=2/(n+1); let e=c.slice(0,n).reduce((s,v)=>s+v,0)/n; for(let i=n;i<c.length;i++)e=c[i]*k+e*(1-k); return e; }
function rsiVal(a,n=14){ const c=a.filter(v=>v!=null); if(c.length<n+1)return null; let g=0,l=0; for(let i=c.length-n;i<c.length;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l-=d;} return 100-100/(1+(g/(l||1e-9))); }
function macdVal(a){ const c=a.filter(v=>v!=null); if(c.length<35)return null; const st=Math.max(0,c.length-70); const difs=[]; for(let i=st;i<c.length;i++){const sub=c.slice(0,i+1);const e12=emaVal(sub,12),e26=emaVal(sub,26);if(e12&&e26)difs.push(e12-e26);} if(difs.length<9)return null; const dif=difs[difs.length-1],dea=emaVal(difs,9); return{dif,dea,hist:dif-(dea||0)}; }
function kdVal(hi,lo,cl,n=9){ const h=hi.filter(v=>v!=null).slice(-n),l=lo.filter(v=>v!=null).slice(-n),last=cl.filter(v=>v!=null).slice(-1)[0]; const hh=Math.max(...h),ll=Math.min(...l); const rsv=hh===ll?50:(last-ll)/(hh-ll)*100; return{k:rsv*(2/3)+50*(1/3),d:rsv*(2/9)+50*(7/9)}; }
function bollVal(a,n=20){ const c=a.filter(v=>v!=null); if(c.length<n)return null; const sl=c.slice(-n),mid=sl.reduce((s,v)=>s+v,0)/n,std=Math.sqrt(sl.reduce((s,v)=>s+(v-mid)**2,0)/n); return{upper:mid+2*std,mid,lower:mid-2*std,bw:(4*std)/mid}; }

// ════════════════════════════════════════════════════════
// 估值模型
// ════════════════════════════════════════════════════════
const f = (n,d=2) => (n==null||isNaN(n)||!isFinite(n))?'N/A':Number(n).toFixed(d);
function fB(n){if(!n||isNaN(n))return'N/A';const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2)+' T';if(a>=1e9)return(n/1e9).toFixed(2)+' B';if(a>=1e6)return(n/1e6).toFixed(2)+' M';return n.toFixed(0);}
function bdg(est,cur){ if(est==='N/A'||!cur||isNaN(parseFloat(est)))return'<span class="badge bn">資料不足</span>'; const r=cur/parseFloat(est); if(r<0.88)return'<span class="badge bl">偏低 ✓</span>'; if(r>1.15)return'<span class="badge bh">偏高 !</span>'; return'<span class="badge bf">合理</span>'; }

function calcVals(price, m, indKey, indObj) {
  const pe = m.pe, pb = m.pb, div = m.div, divYield = m.divYield;
  const eps = m.eps, roe = m.roe, beta = m.beta;
  const res = [];

  // 從產業資料庫取得估值參數
  const params = getIndustryParams(indKey);
  const indName = indObj ? indObj.name : params.name;

  // ── 1. P/E 評估 ──────────────────────────────────────────
  if (pe && pe > 0 && pe < 500) {
    const fairPE = params.fairPE || 16;
    const sig = pe < fairPE*0.8 ? '<span class="badge bl">低估 ✓</span>' : pe < fairPE ? '<span class="badge bl">合理偏低</span>' : pe < fairPE*1.3 ? '<span class="badge bf">合理</span>' : '<span class="badge bh">偏高 !</span>';
    // 合理區間：fairPE*0.8 ~ fairPE*1.3（低估到高估的邊界）
    res.push({m:'P/E 本益比評估', d:`目前P/E=${f(pe,1)}（${indName}合理區間：${Math.round(fairPE*0.8)}~${Math.round(fairPE*1.3)}x，fairPE=${fairPE}x）`, t:f(pe,1)+'x', b:sig});
  }

  // ── 2. P/B 淨值估價 ───────────────────────────────────────
  if (pb && pb > 0) {
    const fairPB = params.fairPB || 2.5;
    const bv = price / pb;
    const tgt = bv * fairPB;
    const sig = pb<=fairPB?'<span class="badge bl">合理 ✓</span>':pb<=fairPB*1.5?'<span class="badge bf">偏高</span>':'<span class="badge bh">偏高 !</span>';
    res.push({m:'P/B 淨值估價', d:`每股淨值≈${f(bv)} × 合理P/B ${fairPB}x（目前P/B=${f(pb,1)}，${indName}合理上限${fairPB}x）`, t:f(tgt), b:sig});
  }

  // ── 3. 殖利率防線 ─────────────────────────────────────────
  if (div && div > 0) {
    const yFloor = (params.fairYield || 4) / 100;
    const tgt = div / yFloor;
    res.push({m:`殖利率防線（${f(yFloor*100,1)}%）`, d:`現金股利 ${f(div)} ÷ ${f(yFloor*100,1)}%（機構被動買盤支撐價）`, t:f(tgt), b:bdg(f(tgt),price)});
  }

  // ── 4. GGM 股息折現 ───────────────────────────────────────
  if (div && div > 0) {
    const g = 0.03, r = 0.07;
    const ggm = (div * (1+g)) / (r - g);
    res.push({m:'GGM 股息折現', d:`D₁=${f(div*(1+g))} ÷ (r=7% − g=3%)`, t:f(ggm), b:bdg(f(ggm),price)});
  }

  // ── 5. 殖利率合理價 ───────────────────────────────────────
  if (divYield && divYield > 0) {
    const fairY = params.fairDiv > 0 ? Math.min(params.fairDiv, 5) : 4.5;
    const tgt = price * (divYield / fairY);
    res.push({m:`殖利率合理價（目標${fairY}%）`, d:`目前殖利率${f(divYield,2)}%，目標${fairY}%反算合理價`, t:f(tgt), b:bdg(f(tgt),price)});
  }

  // ── 6. DCF 簡化 ───────────────────────────────────────────
  if (eps && eps > 0) {
    const wacc = beta ? Math.min(Math.max(0.05+beta*0.045,0.07),0.14) : 0.09;
    // 根據產業調整成長率
    const gHigh = indKey.includes('software') || indKey.includes('cloud') ? 0.15 :
                  indKey.includes('biotech') || indKey.includes('medical') ? 0.12 :
                  indKey.includes('cycle') || indKey.includes('steel') ? 0.05 : 0.08;
    let dcf=0, cf=eps;
    for(let i=1;i<=5;i++){cf*=(1+gHigh);dcf+=cf/Math.pow(1+wacc,i);}
    const tv=(cf*1.03)/(wacc-0.03); dcf+=tv/Math.pow(1+wacc,5);
    res.push({m:'DCF 簡化估值', d:`WACC=${f(wacc*100,1)}%，EPS=${f(eps)}，成長${f(gHigh*100,0)}%×5年後終值`, t:f(dcf), b:bdg(f(dcf),price)});
  }

  // ── 7. EV/EBITDA ─────────────────────────────────────────
  if (m.evEbitda && m.evEbitda > 0 && m.evEbitda < 200) {
    const fair = params.evEbitda || 10;
    const sig = m.evEbitda<fair*0.8?'<span class="badge bl">偏低 ✓</span>':m.evEbitda>fair*1.3?'<span class="badge bh">偏高 !</span>':'<span class="badge bf">合理</span>';
    res.push({m:'EV/EBITDA', d:`目前${f(m.evEbitda)}x（${indName}合理區間約${Math.round(fair*0.7)}~${fair}x）`, t:f(m.evEbitda)+'x', b:sig});
  }

  // ── 8. RIM（金融業）─────────────────────────────────────
  if (indKey.includes('bank') || indKey.includes('insurance') || indKey.includes('securities')) {
    if (pb && roe && pb>0) {
      const bv = price/pb;
      const tgt = Math.max(bv*(1+(roe/100-0.08)/0.08), bv*0.7);
      res.push({m:'RIM 剩餘盈餘模型', d:`淨值≈${f(bv)} × (1+(ROE ${f(roe,1)}%−8%)/8%)（適合金融業）`, t:f(tgt), b:bdg(f(tgt),price)});
    }
  }

  // ── 9. PEG ───────────────────────────────────────────────
  if (m.peg && m.peg > 0 && m.peg < 20) {
    const sig = m.peg<1?'<span class="badge bl">PEG<1 低估</span>':m.peg<2?'<span class="badge bf">PEG 合理</span>':'<span class="badge bh">PEG>2 偏貴</span>';
    res.push({m:'PEG 本益成長比', d:`PEG=${f(m.peg)}（<1視為低估，適合高成長股，PEG=P/E÷盈餘成長率）`, t:f(m.peg), b:sig});
  }

  return res;
}

// ── 買賣建議價位 ──────────────────────────────────────────────────────────────
function calcPriceTargets(price, m, tech, indKey) {
  const hi52=m['52hi'], lo52=m['52lo'];
  const pe=m.pe, pb=m.pb, div=m.div, eps=m.eps;
  const rows = [];

  const params = getIndustryParams(indKey);

  // 技術面
  if (lo52) rows.push({cls:'pt-sup', icon:'▲', label:'52週低點支撐', val:f(lo52), note:'跌破此價位風險增加，止損參考'});
  if (hi52) rows.push({cls:'pt-res', icon:'▼', label:'52週高點壓力', val:f(hi52), note:'突破此價位可能加速上漲，觀察量能'});
  if (hi52&&lo52) {
    rows.push({cls:'pt-neu', icon:'◆', label:'52週中間價（黃金分割）', val:f(lo52+(hi52-lo52)*0.618), note:'費波那契 61.8% 支撐/壓力'});
  }

  // 技術指標衍生
  const ma20=tech.ma20, ma60=tech.ma60, ma240=tech.ma240;
  if (ma20) rows.push({cls:'pt-sup', icon:'▲', label:'MA20 月線支撐', val:f(ma20), note:'短線多空分界，跌破轉弱'});
  if (ma60) rows.push({cls:'pt-sup', icon:'▲', label:'MA60 季線支撐', val:f(ma60), note:'中線多空分界，重要支撐'});
  if (ma240) rows.push({cls:'pt-sup', icon:'▲', label:'MA240 年線支撐', val:f(ma240), note:'長線牛熊分界'});

  // 基本面
  if (pe && pe > 0 && eps > 0) {
    const fairPE = params.fairPE || 16;
    rows.push({cls:'pt-buy', icon:'🟢', label:`合理買進價（P/E=${fairPE}x）`, val:f(eps*fairPE), note:`EPS=${f(eps)} × 合理P/E ${fairPE}x`});
    rows.push({cls:'pt-buy', icon:'🟢', label:`強力買進價（P/E=${Math.round(fairPE*0.75)}x）`, val:f(eps*fairPE*0.75), note:'折讓25%，低估明顯時考慮積極買入'});
    rows.push({cls:'pt-sell', icon:'🔴', label:`合理賣出價（P/E=${Math.round(fairPE*1.2)}x）`, val:f(eps*fairPE*1.2), note:'超過合理P/E 20%，考慮分批減碼'});
    rows.push({cls:'pt-sell', icon:'🔴', label:`停利參考價（P/E=${Math.round(fairPE*1.5)}x）`, val:f(eps*fairPE*1.5), note:'明顯超漲區，積極停利'});
  }

  // 殖利率防線
  if (div && div > 0) {
    const yFloor = (params.fairYield || 4) / 100;
    rows.push({cls:'pt-sup', icon:'▲', label:`殖利率防線（${f(yFloor*100,1)}%）`, val:f(div/yFloor), note:'機構被動買盤支撐，跌破視為異常'});
  }

  // 布林通道
  if (tech.bollU && tech.bollL) {
    rows.push({cls:'pt-buy', icon:'🟢', label:'布林下軌（短線超賣）', val:f(tech.bollL), note:'觸及下軌可短線反彈，注意量能確認'});
    rows.push({cls:'pt-sell', icon:'🔴', label:'布林上軌（短線超買）', val:f(tech.bollU), note:'觸及上軌注意拉回，追高需謹慎'});
  }

  return rows;
}

// ── 綜合建議 ─────────────────────────────────────────────────────────────────
function mkVerdict(price, vals, tech, indKey, indObj, m) {
  let bull=0, bear=0;
  vals.forEach(v=>{ if(v.b.includes('低估')||v.b.includes('偏低')||v.b.includes('合理偏低')||v.b.includes('PEG<1'))bull++; if(v.b.includes('偏高'))bear++; });
  if(tech.rsi<35)bull++; if(tech.rsi>70)bear++;
  if(tech.macdBull)bull++; if(tech.macdBear)bear++;
  if(tech.kd<25)bull++; if(tech.kd>80)bear++;
  const lo=f(m['52lo']), hi=f(m['52hi']);
  const indName = indObj ? indObj.name : getIndustryParams(indKey).name;

  // 融合公告信號（P1 優化版）
  let newsSummary = '';
  let majorNewsWarning = '';
  if (m.news && m.news.length > 0) {
    const latestNews = m.news[0].title;
    const newsPreview = latestNews.length > 40 ? latestNews.substring(0, 40) + '...' : latestNews;
    newsSummary = `\n📰 最新公告 (${m.lastNewsDate})：${newsPreview}`;

    // 重大訊息警示
    if (m.majorNewsCount > 0) {
      majorNewsWarning = `\n⚠️ 注意：本公司有 ${m.majorNewsCount} 則重大訊息，建議查詢公開資訊觀測站瞭解詳細內容，再做決策。`;
    }
  }

  // 決策邏輯考慮公告因素
  const newsAdjustment = (m.majorNewsCount > 0) ? ' (🔴有重大訊息，建議謹慎)' : '';

  if(bull>=2&&bull>bear) {
    const buyWarn = m.majorNewsCount > 0 ? ' 但請先確認重大訊息內容。' : '';
    return{t:'buy',ti:'🔴 估值偏低，可考慮買進或分批布局'+newsAdjustment,bo:`多個估值模型顯示股價低於合理價值，技術面亦出現超賣或反彈訊號。適合${indKey==='etf'?'定期定額或逢低加碼':'確認右側方向後分批建倉'}${buyWarn}52週低點 ${lo} 為重要支撐，請設好停損點。${newsSummary}${majorNewsWarning}`};
  }
  if(bear>=2&&bear>bull) {
    return{t:'sell',ti:'🟢 估值偏高，建議謹慎或考慮減碼',bo:`多個估值模型顯示股價已超過合理估值，技術面亦有超買跡象。持有者可考慮分批減碼或設停利。52週高點 ${hi} 為強阻力，留意回落風險。${newsSummary}${majorNewsWarning}`};
  }
  return{t:'hold',ti:'🟡 估值合理，持有觀望'+newsAdjustment,bo:`目前股價處於合理估值區間，多空訊號混合。建議持有並觀察突破方向，關注下次財報及產業動向。參考區間：${lo} ~ ${hi}。${newsSummary}${majorNewsWarning}`};
}

// ════════════════════════════════════════════════════════

// 1. ROE 評估（股神巴菲特最看重的指標）
function evaluateROE(roe) {
  if (roe > 20) return { level: '🌟傑出', color: '#10b981', score: 5, desc: '超一流企業，長期投資首選' };
  if (roe > 15) return { level: '🟢優秀', color: '#16a34a', score: 4, desc: '優質企業，值得關注' };
  if (roe > 10) return { level: '🔵良好', color: '#3b82f6', score: 3, desc: '普通企業，中等水準' };
  if (roe > 5) return { level: '🟡一般', color: '#eab308', score: 2, desc: '弱勢企業，需觀察' };
  return { level: '🔴警告', color: '#ef4444', score: 1, desc: '問題企業，應迴避' };
}

// 2. 營業利益率評估（檢驗本業賺錢能力）
function evaluateOperatingMargin(margin) {
  if (margin > 20) return { level: '🌟傑出', color: '#10b981', score: 5, desc: '本業盈利能力超強' };
  if (margin > 15) return { level: '🟢優秀', color: '#16a34a', score: 4, desc: '本業盈利能力很好' };
  if (margin > 10) return { level: '🔵良好', color: '#3b82f6', score: 3, desc: '本業盈利能力尚可' };
  if (margin > 5) return { level: '🟡一般', color: '#eab308', score: 2, desc: '本業盈利能力普通' };
  if (margin > 0) return { level: '⚠️ 偏弱', color: '#f97316', score: 2, desc: '本業盈利能力較弱' };
  return { level: '🔴警告', color: '#ef4444', score: 1, desc: '本業無法盈利' };
}

// 3. 自由現金流評估（現金才是王道）
function evaluateFCF(fcf, netIncome) {
  if (!netIncome || netIncome <= 0) return { level: '⚠️ 異常', color: '#f97316', score: 2, desc: '淨利異常，無法評估' };

  const ratio = fcf / netIncome;
  if (ratio > 0.7) return { level: '🌟傑出', color: '#10b981', score: 5, desc: '現金創造力超強，品質優異' };
  if (ratio > 0.5) return { level: '🟢優秀', color: '#16a34a', score: 4, desc: '現金創造力很好' };
  if (ratio > 0.3) return { level: '🔵良好', color: '#3b82f6', score: 3, desc: '現金創造力尚可' };
  if (ratio > 0) return { level: '🟡一般', color: '#eab308', score: 2, desc: '現金創造力較弱' };
  return { level: '🔴警告', color: '#ef4444', score: 1, desc: '淨利品質堪憂，現金不足' };
}

// 4. 負債比率評估（財務風險評估）
function evaluateDebtRatio(ratio, industry = 'general') {
  // 金融業和高槓桿行業標準不同
  let thresholds = { safe: 50, warning: 70 };
  if (['金融保險業', '28'].includes(industry)) {
    thresholds = { safe: 80, warning: 90 };
  }

  if (ratio < 30) return { level: '🌟非常健康', color: '#10b981', score: 5, desc: '財務結構極強' };
  if (ratio < thresholds.safe) return { level: '🟢健康', color: '#16a34a', score: 4, desc: '財務結構良好' };
  if (ratio < thresholds.warning) return { level: '🔵可接受', color: '#3b82f6', score: 3, desc: '財務結構一般' };
  if (ratio < 90) return { level: '⚠️ 需注意', color: '#f97316', score: 2, desc: '負債較高，需監控' };
  return { level: '🔴高風險', color: '#ef4444', score: 1, desc: '負債過高，風險大' };
}

// 綜合評分函數
function calculateHealthScore(roe, operatingMargin, fcf, netIncome, debtRatio, industry) {
  const roeScore = evaluateROE(roe).score;
  const marginScore = evaluateOperatingMargin(operatingMargin).score;
  const fcfScore = evaluateFCF(fcf, netIncome).score;
  const debtScore = evaluateDebtRatio(debtRatio, industry).score;

  const avgScore = (roeScore + marginScore + fcfScore + debtScore) / 4;

  if (avgScore >= 4.5) return { level: '★★★★★ 一流企業', color: '#10b981' };
  if (avgScore >= 3.5) return { level: '★★★★ 優質企業', color: '#16a34a' };
  if (avgScore >= 2.5) return { level: '★★★ 普通企業', color: '#3b82f6' };
  if (avgScore >= 1.5) return { level: '★★ 問題企業', color: '#eab308' };
  return { level: '★ 風險企業', color: '#ef4444' };
}

function calcFinancialTrend(data) {
  // 計算財報趨勢（5年年增率）
  if (!data || data.length === 0) return [];

  const trends = [];

  // 從新到舊迭代（data 已按年度排序：2024, 2023, 2022, ...）
  for (let i = 0; i < data.length; i++) {
    const curr = data[i];
    const prev = data[i + 1] || null;  // 上一年（如果存在）

    // 計算各項年增率（與前一年比較）- 返回數值而非字符串
    let epsGrowth = null, netMarginGrowth = null, roeGrowth = null;

    if (prev) {
      if (curr.eps !== null && prev.eps !== null && prev.eps !== 0) {
        epsGrowth = ((curr.eps - prev.eps) / Math.abs(prev.eps) * 100);
      }
      if (curr.netMargin !== null && prev.netMargin !== null) {
        netMarginGrowth = (curr.netMargin - prev.netMargin);
      }
      if (curr.roe !== null && prev.roe !== null) {
        roeGrowth = (curr.roe - prev.roe);
      }
    }

    trends.push({
      year: curr.year,
      eps: { val: curr.eps, growth: epsGrowth },
      roe: { val: curr.roe, growth: roeGrowth },
      netMargin: { val: curr.netMargin, growth: netMarginGrowth },
      debtRatio: { val: curr.debtRatio, growth: null }  // 負債比無需計算年增率
    });
  }

  return trends;
}

async function go(){
  let raw=document.getElementById('ti').value.trim().toUpperCase();
  if(!raw)return;
  const isNumeric = /^\d{4,6}$/.test(raw);
  let ticker = isNumeric ? raw+'.TW' : raw;
  const btn=document.getElementById('btn');btn.disabled=true;
  setSt('<span class="spin"></span>查詢 '+ticker+'...',false);
  document.getElementById('res').classList.add('hidden');

  try{
    setSt('<span class="spin"></span>抓取資料中...',false);

    // 台股：先試 .TW，失敗再試 .TWO（上櫃股）
    let chartResult = null;
    if (isNumeric) {
      chartResult = await yfFetch(raw+'.TW');
      if (!chartResult) {
        ticker = raw+'.TWO';
        setSt('<span class="spin"></span>嘗試上櫃代號 '+ticker+'...',false);
        chartResult = await yfFetch(raw+'.TWO');
      }
    } else {
      chartResult = await yfFetch(ticker);
    }

    const isTW = ticker.endsWith('.TW') || ticker.endsWith('.TWO');
    const isOTC = ticker.endsWith('.TWO'); // 上櫃

    // 並行抓取基本面資料
    const code = ticker.replace('.TW','').replace('.TWO','');
    const [twseArr, tpexArr, summaryResult, newsResult, finnhubResult, financialResult] = await Promise.all([
      (!isOTC && isTW) ? twseFetch() : Promise.resolve(null),  // 上市 TWSE
      isOTC ? tpexFetch() : Promise.resolve(null),              // 上櫃 TPEX
      yfSummary(ticker),                                        // 所有股票都試（美股直連，台股走proxy）
      isTW ? newsAnnouncementsFetch(code) : Promise.resolve(null),  // P1：公開資訊觀測站公告
      !isTW ? finnhubFetch(ticker) : Promise.resolve(null),     // v4.18：美股 Finnhub 基本面數據（優化版）
      isTW ? getFinancialData(code, isTW) : Promise.resolve(null)  // v4.22：歷年財報數據
    ]);

    // P2：法人數據（暫時禁用，使用默認值避免超時）
    const finmindResult = null;
    const finconfResult = null;

    if (!chartResult) throw new Error('無法取得資料，請確認代號是否正確（台股用數字，美股用英文）');

    const meta = chartResult.meta || {};
    const price = meta.regularMarketPrice || meta.price;
    if (!price) throw new Error('無法取得股價，請稍後再試');

    // K線資料
    const ts=chartResult.timestamp||[],q=chartResult.indicators?.quote?.[0]||{};
    const closes=q.close||[],highs=q.high||[],lows=q.low||[],vols=q.volume||[];

    // 過濾有效數據：價格 > 0，且非重複數據
    const idx=ts.map((_,i)=>i).filter(i=>{
      if(closes[i]==null || closes[i]<=0) return false;
      // 若與前一根相同且成交量為 0，視為無效（當日盤中未結束）
      if(i > 0 && closes[i] === closes[i-1] && (!vols[i] || vols[i]===0)) return false;
      return true;
    });

    AD=idx.map(i=>{const d=new Date(ts[i]*1000);return`${d.getMonth()+1}/${d.getDate()}`;});
    AP=idx.map(i=>closes[i]);
    const AH=idx.map(i=>highs[i]||closes[i]);
    const AL=idx.map(i=>lows[i]||closes[i]);
    AV=idx.map(i=>vols[i]||0);

    // 基本面資料整合
    function raw2(o){return(o&&typeof o==='object'&&'raw'in o)?o.raw:o;}
    let m = {
      '52hi': meta.fiftyTwoWeekHigh,
      '52lo': meta.fiftyTwoWeekLow,
      pe:null, pb:null, div:null, divYield:null,
      eps:null, roe:null, evEbitda:null, peg:null,
      marketCap:null, grossMargin:null, name:'', sector:'', industry:'', quoteType:''
    };

    // TWSE 上市資料
    if (twseArr) {
      const no = ticker.replace('.TW','').replace('.TWO','');
      const row = twseArr.find(r=>r.Code===no);
      if (row) {
        if (row.PEratio && row.PEratio!=='-') m.pe = parseFloat(row.PEratio);
        if (row.PBratio && row.PBratio!=='-') m.pb = parseFloat(row.PBratio);
        if (row.DividendYield && row.DividendYield!=='-') m.divYield = parseFloat(row.DividendYield);
        if (m.pe && m.pe>0) m.eps = price / m.pe;
        if (m.divYield) m.div = price * m.divYield / 100;
        if (row.Name) m.name = row.Name;
        // TWSE 額外財務數據（如果提供）
        if (row.OutstandingShares && !isNaN(row.OutstandingShares)) {
          const shares = parseFloat(row.OutstandingShares);
          m.marketCap = price * shares;
        }
        if (row.ROE && row.ROE!=='-') m.roe = parseFloat(row.ROE);
        if (row.GrossMargin && row.GrossMargin!=='-') m.grossMargin = parseFloat(row.GrossMargin);
      }
    }

    // TPEX 上櫃資料（格式同 BWIBBU_d：Code, Name, PEratio, PBratio, DividendYield）
    if (tpexArr) {
      const no = ticker.replace('.TWO','').replace('.TW','');
      if (tpexArr.length > 0) console.log('[TPEX] sample keys:', Object.keys(tpexArr[0]).join(', '));
      // 同時嘗試多種欄位名稱（TPEX API 可能不同）
      const row = tpexArr.find(r =>
        r.Code===no || r['股票代號']===no || r.StockCode===no ||
        r.SecuritiesCompanyCode===no || r['代號']===no
      );
      console.log('[TPEX] row for', no, ':', row ? JSON.stringify(row) : 'NOT FOUND');
      if (row) {
        // 欄位名稱：BWIBBU_d 格式 OR TPEX 格式
        const pe = row.PEratio || row['本益比'] || row.PriceEarningRatio;
        const pb = row.PBratio || row['股價淨值比'] || row.PriceBookRatio;
        const dy = row.DividendYield || row['殖利率'];
        const nm = row.Name || row['名稱'] || row['股票名稱'] || row.CompanyName;
        if (pe && pe!=='-' && pe!=='--') m.pe = parseFloat(pe);
        if (pb && pb!=='-' && pb!=='--') m.pb = parseFloat(pb);
        if (dy && dy!=='-' && dy!=='--') m.divYield = parseFloat(dy);
        if (m.pe && m.pe>0) m.eps = price / m.pe;
        if (m.divYield) m.div = price * m.divYield / 100;
        if (nm) m.name = nm;
        // TPEX 額外財務數據
        const shares = row.OutstandingShares || row['流通股數'];
        if (shares && !isNaN(shares)) m.marketCap = price * parseFloat(shares);
        const roe = row.ROE || row['淨資產報酬率'];
        if (roe && roe!=='-') m.roe = parseFloat(roe);
        const gm = row.GrossMargin || row['毛利率'];
        if (gm && gm!=='-') m.grossMargin = parseFloat(gm);
      }
    }

    // quoteSummary 資料（美股直連，台股上櫃走proxy也可能取到）

    if (summaryResult) {
      const pr=summaryResult.price||{}, sd=summaryResult.summaryDetail||{}, ks=summaryResult.defaultKeyStatistics||{}, fd=summaryResult.financialData||{};

      // 產業：summary 補充（從多個位置查找）

      if (!m.industry) m.industry = raw2(pr.industry) || raw2(sd.industry) || '';
      m.quoteType = m.quoteType||raw2(pr.quoteType)||'';
      // 財務資料：TWSE/TPEX 已有的不覆蓋
      if (!m.pe) m.pe = raw2(sd.trailingPE)||raw2(pr.trailingPE);
      if (!m.pb) m.pb = raw2(sd.priceToBook)||raw2(ks.priceToBook);
      if (!m.divYield && raw2(sd.dividendYield)) m.divYield = raw2(sd.dividendYield)*100;
      if (!m.div) m.div = raw2(sd.dividendRate)||raw2(sd.trailingAnnualDividendRate);
      if (!m.eps) m.eps = raw2(ks.trailingEps)||raw2(ks.forwardEps);
      // 以下只有 summary 有，直接填入
      m.roe = raw2(fd.returnOnEquity)?raw2(fd.returnOnEquity)*100:m.roe;
      m.beta = m.beta||raw2(ks.beta);
      m.evEbitda = m.evEbitda||raw2(ks.enterpriseToEbitda);
      m.peg = m.peg||raw2(ks.pegRatio)||raw2(ks.trailingPegRatio);
      m.marketCap = m.marketCap||raw2(pr.marketCap);
      m.grossMargin = m.grossMargin||(raw2(fd.grossMargins)?raw2(fd.grossMargins)*100:null);
      m['52hi'] = m['52hi']||raw2(sd.fiftyTwoWeekHigh);
      m['52lo'] = m['52lo']||raw2(sd.fiftyTwoWeekLow);

    if (finnhubResult && finnhubResult.valuation) {

      if (!m.divYield && v.dividend) m.divYield = v.dividend * 100;

    if (newsResult) {
      m.news = newsResult.items || [];

      m.newsSource = newsResult.source || 'TWSE';

      m.majorNewsCount = (m.news || []).filter(n => n.type === 'M').length;
      m.minorNewsCount = (m.news || []).filter(n => n.type === 'C').length;
    } else {

      m.newsCount = 0;
      m.lastNewsDate = '';
      m.newsSource = 'FALLBACK';
      m.majorNewsCount = 0;
      m.minorNewsCount = 0;
    }

// 方案 B：監視官方產業數據同步狀態
async function monitorIndustrySync() {
  const statusEl = document.getElementById('initStatus');
  const iconEl = document.getElementById('syncIcon');

  // 等待初始同步完成
  let attempts = 0;
  while (COMPANY_INDUSTRY_MAP.size === 0 && attempts < 30) {
    await new Promise(r => setTimeout(r, 500));
    attempts++;
  }

  if (COMPANY_INDUSTRY_MAP.size > 0) {
    iconEl.textContent = '✅';
    statusEl.style.color = '#28a745';
    statusEl.textContent = `✅ 已同步 ${COMPANY_INDUSTRY_MAP.size} 家企業 (${lastIndustrySync ? lastIndustrySync.toLocaleTimeString() : '初始化中'})`;
    statusEl.style.display = 'block';
    setTimeout(() => statusEl.style.display = 'none', 5000);
  } else {
    iconEl.textContent = '⚠️';
    statusEl.style.color = '#f0ad4e';
    statusEl.textContent = '⚠️ 使用本地備援方案';
    statusEl.style.display = 'block';
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', monitorIndustrySync);
} else {
  monitorIndustrySync();
}
