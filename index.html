<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票估價分析工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--muted:#666;--border:#ddd;--accent:#2563eb;--al:#eff6ff;--green:#16a34a;--red:#dc2626;--yel:#d97706;--sbg:#f9fafb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.75}
.wrap{max-width:880px;margin:0 auto;padding:24px 16px 60px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.vsub{font-size:.7rem;font-weight:400;color:var(--muted);background:var(--sbg);padding:2px 8px;border-radius:10px;vertical-align:middle;margin-left:8px}
.sub{color:var(--muted);font-size:.875rem;margin-bottom:24px}
.sbox{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sbox input{flex:1;min-width:180px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:1rem;outline:none;transition:border-color .2s}
.sbox input:focus{border-color:var(--accent)}
.sbox button{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
.sbox button:hover{background:#1d4ed8}
.sbox button:disabled{background:#93c5fd;cursor:not-allowed}
.hint{font-size:.8rem;color:var(--muted);margin-bottom:20px}
#st{font-size:.875rem;color:var(--muted);min-height:22px;margin-bottom:16px}
#st.err{color:var(--red)}
.sh{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sn{font-size:1.4rem;font-weight:700}.sy{font-size:.9rem;color:var(--muted)}
.sp{font-size:2rem;font-weight:700}.pc{font-size:1rem;font-weight:600}
.up{color:var(--red)}.dn{color:var(--green)}
.itag{background:var(--al);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.sec{margin-bottom:28px}
.st2{font-size:1rem;font-weight:700;border-left:3px solid var(--accent);padding-left:10px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.card{background:var(--sbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.cl{font-size:.75rem;color:var(--muted)}.cv{font-size:1.05rem;font-weight:600}
.vt{width:100%;border-collapse:collapse;font-size:.9rem}
.vt th,.vt td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
.vt th{background:var(--sbg);font-weight:600;font-size:.8rem;color:var(--muted)}
.vt tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600;white-space:nowrap}
.bl{background:#dcfce7;color:#15803d}.bf{background:#fef9c3;color:#854d0e}.bh{background:#fee2e2;color:#b91c1c}.bn{background:#f3f4f6;color:#6b7280}
.vd{border-radius:10px;padding:16px 20px;margin-bottom:28px;border-left:4px solid}
.vd.buy{border-color:var(--red);background:#fff1f2}
.vd.hold{border-color:var(--yel);background:#fffbeb}
.vd.sell{border-color:var(--green);background:#f0fdf4}
.vdtit{font-weight:700;font-size:1.1rem;margin-bottom:6px}.vdbod{font-size:.875rem;line-height:1.8}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.tc{background:var(--sbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.tl{font-size:.75rem;color:var(--muted);margin-bottom:2px}
.tv{font-size:1rem;font-weight:600}.ts{font-size:.75rem;margin-top:2px}
.sb{color:var(--red)}.ss{color:var(--green)}.sn2{color:var(--yel)}
.cw{position:relative;height:260px;margin-bottom:8px}
.pb{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pbtn{padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;cursor:pointer;background:#fff}
.pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.divhr{border:none;border-top:1px solid var(--border);margin:24px 0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.pt-buy{color:var(--red);font-weight:600}
.pt-sell{color:var(--green);font-weight:600}
.pt-sup{color:var(--accent)}
.pt-res{color:var(--yel)}
.pt-neu{color:var(--muted)}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}.tgrid{grid-template-columns:repeat(2,1fr)}.sp{font-size:1.5rem}.vt{font-size:.8rem}.vt th,.vt td{padding:7px 8px}}
</style>
</head>
<body>
<div class="wrap">
<h1>📊 股票估價分析工具<span class="vsub">v2026.06-r25</span></h1>
<p class="sub">支援台股（如 2330）、美股（如 AAPL）、ETF（如 0050、SPY）。資料即時來源：Yahoo Finance + TWSE</p>
<div class="sbox">
  <input type="text" id="ti" placeholder="輸入代號，如 2330、AAPL、0050、SPY" autocomplete="off" autocapitalize="characters"/>
  <button id="btn" onclick="go()">分析</button>
</div>
<p class="hint">台股輸入數字代號（自動加 .TW）；美股直接輸入英文；按 Enter 也可查詢。<br>
  範例：2330 台積電｜2317 鴻海｜0050 元大台灣50｜00878 國泰高股息｜AAPL｜TSLA｜SPY</p>
<div id="st"></div>
<div id="res" class="hidden"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
// 資料抓取
// ════════════════════════════════════════════════════════

// v8/chart：台股美股都可透過 corsproxy 抓到
async function yfFetch(sym) {
  const url1 = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2y`;
  const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2y`;
  const hdrs = {'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36','Accept':'application/json'};

  // 直連（美股通常可用）
  for (const url of [url1, url2]) {
    try {
      const r = await fetch(url, {headers:hdrs, signal:AbortSignal.timeout(8000)});
      if (r.ok) { const d = await r.json(); if (d?.chart?.result?.[0]) return d.chart.result[0]; }
    } catch(e) {}
  }

  // corsproxy 備援（台股靠這個）
  console.log('[yfFetch] trying corsproxy for', sym);
  try {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url1), {signal:AbortSignal.timeout(18000)});
    console.log('[yfFetch] corsproxy status:', r.status, 'for', sym);
    if (r.ok) {
      const d = await r.json();
      if (d?.chart?.result?.[0]) { console.log('[yfFetch] corsproxy ok'); return d.chart.result[0]; }
      // 404 = 代號不存在
      if (r.status === 404) return null;
    }
    if (r.status === 404) return null;
  } catch(e) { console.log('[yfFetch] corsproxy error:', e.message); }
  return null;
}

// quoteSummary：直連（美股）或 corsproxy（台股備援）
async function yfSummary(sym) {
  const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${sym}?modules=price,summaryDetail,defaultKeyStatistics,financialData`;
  const hdrs = {'User-Agent':'Mozilla/5.0','Accept':'application/json'};
  for (const base of ['https://query1.finance.yahoo.com','https://query2.finance.yahoo.com']) {
    try {
      const u = url.replace('query1.finance.yahoo.com', base.replace('https://',''));
      const r = await fetch(u, {headers:hdrs, signal:AbortSignal.timeout(8000)});
      if (r.ok) { const d = await r.json(); if (d?.quoteSummary?.result?.[0]) return d.quoteSummary.result[0]; }
    } catch(e) {}
  }
  // corsproxy 備援（台股有時能通）
  try {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {signal:AbortSignal.timeout(14000)});
    console.log('[yfSummary] proxy', r.status, sym);
    if (r.ok) { const d = await r.json(); if (d?.quoteSummary?.result?.[0]) return d.quoteSummary.result[0]; }
  } catch(e) {}
  return null;
}

// 通用 fetch（直連 + corsproxy 備援）
async function safeFetch(url) {
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(8000)});
    if (r.ok) return await r.json();
  } catch(e) {}
  try {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), {signal:AbortSignal.timeout(12000)});
    if (r.ok) return await r.json();
  } catch(e) {}
  return null;
}

// TWSE（上市）：本益比/P/B/殖利率（BWIBBU_ALL 含更多資料，BWIBBU_d 備援）
async function twseFetch() {
  const d = await safeFetch('https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL');
  if (d && d.length > 0) return d;
  return await safeFetch('https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_d');
}

// 上櫃基本面：BWIBBU_d 只有上市，上櫃用 TWSE 的 OTC 專屬 endpoint
// 或嘗試 BWIBBU_ALL（合併版）
async function tpexFetch() {
  // 上櫃股：目前公開API無法直接取得，回傳 null（顯示 N/A）
  // 僅做嘗試，若未來 API 支援則自動生效
  const candidates = [
    'https://www.tpex.org.tw/openapi/v1/tpex_mainboard_peratio_analysis',
    'https://www.tpex.org.tw/openapi/v1/tpex_esb_peratio_analysis',
  ];
  for (const url of candidates) {
    // 直連
    try {
      const r = await fetch(url, {signal:AbortSignal.timeout(8000)});
      if (r.ok) {
        const d = await r.json();
        if (d && d.length > 0) { console.log('[tpexFetch] direct ok:', url.split('/').pop(), 'keys:', Object.keys(d[0]).join(',')); return d; }
      }
    } catch(e) {}
    // corsproxy
    try {
      const pu = 'https://corsproxy.io/?' + encodeURIComponent(url);
      const r = await fetch(pu, {signal:AbortSignal.timeout(14000)});
      console.log('[tpexFetch] proxy', url.split('/').pop(), 'status:', r.status);
      if (r.ok) {
        const d = await r.json();
        if (d && d.length > 0) { console.log('[tpexFetch] proxy ok, keys:', Object.keys(d[0]).join(','), 'sample:', JSON.stringify(d[0])); return d; }
      }
    } catch(e) { console.log('[tpexFetch] proxy error:', e.message); }
  }
  console.log('[tpexFetch] all failed');
  return null;
}

// ════════════════════════════════════════════════════════
// 產業分類
// ════════════════════════════════════════════════════════
function classifyIndustry(sym, name, sector, industry) {
  const s = (sector||'').toLowerCase();
  const ind = (industry||'').toLowerCase();
  const nm = (name||'').toLowerCase();
  const code = parseInt(sym.replace('.TW',''));
  const symU = sym.toUpperCase();

  // ETF
  if (/^00\d{2,3}/.test(sym.replace('.TW','')) || nm.includes('etf') || symU==='SPY'||symU==='QQQ'||symU==='VTI') return 'ETF';

  // TWSE 中文產業（從 sector/industry 帶進來）
  const zh = s + ' ' + ind;
  if (zh.includes('半導體') || zh.includes('積體電路')) return '科技/半導體';
  if (zh.includes('電子零組件') || zh.includes('光電') || zh.includes('電腦') || zh.includes('其他電子') || zh.includes('通信網路') || zh.includes('電子通路') || zh.includes('資訊服務')) return '科技/半導體';
  if (zh.includes('金融') || zh.includes('銀行') || zh.includes('保險') || zh.includes('證券')) return '金融保險';
  if (zh.includes('鋼鐵') || zh.includes('塑膠') || zh.includes('化學') || zh.includes('水泥') || zh.includes('造紙') || zh.includes('橡膠')) return '景氣循環/原物料';
  if (zh.includes('航運') || zh.includes('航空')) return '景氣循環/原物料';
  if (zh.includes('電信') || zh.includes('通信')) return '公用事業/電信';
  if (zh.includes('建材') || zh.includes('不動產') || zh.includes('營建')) return '不動產/REITs';
  if (zh.includes('生技') || zh.includes('醫療') || zh.includes('藥')) return '生技/醫療';
  if (zh.includes('食品') || zh.includes('紡織') || zh.includes('汽車') || zh.includes('電機機械')) return '一般製造/消費';

  // 名稱關鍵字
  if (nm.includes('半導') || nm.includes('積電') || nm.includes('聯發科') || nm.includes('矽力') || nm.includes('聯電') || nm.includes('日月光')) return '科技/半導體';
  if (nm.includes('金控') || nm.includes('銀行') || nm.includes('壽險') || nm.includes('保險')) return '金融保險';
  if (nm.includes('電信') || nm.includes('中華電') || nm.includes('台灣大') || nm.includes('遠傳')) return '公用事業/電信';
  if (nm.includes('航運') || nm.includes('長榮') || nm.includes('陽明') || nm.includes('萬海')) return '景氣循環/原物料';
  if (nm.includes('鋼鐵') || nm.includes('中鋼')) return '景氣循環/原物料';
  if (nm.includes('生技') || nm.includes('醫療') || nm.includes('藥')) return '生技/醫療';

  // 英文 sector（美股）
  if (s.includes('semiconductor') || s.includes('technology') || ind.includes('semiconductor') || ind.includes('electronic')) return '科技/半導體';
  if (s.includes('financial') || s.includes('bank') || s.includes('insurance')) return '金融保險';
  if (s.includes('real estate') || ind.includes('reit')) return '不動產/REITs';
  if (s.includes('utilities') || s.includes('communication') || ind.includes('telecom')) return '公用事業/電信';
  if (s.includes('energy') || s.includes('material') || ind.includes('steel') || ind.includes('oil')) return '景氣循環/原物料';
  if (s.includes('health') || s.includes('biotech') || ind.includes('pharma')) return '生技/醫療';

  // 台股代號範圍推斷
  if (!isNaN(code)) {
    if (code >= 2300 && code <= 2399) return '科技/半導體';
    if (code >= 2800 && code <= 2899) return '金融保險';
    if (code >= 2600 && code <= 2699) return '景氣循環/原物料';
    if (code >= 4700 && code <= 4799) return '生技/醫療';
  }

  return '一般製造/消費';
}

// ════════════════════════════════════════════════════════
// 技術指標
// ════════════════════════════════════════════════════════
const maVal = (a,n) => { const c=a.filter(v=>v!=null); return c.length<n?null:c.slice(-n).reduce((s,v)=>s+v,0)/n; };
const maLine = (a,n) => a.map((_,i)=>{ if(i<n-1)return null; const sl=a.slice(i-n+1,i+1); return sl.some(v=>v==null)?null:sl.reduce((s,v)=>s+v,0)/n; });
function emaVal(a,n){ const c=a.filter(v=>v!=null); if(c.length<n)return null; const k=2/(n+1); let e=c.slice(0,n).reduce((s,v)=>s+v,0)/n; for(let i=n;i<c.length;i++)e=c[i]*k+e*(1-k); return e; }
function rsiVal(a,n=14){ const c=a.filter(v=>v!=null); if(c.length<n+1)return null; let g=0,l=0; for(let i=c.length-n;i<c.length;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l-=d;} return 100-100/(1+(g/(l||1e-9))); }
function macdVal(a){ const c=a.filter(v=>v!=null); if(c.length<35)return null; const st=Math.max(0,c.length-70); const difs=[]; for(let i=st;i<c.length;i++){const sub=c.slice(0,i+1);const e12=emaVal(sub,12),e26=emaVal(sub,26);if(e12&&e26)difs.push(e12-e26);} if(difs.length<9)return null; const dif=difs[difs.length-1],dea=emaVal(difs,9); return{dif,dea,hist:dif-(dea||0)}; }
function kdVal(hi,lo,cl,n=9){ const h=hi.filter(v=>v!=null).slice(-n),l=lo.filter(v=>v!=null).slice(-n),last=cl.filter(v=>v!=null).slice(-1)[0]; const hh=Math.max(...h),ll=Math.min(...l); const rsv=hh===ll?50:(last-ll)/(hh-ll)*100; return{k:rsv*(2/3)+50*(1/3),d:rsv*(2/9)+50*(7/9)}; }
function bollVal(a,n=20){ const c=a.filter(v=>v!=null); if(c.length<n)return null; const sl=c.slice(-n),mid=sl.reduce((s,v)=>s+v,0)/n,std=Math.sqrt(sl.reduce((s,v)=>s+(v-mid)**2,0)/n); return{upper:mid+2*std,mid,lower:mid-2*std,bw:(4*std)/mid}; }

// ════════════════════════════════════════════════════════
// 估值模型
// ════════════════════════════════════════════════════════
const f = (n,d=2) => (n==null||isNaN(n)||!isFinite(n))?'N/A':Number(n).toFixed(d);
function fB(n){if(!n||isNaN(n))return'N/A';const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2)+' T';if(a>=1e9)return(n/1e9).toFixed(2)+' B';if(a>=1e6)return(n/1e6).toFixed(2)+' M';return n.toFixed(0);}
function bdg(est,cur){ if(est==='N/A'||!cur||isNaN(parseFloat(est)))return'<span class="badge bn">資料不足</span>'; const r=cur/parseFloat(est); if(r<0.88)return'<span class="badge bl">偏低 ✓</span>'; if(r>1.15)return'<span class="badge bh">偏高 !</span>'; return'<span class="badge bf">合理</span>'; }

function calcVals(price, m, ind) {
  const pe = m.pe, pb = m.pb, div = m.div, divYield = m.divYield;
  const eps = m.eps, roe = m.roe, beta = m.beta;
  const res = [];

  // ── 1. P/E 評估 ──────────────────────────────────────────
  if (pe && pe > 0 && pe < 500) {
    const fairPE = ind==='科技/半導體'?25:ind==='生技/醫療'?30:ind==='金融保險'?12:ind==='景氣循環/原物料'?10:ind==='公用事業/電信'?18:20;
    const sig = pe < fairPE*0.8 ? '<span class="badge bl">低估 ✓</span>' : pe < fairPE ? '<span class="badge bl">合理偏低</span>' : pe < fairPE*1.3 ? '<span class="badge bf">合理</span>' : '<span class="badge bh">偏高 !</span>';
    res.push({m:'P/E 本益比評估', d:`目前P/E=${f(pe,1)}（${ind}合理區間：${Math.round(fairPE*0.7)}~${fairPE}x）`, t:f(pe,1)+'x', b:sig});
  }

  // ── 2. P/B 淨值估價 ───────────────────────────────────────
  if (pb && pb > 0) {
    const fairPB = ind==='金融保險'?1.5:ind==='景氣循環/原物料'?1.5:ind==='科技/半導體'?6:ind==='生技/醫療'?5:3;
    const bv = price / pb;
    const tgt = bv * fairPB;
    const sig = pb<=fairPB?'<span class="badge bl">合理 ✓</span>':pb<=fairPB*1.5?'<span class="badge bf">偏高</span>':'<span class="badge bh">偏高 !</span>';
    res.push({m:'P/B 淨值估價', d:`每股淨值≈${f(bv)} × 合理P/B ${fairPB}x（目前P/B=${f(pb,1)}，${ind}合理上限${fairPB}x）`, t:f(tgt), b:sig});
  }

  // ── 3. 殖利率防線 ─────────────────────────────────────────
  if (div && div > 0) {
    const yFloor = ind==='公用事業/電信'?0.04:ind==='金融保險'?0.045:ind==='ETF'?0.04:0.05;
    const tgt = div / yFloor;
    res.push({m:`殖利率防線（${f(yFloor*100,1)}%）`, d:`現金股利 ${f(div)} ÷ ${f(yFloor*100,1)}%（機構被動買盤支撐價）`, t:f(tgt), b:bdg(f(tgt),price)});
  }

  // ── 4. GGM 股息折現 ───────────────────────────────────────
  if (div && div > 0) {
    const g = 0.03, r = 0.07;
    const ggm = (div * (1+g)) / (r - g);
    res.push({m:'GGM 股息折現', d:`D₁=${f(div*(1+g))} ÷ (r=7% − g=3%)`, t:f(ggm), b:bdg(f(ggm),price)});
  }

  // ── 5. 殖利率合理價 ───────────────────────────────────────
  if (divYield && divYield > 0) {
    const fairY = ind==='公用事業/電信'?3.5:ind==='金融保險'?4.0:ind==='ETF'?3.5:4.5;
    const tgt = price * (divYield / fairY);
    res.push({m:`殖利率合理價（目標${fairY}%）`, d:`目前殖利率${f(divYield,2)}%，目標${fairY}%反算合理價`, t:f(tgt), b:bdg(f(tgt),price)});
  }

  // ── 6. DCF 簡化 ───────────────────────────────────────────
  if (eps && eps > 0) {
    const wacc = beta ? Math.min(Math.max(0.05+beta*0.045,0.07),0.14) : 0.09;
    const gHigh = ind==='科技/半導體'?0.15:ind==='生技/醫療'?0.12:0.08;
    let dcf=0, cf=eps;
    for(let i=1;i<=5;i++){cf*=(1+gHigh);dcf+=cf/Math.pow(1+wacc,i);}
    const tv=(cf*1.03)/(wacc-0.03); dcf+=tv/Math.pow(1+wacc,5);
    res.push({m:'DCF 簡化估值', d:`WACC=${f(wacc*100,1)}%，EPS=${f(eps)}，成長${f(gHigh*100,0)}%×5年後終值`, t:f(dcf), b:bdg(f(dcf),price)});
  }

  // ── 7. EV/EBITDA ─────────────────────────────────────────
  if (m.evEbitda && m.evEbitda > 0 && m.evEbitda < 200) {
    const fair = ind==='景氣循環/原物料'?8:ind==='科技/半導體'?20:ind==='生技/醫療'?25:12;
    const sig = m.evEbitda<fair*0.8?'<span class="badge bl">偏低 ✓</span>':m.evEbitda>fair*1.3?'<span class="badge bh">偏高 !</span>':'<span class="badge bf">合理</span>';
    res.push({m:'EV/EBITDA', d:`目前${f(m.evEbitda)}x（${ind}合理區間約${Math.round(fair*0.7)}~${fair}x）`, t:f(m.evEbitda)+'x', b:sig});
  }

  // ── 8. RIM（金融業）─────────────────────────────────────
  if (ind==='金融保險' && pb && roe && pb>0) {
    const bv = price/pb;
    const tgt = Math.max(bv*(1+(roe/100-0.08)/0.08), bv*0.7);
    res.push({m:'RIM 剩餘盈餘模型', d:`淨值≈${f(bv)} × (1+(ROE ${f(roe,1)}%−8%)/8%)（適合金融業）`, t:f(tgt), b:bdg(f(tgt),price)});
  }

  // ── 9. PEG ───────────────────────────────────────────────
  if (m.peg && m.peg > 0 && m.peg < 20) {
    const sig = m.peg<1?'<span class="badge bl">PEG<1 低估</span>':m.peg<2?'<span class="badge bf">PEG 合理</span>':'<span class="badge bh">PEG>2 偏貴</span>';
    res.push({m:'PEG 本益成長比', d:`PEG=${f(m.peg)}（<1視為低估，適合高成長股，PEG=P/E÷盈餘成長率）`, t:f(m.peg), b:sig});
  }

  return res;
}

// ── 買賣建議價位 ──────────────────────────────────────────────────────────────
function calcPriceTargets(price, m, tech, ind) {
  const hi52=m['52hi'], lo52=m['52lo'];
  const pe=m.pe, pb=m.pb, div=m.div, eps=m.eps;
  const rows = [];

  // 技術面
  if (lo52) rows.push({cls:'pt-sup', icon:'▲', label:'52週低點支撐', val:f(lo52), note:'跌破此價位風險增加，止損參考'});
  if (hi52) rows.push({cls:'pt-res', icon:'▼', label:'52週高點壓力', val:f(hi52), note:'突破此價位可能加速上漲，觀察量能'});
  if (hi52&&lo52) {
    rows.push({cls:'pt-neu', icon:'◆', label:'52週中間價（黃金分割）', val:f(lo52+(hi52-lo52)*0.618), note:'費波那契 61.8% 支撐/壓力'});
  }

  // 技術指標衍生
  const ma20=tech.ma20, ma60=tech.ma60, ma240=tech.ma240;
  if (ma20) rows.push({cls:'pt-sup', icon:'▲', label:'MA20 月線支撐', val:f(ma20), note:'短線多空分界，跌破轉弱'});
  if (ma60) rows.push({cls:'pt-sup', icon:'▲', label:'MA60 季線支撐', val:f(ma60), note:'中線多空分界，重要支撐'});
  if (ma240) rows.push({cls:'pt-sup', icon:'▲', label:'MA240 年線支撐', val:f(ma240), note:'長線牛熊分界'});

  // 基本面
  if (pe && pe > 0 && eps > 0) {
    const fairPE = ind==='科技/半導體'?25:ind==='金融保險'?12:ind==='景氣循環/原物料'?10:18;
    rows.push({cls:'pt-buy', icon:'🟢', label:`合理買進價（P/E=${fairPE}x）`, val:f(eps*fairPE), note:`EPS=${f(eps)} × 合理P/E ${fairPE}x`});
    rows.push({cls:'pt-buy', icon:'🟢', label:`強力買進價（P/E=${Math.round(fairPE*0.75)}x）`, val:f(eps*fairPE*0.75), note:'折讓25%，低估明顯時考慮積極買入'});
    rows.push({cls:'pt-sell', icon:'🔴', label:`合理賣出價（P/E=${Math.round(fairPE*1.2)}x）`, val:f(eps*fairPE*1.2), note:'超過合理P/E 20%，考慮分批減碼'});
    rows.push({cls:'pt-sell', icon:'🔴', label:`停利參考價（P/E=${Math.round(fairPE*1.5)}x）`, val:f(eps*fairPE*1.5), note:'明顯超漲區，積極停利'});
  }

  // 殖利率防線
  if (div && div > 0) {
    const yFloor = ind==='公用事業/電信'?0.04:ind==='金融保險'?0.045:0.05;
    rows.push({cls:'pt-sup', icon:'▲', label:`殖利率防線（${f(yFloor*100,1)}%）`, val:f(div/yFloor), note:'機構被動買盤支撐，跌破視為異常'});
  }

  // 布林通道
  if (tech.bollU && tech.bollL) {
    rows.push({cls:'pt-buy', icon:'🟢', label:'布林下軌（短線超賣）', val:f(tech.bollL), note:'觸及下軌可短線反彈，注意量能確認'});
    rows.push({cls:'pt-sell', icon:'🔴', label:'布林上軌（短線超買）', val:f(tech.bollU), note:'觸及上軌注意拉回，追高需謹慎'});
  }

  return rows;
}

// ── 綜合建議 ─────────────────────────────────────────────────────────────────
function mkVerdict(price, vals, tech, ind, m) {
  let bull=0, bear=0;
  vals.forEach(v=>{ if(v.b.includes('低估')||v.b.includes('偏低')||v.b.includes('合理偏低')||v.b.includes('PEG<1'))bull++; if(v.b.includes('偏高'))bear++; });
  if(tech.rsi<35)bull++; if(tech.rsi>70)bear++;
  if(tech.macdBull)bull++; if(tech.macdBear)bear++;
  if(tech.kd<25)bull++; if(tech.kd>80)bear++;
  const lo=f(m['52lo']), hi=f(m['52hi']);
  if(bull>=2&&bull>bear) return{t:'buy',ti:'🔴 估值偏低，可考慮買進或分批布局',bo:`多個估值模型顯示股價低於合理價值，技術面亦出現超賣或反彈訊號。適合${ind==='ETF'?'定期定額或逢低加碼':'確認右側方向後分批建倉'}。52週低點 ${lo} 為重要支撐，請設好停損點。`};
  if(bear>=2&&bear>bull) return{t:'sell',ti:'🟢 估值偏高，建議謹慎或考慮減碼',bo:`多個估值模型顯示股價已超過合理估值，技術面亦有超買跡象。持有者可考慮分批減碼或設停利。52週高點 ${hi} 為強阻力，留意回落風險。`};
  return{t:'hold',ti:'🟡 估值合理，持有觀望',bo:`目前股價處於合理估值區間，多空訊號混合。建議持有並觀察突破方向，關注下次財報及產業動向。參考區間：${lo} ~ ${hi}。`};
}

async function go(){
  let raw=document.getElementById('ti').value.trim().toUpperCase();
  if(!raw)return;
  const isNumeric = /^\d{4,6}$/.test(raw);
  let ticker = isNumeric ? raw+'.TW' : raw;
  const btn=document.getElementById('btn');btn.disabled=true;
  setSt('<span class="spin"></span>查詢 '+ticker+'...',false);
  document.getElementById('res').classList.add('hidden');

  try{
    setSt('<span class="spin"></span>抓取資料中...',false);

    // 台股：先試 .TW，失敗再試 .TWO（上櫃股）
    let chartResult = null;
    if (isNumeric) {
      chartResult = await yfFetch(raw+'.TW');
      if (!chartResult) {
        ticker = raw+'.TWO';
        setSt('<span class="spin"></span>嘗試上櫃代號 '+ticker+'...',false);
        chartResult = await yfFetch(raw+'.TWO');
      }
    } else {
      chartResult = await yfFetch(ticker);
    }

    const isTW = ticker.endsWith('.TW') || ticker.endsWith('.TWO');
    const isOTC = ticker.endsWith('.TWO'); // 上櫃

    // 並行抓取基本面資料
    // 上市用 BWIBBU_d，上櫃用 BWIBBU_ALL（含上市+上櫃），美股用 quoteSummary
    const [twseArr, tpexArr, summaryResult] = await Promise.all([
      (!isOTC && isTW) ? twseFetch() : Promise.resolve(null),  // 上市 TWSE
      isOTC ? tpexFetch() : Promise.resolve(null),              // 上櫃 TPEX
      yfSummary(ticker)                                         // 所有股票都試（美股直連，台股走proxy）
    ]);

    if (!chartResult) throw new Error('無法取得資料，請確認代號是否正確（台股用數字，美股用英文）');

    const meta = chartResult.meta || {};
    const price = meta.regularMarketPrice || meta.price;
    if (!price) throw new Error('無法取得股價，請稍後再試');

    // K線資料
    const ts=chartResult.timestamp||[],q=chartResult.indicators?.quote?.[0]||{};
    const closes=q.close||[],highs=q.high||[],lows=q.low||[],vols=q.volume||[];
    const idx=ts.map((_,i)=>i).filter(i=>closes[i]!=null&&closes[i]>0);
    AD=idx.map(i=>{const d=new Date(ts[i]*1000);return`${d.getMonth()+1}/${d.getDate()}`;});
    AP=idx.map(i=>closes[i]);
    const AH=idx.map(i=>highs[i]||closes[i]);
    const AL=idx.map(i=>lows[i]||closes[i]);
    AV=idx.map(i=>vols[i]||0);

    // 基本面資料整合
    function raw2(o){return(o&&typeof o==='object'&&'raw'in o)?o.raw:o;}
    let m = {
      '52hi': meta.fiftyTwoWeekHigh,
      '52lo': meta.fiftyTwoWeekLow,
      pe:null, pb:null, div:null, divYield:null,
      eps:null, roe:null, beta:null, evEbitda:null, peg:null,
      marketCap:null, grossMargin:null, name:'', sector:'', industry:'', quoteType:''
    };

    // TWSE 上市資料
    if (twseArr) {
      const no = ticker.replace('.TW','').replace('.TWO','');
      const row = twseArr.find(r=>r.Code===no);
      if (row) {
        if (row.PEratio && row.PEratio!=='-') m.pe = parseFloat(row.PEratio);
        if (row.PBratio && row.PBratio!=='-') m.pb = parseFloat(row.PBratio);
        if (row.DividendYield && row.DividendYield!=='-') m.divYield = parseFloat(row.DividendYield);
        if (m.pe && m.pe>0) m.eps = price / m.pe;
        if (m.divYield) m.div = price * m.divYield / 100;
        if (row.Name) m.name = row.Name;
      }
    }

    // TPEX 上櫃資料（格式同 BWIBBU_d：Code, Name, PEratio, PBratio, DividendYield）
    if (tpexArr) {
      const no = ticker.replace('.TWO','').replace('.TW','');
      if (tpexArr.length > 0) console.log('[TPEX] sample keys:', Object.keys(tpexArr[0]).join(', '));
      // 同時嘗試多種欄位名稱（TPEX API 可能不同）
      const row = tpexArr.find(r =>
        r.Code===no || r['股票代號']===no || r.StockCode===no ||
        r.SecuritiesCompanyCode===no || r['代號']===no
      );
      console.log('[TPEX] row for', no, ':', row ? JSON.stringify(row) : 'NOT FOUND');
      if (row) {
        // 欄位名稱：BWIBBU_d 格式 OR TPEX 格式
        const pe = row.PEratio || row['本益比'] || row.PriceEarningRatio;
        const pb = row.PBratio || row['股價淨值比'] || row.PriceBookRatio;
        const dy = row.DividendYield || row['殖利率'];
        const nm = row.Name || row['名稱'] || row['股票名稱'] || row.CompanyName;
        if (pe && pe!=='-' && pe!=='--') m.pe = parseFloat(pe);
        if (pb && pb!=='-' && pb!=='--') m.pb = parseFloat(pb);
        if (dy && dy!=='-' && dy!=='--') m.divYield = parseFloat(dy);
        if (m.pe && m.pe>0) m.eps = price / m.pe;
        if (m.divYield) m.div = price * m.divYield / 100;
        if (nm) m.name = nm;
      }
    }

    // quoteSummary 資料（美股直連，台股上櫃走proxy也可能取到）
    // TWSE/TPEX 已有的數值優先保留，summary 只補充缺少的欄位
    if (summaryResult) {
      const pr=summaryResult.price||{}, sd=summaryResult.summaryDetail||{}, ks=summaryResult.defaultKeyStatistics||{}, fd=summaryResult.financialData||{};
      // 名稱：summary 有中文名時優先用
      const sName = raw2(pr.shortName)||raw2(pr.longName)||'';
      if (sName && (!m.name || m.name===ticker)) m.name = sName;
      // 產業：summary 補充
      if (!m.sector) m.sector = raw2(pr.sector)||'';
      if (!m.industry) m.industry = raw2(pr.industry)||'';
      m.quoteType = m.quoteType||raw2(pr.quoteType)||'';
      // 財務資料：TWSE/TPEX 已有的不覆蓋
      if (!m.pe) m.pe = raw2(sd.trailingPE)||raw2(pr.trailingPE);
      if (!m.pb) m.pb = raw2(sd.priceToBook)||raw2(ks.priceToBook);
      if (!m.divYield && raw2(sd.dividendYield)) m.divYield = raw2(sd.dividendYield)*100;
      if (!m.div) m.div = raw2(sd.dividendRate)||raw2(sd.trailingAnnualDividendRate);
      if (!m.eps) m.eps = raw2(ks.trailingEps)||raw2(ks.forwardEps);
      // 以下只有 summary 有，直接填入
      m.roe = raw2(fd.returnOnEquity)?raw2(fd.returnOnEquity)*100:m.roe;
      m.beta = m.beta||raw2(ks.beta);
      m.evEbitda = m.evEbitda||raw2(ks.enterpriseToEbitda);
      m.peg = m.peg||raw2(ks.pegRatio)||raw2(ks.trailingPegRatio);
      m.marketCap = m.marketCap||raw2(pr.marketCap);
      m.grossMargin = m.grossMargin||(raw2(fd.grossMargins)?raw2(fd.grossMargins)*100:null);
      m['52hi'] = m['52hi']||raw2(sd.fiftyTwoWeekHigh);
      m['52lo'] = m['52lo']||raw2(sd.fiftyTwoWeekLow);
    }

    // meta 補充名稱
    if (!m.name) m.name = meta.longName||meta.shortName||ticker;

    // 產業分類
    const ind = classifyIndustry(ticker, m.name, m.sector, m.industry);

    // 技術指標
    const ma5v=maVal(AP,5), ma10v=maVal(AP,10), ma20v=maVal(AP,20), ma60v=maVal(AP,60), ma240v=maVal(AP,240);
    const r14=rsiVal(AP,14), mc=macdVal(AP), kdv=AH.length>=9?kdVal(AH,AL,AP):null, bl=bollVal(AP,20);
    const tech = {
      rsi: r14??50, ma20:ma20v, ma60:ma60v, ma240:ma240v,
      macdBull: mc?(mc.dif>0&&mc.hist>0):false,
      macdBear: mc?(mc.dif<0&&mc.hist<0):false,
      kd: kdv?kdv.k:50,
      bollU: bl?bl.upper:null, bollL: bl?bl.lower:null
    };

    // 估值 & 建議
    const vals = calcVals(price, m, ind);
    const vd = mkVerdict(price, vals, tech, ind, m);
    const ptRows = calcPriceTargets(price, m, tech, ind);

    // 漲跌：用K線最後兩日計算（比meta更準確）

    }
    // 台股：漲紅跌綠；美股：漲綠跌紅
    const isTW2 = ticker.endsWith('.TW');

    const cs = chg>=0?'+':'';

    const sc2=(l,v)=>`<div class="card"><div class="cl">${l}</div><div class="cv">${v}</div></div>`;
    const tc2=(l,v,sig,cls)=>`<div class="tc"><div class="tl">${l}</div><div class="tv">${v}</div><div class="ts ${cls}">${sig}</div></div>`;

    document.getElementById('res').innerHTML = `

${vals.length?vals.map(v=>`<tr><td><strong>${v.m}</strong></td><td style="font-size:.8rem;color:var(--muted)">${v.d}</td><td><strong>${v.t}</strong></td><td>${v.b}</td></tr>`).join(''):`<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:16px">${isOTC?'上櫃股財務資料目前無法透過公開API取得（P/E、EPS等顯示N/A屬正常）':'財務資料不足，無法計算（ETF 或缺少基本面資料）'}</td></tr>`}
</tbody></table></div>
<p style="font-size:.75rem;color:var(--muted);margin-top:8px">⚠️ 模型均為簡化估算，請搭配多個模型綜合判斷，不構成投資建議。</p>
</div>

${ptRows.length?`<div class="sec"><div class="st2">📍 買賣參考價位</div><div style="overflow-x:auto">
<table class="vt"><thead><tr><th>類型</th><th>價格</th><th>參考說明</th></tr></thead><tbody>
${ptRows.map(r=>`<tr><td class="${r.cls}">${r.icon} ${r.label}</td><td><strong class="${r.cls}">${r.val}</strong></td><td style="font-size:.8rem;color:var(--muted)">${r.note}</td></tr>`).join('')}
</tbody></table></div>
<p style="font-size:.75rem;color:var(--muted);margin-top:8px">⚠️ 以上價位僅供參考，操作前請搭配完整研究判斷。</p>
</div>`:''}

<div class="sec"><div class="st2">技術指標</div><div class="tgrid">
  ${ma5v!=null?tc2('MA5（週線）',f(ma5v),price>ma5v?'▲ 股價在MA5之上':'▼ 跌破MA5（短線轉弱）',price>ma5v?'sb':'ss'):''}
  ${ma20v!=null?tc2('MA20（月線）',f(ma20v),price>ma20v?'▲ 月線守護中':'▼ 跌破月線，轉弱',price>ma20v?'sb':'ss'):''}
  ${ma60v!=null?tc2('MA60（季線）',f(ma60v),price>ma60v?'▲ 季線以上（中線多頭）':'▼ 跌破季線（中線弱勢）',price>ma60v?'sb':'ss'):''}
  ${ma240v!=null?tc2('MA240（年線）',f(ma240v),price>ma240v?'▲ 年線之上（長線多頭）':'▼ 年線以下（長線弱勢）',price>ma240v?'sb':'ss'):''}
  ${r14!=null?tc2('RSI (14日)',f(r14,1),r14<30?'🔴 超賣區 (<30) 反彈機會':r14>70?'🟢 超買區 (>70) 注意拉回':'中性區間 (30~70)',r14<30?'sb':r14>70?'ss':'sn2'):''}
  ${mc?tc2('MACD (12,26,9)','DIF '+f(mc.dif,2),mc.dif>0&&mc.hist>0?'▲ 零軸上柱紅（多頭）':mc.dif<0&&mc.hist<0?'▼ 零軸下柱綠（空頭）':mc.hist>0?'柱狀翻紅（轉強）':'柱狀翻綠（轉弱）',mc.hist>0?'sb':'ss'):''}
  ${kdv?tc2('KD (9日)','K='+f(kdv.k,1)+' D='+f(kdv.d,1),kdv.k<20?'🔴 超賣K<20（反彈訊號）':kdv.k>80?'🟢 超買K>80（注意反轉）':'中性區間',kdv.k<20?'sb':kdv.k>80?'ss':'sn2'):''}
  ${bl?tc2('布林通道 (20日)',f(bl.upper)+'~'+f(bl.lower),price>bl.upper?'觸上軌（超買注意）':price<bl.lower?'觸下軌（超賣反彈）':'帶寬'+f(bl.bw*100,1)+'%'+(bl.bw<0.08?'（壓縮蓄勢）':''),price>bl.upper?'ss':price<bl.lower?'sb':'sn2'):''}
  ${ma5v&&ma20v?tc2('均線排列',price>ma5v&&ma5v>ma20v?'多頭排列':price<ma5v&&ma5v<ma20v?'空頭排列':'糾結整理',price>ma5v&&ma5v>ma20v?'▲ 強勢多頭排列':price<ma20v?'▼ 弱勢空頭排列':'MA線糾結等方向',price>ma5v&&ma5v>ma20v?'sb':price<ma20v?'ss':'sn2'):''}
  <div class="tc"><div class="tl">距52週區間位置</div><div class="tv">${pct52}</div><div class="ts sn2">0%=年低 / 100%=年高</div></div>
</div></div>

<div class="sec"><div class="st2">價格走勢圖（MA20 / MA60 / 成交量）</div>

  <button class="pbtn" onclick="setPd(250,this)">1年</button>
  <button class="pbtn" onclick="setPd(9999,this)">全部</button>
</div>
<div class="cw"><canvas id="pc"></canvas></div>
<p style="font-size:.75rem;color:var(--muted);margin-top:6px">藍=收盤價｜橘=MA20｜綠=MA60｜灰柱=成交量</p>
</div>

<hr class="divhr">
<p style="font-size:.75rem;color:var(--muted)">⚠️ 本工具僅供學習參考，不構成投資建議。台股資料：TWSE Open API｜美股/K線：Yahoo Finance｜查詢：${new Date().toLocaleString('zh-TW')}</p>`;

  } catch(e) {
    setSt('❌ '+e.message,true);
    console.error(e);

    btn.disabled=false;
