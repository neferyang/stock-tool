// 全局修補：安全地處理 toFixed
if (Number.prototype.toFixed) {
  const _origToFixed = Number.prototype.toFixed;
  Number.prototype.toFixed = function(digits) {
    try {
      if (this === null || this === undefined || isNaN(this) || !isFinite(this)) return 'N/A';
      return _origToFixed.call(this, digits);
    } catch(e) {
      console.warn('toFixed error:', this, e);
      return 'N/A';
    }
  };
}

// 全局錯誤處理
window.addEventListener('error', function(event) {
  console.error('Global error caught:', event.message, event.filename, event.lineno);
  if (event.message.includes('toFixed')) {
    event.preventDefault();
  }
});
</script>

// 財金早報改lazy load：只有使用者真的點進去才fetch daily-report.json）
let reportLoaded = false;
function switchTab(tab) {
  const panels = { valuation: 'tab-valuation', report: 'tab-report' };
  Object.entries(panels).forEach(([key, id]) => {
    document.getElementById(id).classList.toggle('hidden', key !== tab);
  });
  document.querySelectorAll('[data-tab-link]').forEach(a => {
    const active = a.dataset.tabLink === tab;
    a.style.color = active ? 'var(--text)' : 'var(--muted)';
    a.style.background = active ? '#fff' : '#f9fafb';
    a.style.borderBottomColor = active ? 'var(--accent)' : 'transparent';
  });
  if (location.hash.slice(1) !== tab) history.replaceState(null, '', '#' + tab);
  if (tab === 'report' && !reportLoaded) {
    reportLoaded = true;
    loadDailyReport();
  }
}
document.addEventListener('DOMContentLoaded', () => {
  switchTab(location.hash === '#report' ? 'report' : 'valuation');
});
</script>

// 財務數據更新進度顯示 (基於台股全市場 2,303 支：上市+上櫃+興櫃)
// ════════════════════════════════════════════════════════
async function updateProgressDisplay() {
  try {
    const TWSE_TOTAL = 2303;  // 台股全市場股票總數(上市1089+上櫃891+興櫃355，扣除無交易報價者)

    // 嘗試從GitHub Pages加載
    let dataUrl = 'financial-data-complete.json';
    const response = await fetch(dataUrl, {signal: AbortSignal.timeout(3000)});
    if (response.ok) {
      const data = await response.json();
      const stocks = data.stocks;
      let updated = 0;

      // 統計已更新的股票（有2025年數據且ROE不為null）
      Object.entries(stocks).forEach(([code, stock]) => {
        const yearData = stock.data.find(d => d.year === '2025');
        if (yearData && yearData.roe !== null && yearData.source !== null) {
          updated++;
        }
      });

      // 基於 TWSE 全市場總數計算百分比
      const pct = (updated / TWSE_TOTAL * 100).toFixed(1);

      // 更新表頭顯示
      document.getElementById('update-count').textContent = updated;
      document.getElementById('total-count').textContent = TWSE_TOTAL.toLocaleString();
      document.getElementById('update-pct').textContent = pct;

      // 進度條最大顯示 5%（避免條形太小看不見）
      const barWidth = Math.max(pct, 0.5);
      document.getElementById('progress-bar').style.width = Math.min(barWidth, 100) + '%';
    }
  } catch (e) {
    console.warn('進度更新失敗:', e.message);
  }
}

// 頁面加載時更新進度
document.addEventListener('DOMContentLoaded', updateProgressDisplay);

function searchStock(keyword) {
  if (!keyword || keyword.length < 1) return [];

  let results = [];
  const kw = keyword.toLowerCase();

  // 搜尋台股
  if (STOCK_CACHE && STOCK_CACHE.length > 0) {
    const twResults = STOCK_CACHE.filter(c=> {
      try {
        return (c.Code && c.Code.includes(keyword)) ||
               (c.CHName && c.CHName.toLowerCase().includes(kw)) ||
               (c.Name && c.Name.toLowerCase().includes(kw));
      } catch(e) {
        return false;
      }
    });
    results = results.concat(twResults);
  }

  // 搜尋美股
  if (US_STOCK_CACHE && US_STOCK_CACHE.length > 0) {
    const usResults = US_STOCK_CACHE.filter(c=> {
      try {
        return (c.Code && c.Code.toUpperCase().includes(keyword.toUpperCase())) ||
               (c.Name && c.Name.toLowerCase().includes(kw));
      } catch(e) {
        return false;
      }
    });
    results = results.concat(usResults);
  }

  // 去重並限制結果數量
  const seen = new Set();
  results = results.filter(r => {
    const key = `${r.Code}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 15);

  console.log(`[searchStock] 搜尋 "${keyword}" → 找到 ${results.length} 筆`);
  return results;
}

function displaySearchResults(results) {
  const resultsDiv = document.getElementById('search-results');
  const resultsList = document.getElementById('results-list');

  if (results.length === 0) {
    resultsList.innerHTML = '<li class="no-result">找不到相符的股票</li>';
    resultsDiv.classList.remove('hidden');
    return;
  }

  resultsList.innerHTML = results.map((r, idx) => {
    const isTW = r.Type && (r.Type.includes('上市') || r.Type.includes('上櫃') || r.Type.includes('興櫃'));
    const displayName = r.CHName || r.Name || r.Code;
    const typeLabel = isTW ? `<span style="color:#16a34a">🟢 ${r.Type || '上市'}</span>` : `<span style="color:#2563eb">🔵 美股</span>`;
    return `<li class="result-item" data-code="${r.Code}" data-name="${displayName}" data-idx="${idx}">\
      <div>\
        <strong>${displayName}</strong> (${r.Code})\
      </div>\
      ${typeLabel}\
    </li>`;
  }).join('');

  // 添加事件委託監聽
  resultsList.querySelectorAll('.result-item').forEach(item => {
    item.addEventListener('click', function() {
      const code = this.getAttribute('data-code');
      const name = this.getAttribute('data-name');
      selectStock(code, name);
    });
  });

  resultsDiv.classList.remove('hidden');
}

function selectStock(code, name) {
  document.getElementById('ti').value = code;
  document.getElementById('search-results').classList.add('hidden');
  go();
}

// 搜尋輸入框事件監聽 - 改進版（兼容不同加載時機）
function initSearchFeature() {
  console.log('[initSearchFeature] Starting...');

  // 立即初始化 STOCK_CACHE 和 US_STOCK_CACHE（不等待異步完成）
  initStockCache().then(() => {
    console.log('[initSearchFeature] STOCK_CACHE ready:', STOCK_CACHE ? STOCK_CACHE.length : 0);
  });

  initUSStockCache().then(() => {
    console.log('[initSearchFeature] US_STOCK_CACHE ready:', US_STOCK_CACHE ? US_STOCK_CACHE.length : 0);
  });

  const input = document.getElementById('ti');
  if (!input) {
    console.warn('[initSearchFeature] Input element not found, retrying...');
    setTimeout(initSearchFeature, 100);
    return;
  }

  console.log('[initSearchFeature] Input element found, binding events');

  // 搜尋去抖動（Debounce）：延遲 300ms 才執行搜尋，避免重複計算
  let searchTimeout = null;
  input.addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    const keyword = e.target.value.trim();

    if (keyword.length === 0) {
      document.getElementById('search-results').classList.add('hidden');
      return;
    }

    // 延遲 300ms 執行搜尋
    searchTimeout = setTimeout(() => {
      const results = searchStock(keyword);
      console.log('[searchInput] Debounced search found', results.length, 'results for:', keyword);
      displaySearchResults(results);
    }, 300);
  });

  // 點擊外部關閉下拉菜單
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.sbox')) {
      document.getElementById('search-results').classList.add('hidden');
    }
  });
}

// 多種方式觸發初始化（確保成功）
if (document.readyState === 'loading') {

} else {
  initSearchFeature();
}

// v8/chart：台股美股都可透過 corsproxy 抓到
async function yfFetch(sym) {
  const url1 = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2y`;
  const url2 = `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=2y`;
  const hdrs = {'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36','Accept':'application/json'};

  // 直連（美股通常可用）
  for (const url of [url1, url2]) {
    try {
      const r = await fetch(url, {headers:hdrs, signal:AbortSignal.timeout(8000)});
      if (r.ok) { const d = await r.json(); if (d?.chart?.result?.[0]) return d.chart.result[0]; }
    } catch(e) {}
  }

  // corsproxy 備援（台股靠這個）
  console.log('[yfFetch] trying corsproxy for', sym);
  try {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url1), {signal:AbortSignal.timeout(18000)});
    console.log('[yfFetch] corsproxy status:', r.status, 'for', sym);
    if (r.ok) {
      const d = await r.json();
      if (d?.chart?.result?.[0]) { console.log('[yfFetch] corsproxy ok'); return d.chart.result[0]; }
      // 404 = 代號不存在
      if (r.status === 404) return null;
    }
    if (r.status === 404) return null;
  } catch(e) { console.log('[yfFetch] corsproxy error:', e.message); }
  return null;
}

// 公開資訊觀測站公告集成 (P1 優化版)
// ════════════════════════════════════════════════════════
async function newsAnnouncementsFetch(code) {
  if (!code) return null;
  try {
    console.log(`[公告] 正在查詢 ${code} 的最新公告...`);

    // 方案 A：TWSE 重大訊息 API（推薦）
    // ────────────────────────────────────────────────
    try {
      const mopsUrl = `https://openapi.twse.com.tw/v1/mopsfin/mops_t187ap05_${code}`;
      const r = await fetch(mopsUrl, {signal:AbortSignal.timeout(8000)});

      if (r.ok) {
        const data = await r.json();
        if (Array.isArray(data) && data.length > 0) {
          // 排序並取前 10 則
          const sorted = data.sort((a, b) => {
            const dateA = a.Date || a['公告日期'] || '0000-00-00';
            const dateB = b.Date || b['公告日期'] || '0000-00-00';
            return dateB.localeCompare(dateA);
          }).slice(0, 10);

          const items = sorted.map(item => ({
            date: item.Date || item['公告日期'] || '',
            title: item.Title || item['公告標題'] || item['新聞標題'] || '',
            type: item.Type || (item['公告標題']?.includes('重大') ? 'M' : 'C'),
            url: item.URL || item['連結'] || null
          })).filter(x => x.title);

          if (items.length > 0) {
            console.log(`[公告] ✅ TWSE API 成功取得 ${items.length} 則公告`);
            return {
              items: items,
              count: data.length,
              lastDate: items[0]?.date || '',
              source: 'TWSE'
            };
          }
        }
      }
    } catch(twseErr) {
      console.log('[公告] TWSE API 失敗:', twseErr.message);
    }

    // 方案 B：MOPS 網站爬蟲（備援）
    // ────────────────────────────────────────────────
    try {
      // MOPS 公開資訊觀測站查詢 URL
      const mopsPageUrl = `https://mops.twse.com.tw/mops/web/t05_query?code=${code}`;
      console.log(`[公告] 使用備援方案，爬取 MOPS 頁面...`);

      const pageResp = await fetch(mopsPageUrl, {signal:AbortSignal.timeout(8000)});
      if (pageResp.ok) {
        const html = await pageResp.text();

        // 正則匹配公告列表（簡單解析）
        // <tr><td>日期</td><td>公司</td><td>標題</td><td>...</td></tr>
        const pattern = /<tr[^>]*>[\s\S]*?<\/tr>/g;
        const rows = html.match(pattern) || [];

        const items = [];
        for (let row of rows.slice(1, 11)) {  // 取前 10 則（跳過表頭）
          const cellPattern = /<td[^>]*>([^<]+)<\/td>/g;
          const cells = [];
          let cell;
          while ((cell = cellPattern.exec(row)) !== null) {
            cells.push(cell[1].trim());
          }

          if (cells.length >= 3) {
            items.push({
              date: cells[0] || '',
              title: cells[2] || '',
              type: cells[2]?.includes('重大') ? 'M' : 'C',
              url: null
            });
          }
        }

        if (items.length > 0) {
          console.log(`[公告] ✅ MOPS 爬蟲成功取得 ${items.length} 則公告`);
          return {
            items: items,
            count: items.length,
            lastDate: items[0]?.date || '',
            source: 'MOPS'
          };
        }
      }
    } catch(mopsErr) {
      console.log('[公告] MOPS 爬蟲失敗:', mopsErr.message);
    }

  } catch(e) {
    console.warn('[公告] 公告查詢異常:', e.message);
  }

  // 備援方案：回傳參考公告連結
  console.log('[公告] ⚠️ 使用備援方案');
  return {
    items: [{
      date: new Date().toISOString().split('T')[0],
      title: '📌 查詢公開資訊觀測站瞭解最新公告',
      type: 'C',
      url: `https://mops.twse.com.tw/mops/web/t05_query?code=${code}`
    }],
    count: 0,
    lastDate: '',
    source: 'FALLBACK'
  };
}

async function loadLatestIndustryData() {
  try {
    if (!FINANCIAL_DATA_CACHE) {
      const resp = await fetch('financial-data-complete.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      FINANCIAL_DATA_CACHE = data.stocks || {};
    }
    COMPANY_INDUSTRY_MAP = new Map();
    for (const [code, s] of Object.entries(FINANCIAL_DATA_CACHE)) {
      if (s && s.industry) COMPANY_INDUSTRY_MAP.set(code, s.industry);
    }
    lastIndustrySync = new Date();
    console.log(`[產業數據] 從本地財報庫載入 ${COMPANY_INDUSTRY_MAP.size} 家企業官方分類`);
    return COMPANY_INDUSTRY_MAP.size > 0;
  } catch (e) {
    console.warn('[產業數據] 本地分類載入失敗:', e.message, '將使用關鍵字備援');
    lastIndustrySync = null;
    return false;
  }
}

if (typeof document !== 'undefined') {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadLatestIndustryData);

    loadLatestIndustryData();
  }
}

function classifyIndustry(sym, name, sector, industry) {
  let result = {industry:'unknown', confidence:'low', details:{}};

  // ─────────────────────────────────────────────────────────
  // L0：ETF 判斷（最優先）
  // ─────────────────────────────────────────────────────────
  const symU = sym.toUpperCase();
  const nm = (name||'').toLowerCase();
  if (/^00\d{2,3}/.test(sym.replace('.TW','')) || nm.includes('etf') ||
      ['SPY','QQQ','VTI','VOO','VUG','IVV','SCHX','DIA','IWM','VTV','VOE','VBR','VWO','BND','BLV','BSV'].includes(symU)) {
    return {industry:'etf', confidence:'high', details:{method:'ETF特徵'}};
  }

  // ─────────────────────────────────────────────────────────
  // L0.5：官方企業分類映射（TWSE/TPEX OpenAPI - 最高準確度）✅ 已啟用
  // ─────────────────────────────────────────────────────────
  if (typeof COMPANY_INDUSTRY_MAP !== 'undefined' && COMPANY_INDUSTRY_MAP.size > 0) {
    const code = sym.replace('.TW','').replace('.TWO','');
    if (COMPANY_INDUSTRY_MAP.has(code)) {
      const officialIndustry = COMPANY_INDUSTRY_MAP.get(code);
      console.log(`[L0.5] ${code} → ${officialIndustry} (官方TWSE/TPEX映射)`);

// 技術指標
// ════════════════════════════════════════════════════════
const maVal = (a,n) => { const c=a.filter(v=>v!=null); return c.length<n?null:c.slice(-n).reduce((s,v)=>s+v,0)/n; };
const maLine = (a,n) => a.map((_,i)=>{ if(i<n-1)return null; const sl=a.slice(i-n+1,i+1); return sl.some(v=>v==null)?null:sl.reduce((s,v)=>s+v,0)/n; });
function emaVal(a,n){ const c=a.filter(v=>v!=null); if(c.length<n)return null; const k=2/(n+1); let e=c.slice(0,n).reduce((s,v)=>s+v,0)/n; for(let i=n;i<c.length;i++)e=c[i]*k+e*(1-k); return e; }
function rsiVal(a,n=14){ const c=a.filter(v=>v!=null); if(c.length<n+1)return null; let g=0,l=0; for(let i=c.length-n;i<c.length;i++){const d=c[i]-c[i-1];if(d>0)g+=d;else l-=d;} return 100-100/(1+(g/(l||1e-9))); }
function macdVal(a){ const c=a.filter(v=>v!=null); if(c.length<35)return null; const st=Math.max(0,c.length-70); const difs=[]; for(let i=st;i<c.length;i++){const sub=c.slice(0,i+1);const e12=emaVal(sub,12),e26=emaVal(sub,26);if(e12&&e26)difs.push(e12-e26);} if(difs.length<9)return null; const dif=difs[difs.length-1],dea=emaVal(difs,9); return{dif,dea,hist:dif-(dea||0)}; }
function kdVal(hi,lo,cl,n=9){ const h=hi.filter(v=>v!=null).slice(-n),l=lo.filter(v=>v!=null).slice(-n),last=cl.filter(v=>v!=null).slice(-1)[0]; const hh=Math.max(...h),ll=Math.min(...l); const rsv=hh===ll?50:(last-ll)/(hh-ll)*100; return{k:rsv*(2/3)+50*(1/3),d:rsv*(2/9)+50*(7/9)}; }
function bollVal(a,n=20){ const c=a.filter(v=>v!=null); if(c.length<n)return null; const sl=c.slice(-n),mid=sl.reduce((s,v)=>s+v,0)/n,std=Math.sqrt(sl.reduce((s,v)=>s+(v-mid)**2,0)/n); return{upper:mid+2*std,mid,lower:mid-2*std,bw:(4*std)/mid}; }

const f = (n,d=2) => {try{if(n==null||isNaN(n)||!isFinite(n))return'N/A';return Number(n).toFixed(d);}catch(e){return'N/A';}};
const fp = (n,d=1) => {try{if(n==null||isNaN(n)||!isFinite(n))return'N/A';return Number(n).toFixed(d)+'%';}catch(e){return'N/A';}};
function fB(n){if(!n||isNaN(n))return'N/A';const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2)+' T';if(a>=1e9)return(n/1e9).toFixed(2)+' B';if(a>=1e6)return(n/1e6).toFixed(2)+' M';return n.toFixed(0);}
function bdg(est,cur){ if(est==='N/A'||!cur||isNaN(parseFloat(est)))return'<span class="badge bn">資料不足</span>'; const r=cur/parseFloat(est); if(r<0.88)return'<span class="badge bl">偏低 ✓</span>'; if(r>1.15)return'<span class="badge bh">偏高 !</span>'; return'<span class="badge bf">合理</span>'; }

function calcVals(price, m, indKey, indObj) {
  const pe = m.pe, pb = m.pb, div = m.div, divYield = m.divYield;
  const eps = m.eps, roe = m.roe, beta = m.beta;
  const res = [];

  // 從產業資料庫取得估值參數
  const params = getIndustryParams(indKey);
  const indName = indObj ? indObj.name : params.name;

  // ── 1. P/E 評估 ──────────────────────────────────────────
  if (pe && pe > 0 && pe < 500) {
    const fairPE = params.fairPE || 16;
    const sig = pe < fairPE*0.8 ? '<span class="badge bl">低估 ✓</span>' : pe < fairPE ? '<span class="badge bl">合理偏低</span>' : pe < fairPE*1.3 ? '<span class="badge bf">合理</span>' : '<span class="badge bh">偏高 !</span>';
    // 合理區間：fairPE*0.8 ~ fairPE*1.3（低估到高估的邊界）
    res.push({m:'P/E 本益比評估', d:`目前P/E=${f(pe,1)}（${indName}合理區間：${Math.round(fairPE*0.8)}~${Math.round(fairPE*1.3)}x，fairPE=${fairPE}x）`, t:f(pe,1)+'x', b:sig});
  }

  // ── 2. P/B 淨值估價 ───────────────────────────────────────
  if (pb && pb > 0) {
    const fairPB = params.fairPB || 2.5;
    const bv = price / pb;
    const tgt = bv * fairPB;
    const sig = pb<=fairPB?'<span class="badge bl">合理 ✓</span>':pb<=fairPB*1.5?'<span class="badge bf">偏高</span>':'<span class="badge bh">偏高 !</span>';
    res.push({m:'P/B 淨值估價', d:`每股淨值≈${f(bv)} × 合理P/B ${fairPB}x（目前P/B=${f(pb,1)}，${indName}合理上限${fairPB}x）`, t:f(tgt), b:sig});
  }

  // ── 3. 殖利率防線 ─────────────────────────────────────────
  if (div && div > 0) {
    const yFloor = (params.fairYield || 4) / 100;
    const tgt = div / yFloor;
    res.push({m:`殖利率防線（${f(yFloor*100,1)}%）`, d:`現金股利 ${f(div)} ÷ ${f(yFloor*100,1)}%（機構被動買盤支撐價）`, t:f(tgt), b:bdg(f(tgt),price)});
  }

  // ── 4. GGM 股息折現 ───────────────────────────────────────
  if (div && div > 0) {
    const g = 0.03, r = 0.07;
    const ggm = (div * (1+g)) / (r - g);
    res.push({m:'GGM 股息折現', d:`D₁=${f(div*(1+g))} ÷ (r=7% − g=3%)`, t:f(ggm), b:bdg(f(ggm),price)});
  }

  // ── 5. 殖利率合理價 ───────────────────────────────────────
  if (divYield && divYield > 0) {
    const fairY = params.fairDiv > 0 ? Math.min(params.fairDiv, 5) : 4.5;
    const tgt = price * (divYield / fairY);
    res.push({m:`殖利率合理價（目標${fairY}%）`, d:`目前殖利率${f(divYield,2)}%，目標${fairY}%反算合理價`, t:f(tgt), b:bdg(f(tgt),price)});
  }

  // ── 6. DCF 簡化 ───────────────────────────────────────────
  if (eps && eps > 0) {
    const wacc = beta ? Math.min(Math.max(0.05+beta*0.045,0.07),0.14) : 0.09;
    // 根據產業調整成長率
    const gHigh = indKey.includes('software') || indKey.includes('cloud') ? 0.15 :
                  indKey.includes('biotech') || indKey.includes('medical') ? 0.12 :
                  indKey.includes('cycle') || indKey.includes('steel') ? 0.05 : 0.08;
    let dcf=0, cf=eps;
    for(let i=1;i<=5;i++){cf*=(1+gHigh);dcf+=cf/Math.pow(1+wacc,i);}
    const tv=(cf*1.03)/(wacc-0.03); dcf+=tv/Math.pow(1+wacc,5);
    res.push({m:'DCF 簡化估值', d:`WACC=${f(wacc*100,1)}%，EPS=${f(eps)}，成長${f(gHigh*100,0)}%×5年後終值`, t:f(dcf), b:bdg(f(dcf),price)});
  }

  // ── 7. EV/EBITDA ─────────────────────────────────────────
  if (m.evEbitda && m.evEbitda > 0 && m.evEbitda < 200) {
    const fair = params.evEbitda || 10;
    const sig = m.evEbitda<fair*0.8?'<span class="badge bl">偏低 ✓</span>':m.evEbitda>fair*1.3?'<span class="badge bh">偏高 !</span>':'<span class="badge bf">合理</span>';
    res.push({m:'EV/EBITDA', d:`目前${f(m.evEbitda)}x（${indName}合理區間約${Math.round(fair*0.7)}~${fair}x）`, t:f(m.evEbitda)+'x', b:sig});
  }

  // ── 8. RIM（金融業）─────────────────────────────────────
  if (indKey.includes('bank') || indKey.includes('insurance') || indKey.includes('securities')) {
    if (pb && roe && pb>0) {
      const bv = price/pb;
      const tgt = Math.max(bv*(1+(roe/100-0.08)/0.08), bv*0.7);
      res.push({m:'RIM 剩餘盈餘模型', d:`淨值≈${f(bv)} × (1+(ROE ${f(roe,1)}%−8%)/8%)（適合金融業）`, t:f(tgt), b:bdg(f(tgt),price)});
    }
  }

  // ── 9. PEG ───────────────────────────────────────────────
  if (m.peg && m.peg > 0 && m.peg < 20) {
    const sig = m.peg<1?'<span class="badge bl">PEG<1 低估</span>':m.peg<2?'<span class="badge bf">PEG 合理</span>':'<span class="badge bh">PEG>2 偏貴</span>';
    res.push({m:'PEG 本益成長比', d:`PEG=${f(m.peg)}（<1視為低估，適合高成長股，PEG=P/E÷盈餘成長率）`, t:f(m.peg), b:sig});
  }

  return res;
}

// ── 買賣建議價位 ──────────────────────────────────────────────────────────────
function calcPriceTargets(price, m, tech, indKey) {
  const hi52=m['52hi'], lo52=m['52lo'];
  const pe=m.pe, pb=m.pb, div=m.div, eps=m.eps;
  const rows = [];

  const params = getIndustryParams(indKey);

  // 技術面
  if (lo52) rows.push({cls:'pt-sup', icon:'▲', label:'52週低點支撐', val:f(lo52), note:'跌破此價位風險增加，止損參考'});
  if (hi52) rows.push({cls:'pt-res', icon:'▼', label:'52週高點壓力', val:f(hi52), note:'突破此價位可能加速上漲，觀察量能'});
  if (hi52&&lo52) {
    rows.push({cls:'pt-neu', icon:'◆', label:'52週中間價（黃金分割）', val:f(lo52+(hi52-lo52)*0.618), note:'費波那契 61.8% 支撐/壓力'});
  }

  // 技術指標衍生
  const ma20=tech.ma20, ma60=tech.ma60, ma240=tech.ma240;
  if (ma20) rows.push({cls:'pt-sup', icon:'▲', label:'MA20 月線支撐', val:f(ma20), note:'短線多空分界，跌破轉弱'});
  if (ma60) rows.push({cls:'pt-sup', icon:'▲', label:'MA60 季線支撐', val:f(ma60), note:'中線多空分界，重要支撐'});
  if (ma240) rows.push({cls:'pt-sup', icon:'▲', label:'MA240 年線支撐', val:f(ma240), note:'長線牛熊分界'});

  // 基本面
  if (pe && pe > 0 && eps > 0) {
    const fairPE = params.fairPE || 16;
    rows.push({cls:'pt-buy', icon:'🟢', label:`合理買進價（P/E=${fairPE}x）`, val:f(eps*fairPE), note:`EPS=${f(eps)} × 合理P/E ${fairPE}x`});
    rows.push({cls:'pt-buy', icon:'🟢', label:`強力買進價（P/E=${Math.round(fairPE*0.75)}x）`, val:f(eps*fairPE*0.75), note:'折讓25%，低估明顯時考慮積極買入'});
    rows.push({cls:'pt-sell', icon:'🔴', label:`合理賣出價（P/E=${Math.round(fairPE*1.2)}x）`, val:f(eps*fairPE*1.2), note:'超過合理P/E 20%，考慮分批減碼'});
    rows.push({cls:'pt-sell', icon:'🔴', label:`停利參考價（P/E=${Math.round(fairPE*1.5)}x）`, val:f(eps*fairPE*1.5), note:'明顯超漲區，積極停利'});
  }

  // 殖利率防線
  if (div && div > 0) {
    const yFloor = (params.fairYield || 4) / 100;
    rows.push({cls:'pt-sup', icon:'▲', label:`殖利率防線（${f(yFloor*100,1)}%）`, val:f(div/yFloor), note:'機構被動買盤支撐，跌破視為異常'});
  }

  // 布林通道
  if (tech.bollU && tech.bollL) {
    rows.push({cls:'pt-buy', icon:'🟢', label:'布林下軌（短線超賣）', val:f(tech.bollL), note:'觸及下軌可短線反彈，注意量能確認'});
    rows.push({cls:'pt-sell', icon:'🔴', label:'布林上軌（短線超買）', val:f(tech.bollU), note:'觸及上軌注意拉回，追高需謹慎'});
  }

  return rows;
}

// ── 綜合建議 ─────────────────────────────────────────────────────────────────
function mkVerdict(price, vals, tech, indKey, indObj, m) {
  let bull=0, bear=0;
  vals.forEach(v=>{ if(v.b.includes('低估')||v.b.includes('偏低')||v.b.includes('合理偏低')||v.b.includes('PEG<1'))bull++; if(v.b.includes('偏高'))bear++; });
  if(tech.rsi<35)bull++; if(tech.rsi>70)bear++;
  if(tech.macdBull)bull++; if(tech.macdBear)bear++;
  if(tech.kd<25)bull++; if(tech.kd>80)bear++;
  const lo=f(m['52lo']), hi=f(m['52hi']);
  const indName = indObj ? indObj.name : getIndustryParams(indKey).name;

  // 融合公告信號（P1 優化版）
  let newsSummary = '';
  let majorNewsWarning = '';
  if (m.news && m.news.length > 0) {
    const latestNews = m.news[0].title;
    const newsPreview = latestNews.length > 40 ? latestNews.substring(0, 40) + '...' : latestNews;
    newsSummary = `\n📰 最新公告 (${m.lastNewsDate})：${newsPreview}`;

    // 重大訊息警示
    if (m.majorNewsCount > 0) {
      majorNewsWarning = `\n⚠️ 注意：本公司有 ${m.majorNewsCount} 則重大訊息，建議查詢公開資訊觀測站瞭解詳細內容，再做決策。`;
    }
  }

  // 決策邏輯考慮公告因素
  const newsAdjustment = (m.majorNewsCount > 0) ? ' (🔴有重大訊息，建議謹慎)' : '';

  if(bull>=2&&bull>bear) {
    const buyWarn = m.majorNewsCount > 0 ? ' 但請先確認重大訊息內容。' : '';
    return{t:'buy',ti:'🟢 估值偏低，可考慮買進或分批布局'+newsAdjustment,bo:`多個估值模型顯示股價低於合理價值，技術面亦出現超賣或反彈訊號。適合${indKey==='etf'?'定期定額或逢低加碼':'確認右側方向後分批建倉'}${buyWarn}52週低點 ${lo} 為重要支撐，請設好停損點。${newsSummary}${majorNewsWarning}`};
  }
  if(bear>=2&&bear>bull) {
    return{t:'sell',ti:'🔴 估值偏高，建議謹慎或考慮減碼',bo:`多個估值模型顯示股價已超過合理估值，技術面亦有超買跡象。持有者可考慮分批減碼或設停利。52週高點 ${hi} 為強阻力，留意回落風險。${newsSummary}${majorNewsWarning}`};
  }
  return{t:'hold',ti:'🟡 估值合理，持有觀望'+newsAdjustment,bo:`目前股價處於合理估值區間，多空訊號混合。建議持有並觀察突破方向，關注下次財報及產業動向。參考區間：${lo} ~ ${hi}。${newsSummary}${majorNewsWarning}`};
}

// 1. ROE 評估（股神巴菲特最看重的指標）
function evaluateROE(roe) {
  if (roe > 20) return { level: '🌟傑出', color: '#10b981', score: 5, desc: '超一流企業，長期投資首選' };
  if (roe > 15) return { level: '🟢優秀', color: '#16a34a', score: 4, desc: '優質企業，值得關注' };
  if (roe > 10) return { level: '🔵良好', color: '#3b82f6', score: 3, desc: '普通企業，中等水準' };
  if (roe > 5) return { level: '🟡一般', color: '#eab308', score: 2, desc: '弱勢企業，需觀察' };
  return { level: '🔴警告', color: '#ef4444', score: 1, desc: '問題企業，應迴避' };
}

// 2. 營業利益率評估（檢驗本業賺錢能力）
function evaluateOperatingMargin(margin) {
  if (margin > 20) return { level: '🌟傑出', color: '#10b981', score: 5, desc: '本業盈利能力超強' };
  if (margin > 15) return { level: '🟢優秀', color: '#16a34a', score: 4, desc: '本業盈利能力很好' };
  if (margin > 10) return { level: '🔵良好', color: '#3b82f6', score: 3, desc: '本業盈利能力尚可' };
  if (margin > 5) return { level: '🟡一般', color: '#eab308', score: 2, desc: '本業盈利能力普通' };
  if (margin > 0) return { level: '⚠️ 偏弱', color: '#f97316', score: 2, desc: '本業盈利能力較弱' };
  return { level: '🔴警告', color: '#ef4444', score: 1, desc: '本業無法盈利' };
}

// 3. 淨利率評估（最終獲利能力，數據永遠可算、不受淨損影響）
function evaluateNetMargin(margin) {
  if (margin > 20) return { level: '🌟傑出', color: '#10b981', score: 5, desc: '獲利能力超強' };
  if (margin > 15) return { level: '🟢優秀', color: '#16a34a', score: 4, desc: '獲利能力很好' };
  if (margin > 10) return { level: '🔵良好', color: '#3b82f6', score: 3, desc: '獲利能力尚可' };
  if (margin > 5) return { level: '🟡一般', color: '#eab308', score: 2, desc: '獲利能力普通' };
  if (margin > 0) return { level: '⚠️ 偏弱', color: '#f97316', score: 2, desc: '獲利能力較弱' };
  return { level: '🔴警告', color: '#ef4444', score: 1, desc: '本期淨損，體質堪憂' };
}

// 4. 負債比率評估（財務風險評估）
function evaluateDebtRatio(ratio, industry = 'general') {
  // 金融業和高槓桿行業標準不同
  let thresholds = { safe: 50, warning: 70 };
  if (['金融保險業', '28'].includes(industry)) {
    thresholds = { safe: 80, warning: 90 };
  }

  if (ratio < 30) return { level: '🌟非常健康', color: '#10b981', score: 5, desc: '財務結構極強' };
  if (ratio < thresholds.safe) return { level: '🟢健康', color: '#16a34a', score: 4, desc: '財務結構良好' };
  if (ratio < thresholds.warning) return { level: '🔵可接受', color: '#3b82f6', score: 3, desc: '財務結構一般' };
  if (ratio < 90) return { level: '⚠️ 需注意', color: '#f97316', score: 2, desc: '負債較高，需監控' };
  return { level: '🔴高風險', color: '#ef4444', score: 1, desc: '負債過高，風險大' };
}

// 綜合評分函數
function calculateHealthScore(roe, operatingMargin, netMargin, debtRatio, industry) {
  const roeScore = evaluateROE(roe).score;
  const opMarginScore = evaluateOperatingMargin(operatingMargin).score;
  const netMarginScore = evaluateNetMargin(netMargin).score;
  const debtScore = evaluateDebtRatio(debtRatio, industry).score;

  const avgScore = (roeScore + opMarginScore + netMarginScore + debtScore) / 4;

  if (avgScore >= 4.5) return { level: '★★★★★ 一流企業', color: '#10b981' };
  if (avgScore >= 3.5) return { level: '★★★★ 優質企業', color: '#16a34a' };
  if (avgScore >= 2.5) return { level: '★★★ 普通企業', color: '#3b82f6' };
  if (avgScore >= 1.5) return { level: '★★ 問題企業', color: '#eab308' };

  return { level: '★ 風險企業', color: '#ef4444' };
}

// 健康評分色卡轉 RGB，供卡片背景漸層使用（避免只認得 #10b981 一種顏色）
function healthScoreRGB(hex) {
  const map = { '#10b981':'16,185,129', '#16a34a':'22,163,74', '#3b82f6':'59,130,246', '#eab308':'234,179,8', '#ef4444':'239,68,68' };
  return map[hex] || '37,99,235';
}

function calcFinancialTrend(data) {
  // 計算財報趨勢（5年年增率）
  if (!data || data.length === 0) return [];

  const trends = [];

  // 從新到舊迭代（data 已按年度排序：2024, 2023, 2022, ...）
  for (let i = 0; i < data.length; i++) {
    const curr = data[i];
    const prev = data[i + 1] || null;  // 上一年（如果存在）

    // 計算各項年增率（與前一年比較）- 只計算 EPS 年增率
    let epsGrowth = null;

    if (prev) {
      if (curr.eps !== null && prev.eps !== null && prev.eps !== 0) {
        epsGrowth = ((curr.eps - prev.eps) / Math.abs(prev.eps) * 100);
      }
    }

    trends.push({
      year: curr.year,
      eps: { val: curr.eps, growth: epsGrowth, actual: curr.epsActual ?? null },
      roe: { val: curr.roe, actual: curr.roeActual ?? null },  // 只顯示值，不顯示年增率（已是百分比）
      netMargin: { val: curr.netMargin },  // 只顯示值，不顯示年增率（已是百分比）
      debtRatio: { val: curr.debtRatio },  // 只顯示值
      isEstimate: !!curr.isEstimate,
      partialQuarters: curr.partialQuarters || null
    });
  }

  return trends;
}

async function go(){
  let raw=document.getElementById('ti').value.trim().toUpperCase();
  if(!raw)return;
  const isNumeric = /^\d{4,6}$/.test(raw);
  let ticker = isNumeric ? raw+'.TW' : raw;
  const btn=document.getElementById('btn');btn.disabled=true;
  setSt('<span class="spin"></span>查詢 '+ticker+'...',false);
  document.getElementById('res').classList.add('hidden');

  try{
    setSt('<span class="spin"></span>抓取資料中...',false);

    // 台股：先試 .TW，失敗再試 .TWO（上櫃股）
    let chartResult = null;
    if (isNumeric) {
      chartResult = await yfFetch(raw+'.TW');
      if (!chartResult) {
        ticker = raw+'.TWO';
        setSt('<span class="spin"></span>嘗試上櫃代號 '+ticker+'...',false);
        chartResult = await yfFetch(raw+'.TWO');
      }
    } else {
      chartResult = await yfFetch(ticker);
    }

    const isTW = ticker.endsWith('.TW') || ticker.endsWith('.TWO');
    const isOTC = ticker.endsWith('.TWO'); // 上櫃

    // 並行抓取基本面資料
    const code = ticker.replace('.TW','').replace('.TWO','');
    const [twseArr, tpexArr, summaryResult, newsResult, finnhubResult, financialResult] = await Promise.all([
      (!isOTC && isTW) ? twseFetch() : Promise.resolve(null),  // 上市 TWSE
      isOTC ? tpexFetch() : Promise.resolve(null),              // 上櫃 TPEX
      yfSummary(ticker),                                        // 所有股票都試（美股直連，台股走proxy）
      isTW ? newsAnnouncementsFetch(code) : Promise.resolve(null),  // P1：公開資訊觀測站公告
      !isTW ? finnhubFetch(ticker) : Promise.resolve(null),     // v4.18：美股 Finnhub 基本面數據（優化版）
      isTW ? getFinancialData(code, isTW) : Promise.resolve(null)  // v4.22：歷年財報數據
    ]);

    // P2：法人數據（暫時禁用，使用默認值避免超時）
    const finmindResult = null;
    const finconfResult = null;

    if (!chartResult) throw new Error('無法取得資料，請確認代號是否正確（台股用數字，美股用英文）');

    const meta = chartResult.meta || {};
    const price = meta.regularMarketPrice || meta.price;
    if (!price) throw new Error('無法取得股價，請稍後再試');

    // K線資料
    const ts=chartResult.timestamp||[],q=chartResult.indicators?.quote?.[0]||{};
    const closes=q.close||[],highs=q.high||[],lows=q.low||[],vols=q.volume||[];

    // 過濾有效數據：價格 > 0，且非重複數據
    const idx=ts.map((_,i)=>i).filter(i=>{
      if(closes[i]==null || closes[i]<=0) return false;
      // 若與前一根相同且成交量為 0，視為無效（當日盤中未結束）
      if(i > 0 && closes[i] === closes[i-1] && (!vols[i] || vols[i]===0)) return false;
      return true;
    });

    AD=idx.map(i=>{const d=new Date(ts[i]*1000);return`${d.getMonth()+1}/${d.getDate()}`;});
    AP=idx.map(i=>closes[i]);
    const AH=idx.map(i=>highs[i]||closes[i]);
    const AL=idx.map(i=>lows[i]||closes[i]);
    AV=idx.map(i=>vols[i]||0);

    // 基本面資料整合
    function raw2(o){return(o&&typeof o==='object'&&'raw'in o)?o.raw:o;}
    let m = {
      '52hi': meta.fiftyTwoWeekHigh,
      '52lo': meta.fiftyTwoWeekLow,
      pe:null, pb:null, div:null, divYield:null,
      eps:null, roe:null, evEbitda:null, peg:null,
      marketCap:null, grossMargin:null, name:'', sector:'', industry:'', quoteType:''
    };

    // TWSE 上市資料
    if (twseArr) {
      const no = ticker.replace('.TW','').replace('.TWO','');
      const row = twseArr.find(r=>r.Code===no);
      if (row) {
        if (row.PEratio && row.PEratio!=='-') m.pe = parseFloat(row.PEratio);
        if (row.PBratio && row.PBratio!=='-') m.pb = parseFloat(row.PBratio);
        if (row.DividendYield && row.DividendYield!=='-') m.divYield = parseFloat(row.DividendYield);
        if (m.pe && m.pe>0) m.eps = price / m.pe;
        if (m.divYield) m.div = price * m.divYield / 100;
        if (row.Name) m.name = row.Name;
        // TWSE 額外財務數據（如果提供）
        if (row.OutstandingShares && !isNaN(row.OutstandingShares)) {
          const shares = parseFloat(row.OutstandingShares);
          m.marketCap = price * shares;
        }
        if (row.ROE && row.ROE!=='-') m.roe = parseFloat(row.ROE);
        if (row.GrossMargin && row.GrossMargin!=='-') m.grossMargin = parseFloat(row.GrossMargin);
      }
    }

    // TPEX 上櫃資料（格式同 BWIBBU_d：Code, Name, PEratio, PBratio, DividendYield）
    if (tpexArr) {
      const no = ticker.replace('.TWO','').replace('.TW','');
      if (tpexArr.length > 0) console.log('[TPEX] sample keys:', Object.keys(tpexArr[0]).join(', '));
      // 同時嘗試多種欄位名稱（TPEX API 可能不同）
      const row = tpexArr.find(r =>
        r.Code===no || r['股票代號']===no || r.StockCode===no ||
        r.SecuritiesCompanyCode===no || r['代號']===no
      );
      console.log('[TPEX] row for', no, ':', row ? JSON.stringify(row) : 'NOT FOUND');
      if (row) {
        // 欄位名稱：BWIBBU_d 格式 OR TPEX 格式
        const pe = row.PEratio || row['本益比'] || row.PriceEarningRatio;
        const pb = row.PBratio || row['股價淨值比'] || row.PriceBookRatio;
        const dy = row.DividendYield || row['殖利率'];
        const nm = row.Name || row['名稱'] || row['股票名稱'] || row.CompanyName;
        if (pe && pe!=='-' && pe!=='--') m.pe = parseFloat(pe);
        if (pb && pb!=='-' && pb!=='--') m.pb = parseFloat(pb);
        if (dy && dy!=='-' && dy!=='--') m.divYield = parseFloat(dy);
        if (m.pe && m.pe>0) m.eps = price / m.pe;
        if (m.divYield) m.div = price * m.divYield / 100;
        if (nm) m.name = nm;
        // TPEX 額外財務數據
        const shares = row.OutstandingShares || row['流通股數'];
        if (shares && !isNaN(shares)) m.marketCap = price * parseFloat(shares);
        const roe = row.ROE || row['淨資產報酬率'];
        if (roe && roe!=='-') m.roe = parseFloat(roe);
        const gm = row.GrossMargin || row['毛利率'];
        if (gm && gm!=='-') m.grossMargin = parseFloat(gm);
      }
    }

    // quoteSummary 資料（美股直連，台股上櫃走proxy也可能取到）
    // TWSE/TPEX 已有的數值優先保留，summary 只補充缺少的欄位
    if (summaryResult) {
      const pr=summaryResult.price||{}, sd=summaryResult.summaryDetail||{}, ks=summaryResult.defaultKeyStatistics||{}, fd=summaryResult.financialData||{};
      // 名稱：summary 有中文名時優先用
      const sName = raw2(pr.shortName)||raw2(pr.longName)||'';
      if (sName && (!m.name || m.name===ticker)) m.name = sName;
      // 產業：summary 補充（從多個位置查找）
      if (!m.sector) m.sector = raw2(pr.sector) || raw2(pr.quoteType) || raw2(sd.sector) || '';
      if (!m.industry) m.industry = raw2(pr.industry) || raw2(sd.industry) || '';
      m.quoteType = m.quoteType||raw2(pr.quoteType)||'';
      // 財務資料：TWSE/TPEX 已有的不覆蓋
      if (!m.pe) m.pe = raw2(sd.trailingPE)||raw2(pr.trailingPE);
      if (!m.pb) m.pb = raw2(sd.priceToBook)||raw2(ks.priceToBook);

  ${kdv?tc2('KD (9日)','K='+f(kdv.k,1)+' D='+f(kdv.d,1),kdv.k<20?'🔴 超賣K<20（反彈訊號）':kdv.k>80?'🟢 超買K>80（注意反轉）':'中性區間',kdv.k<20?'sb':kdv.k>80?'ss':'sn2'):''}
  ${bl?tc2('布林通道 (20日)',f(bl.upper)+'~'+f(bl.lower),price>bl.upper?'觸上軌（超買注意）':price<bl.lower?'觸下軌（超賣反彈）':'帶寬'+f(bl.bw*100,1)+'%'+(bl.bw<0.08?'（壓縮蓄勢）':''),price>bl.upper?'ss':price<bl.lower?'sb':'sn2'):''}
  ${ma5v&&ma20v?tc2('均線排列',price>ma5v&&ma5v>ma20v?'多頭排列':price<ma5v&&ma5v<ma20v?'空頭排列':'糾結整理',price>ma5v&&ma5v>ma20v?'▲ 強勢多頭排列':price<ma20v?'▼ 弱勢空頭排列':'MA線糾結等方向',price>ma5v&&ma5v>ma20v?'sb':price<ma20v?'ss':'sn2'):''}
  <div class="tc"><div class="tl">距52週區間位置</div><div class="tv">${pct52}</div><div class="ts sn2">0%=年低 / 100%=年高</div></div>

// 方案 B：監視官方產業數據同步狀態
async function monitorIndustrySync() {
  const statusEl = document.getElementById('initStatus');
  const iconEl = document.getElementById('syncIcon');

  // 等待初始同步完成
  let attempts = 0;
  while (COMPANY_INDUSTRY_MAP.size === 0 && attempts < 30) {
    await new Promise(r => setTimeout(r, 500));
    attempts++;
  }

  if (COMPANY_INDUSTRY_MAP.size > 0) {
    iconEl.textContent = '✅';
    statusEl.style.color = '#28a745';
    statusEl.textContent = `✅ 已同步 ${COMPANY_INDUSTRY_MAP.size} 家企業 (${lastIndustrySync ? lastIndustrySync.toLocaleTimeString() : '初始化中'})`;
    statusEl.style.display = 'block';
    setTimeout(() => statusEl.style.display = 'none', 5000);
  } else {
    iconEl.textContent = '⚠️';
    statusEl.style.color = '#f0ad4e';
    statusEl.textContent = '⚠️ 使用本地備援方案';
    statusEl.style.display = 'block';
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', monitorIndustrySync);
} else {
  monitorIndustrySync();
}
</script>

<script>
async function loadDailyReport() {
  try {
    let container = document.getElementById('market-report');
    if (!container) return;

    let reportData = null;
    try {
      const timestamp = new Date().getTime();
      const response = await fetch(`./daily-report.json?t=${timestamp}`, { cache: 'no-store' });
      if (response.ok) {
        reportData = await response.json();
      } else {
        throw new Error(`HTTP ${response.status}`);
      }
    } catch (error) {
      console.error('[財金早報] 加載外部數據失敗:', error.message);
      throw error;
    }

    if (!reportData) throw new Error('無法解析數據');
    renderMarketReport(reportData);
  } catch (error) {
    console.error('[財金早報] 載入失敗:', error.message);
    const container = document.getElementById('market-report');
    if (container) {
      container.innerHTML = `<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:16px;color:#991b1b;"><strong>❌ 財金早報數據載入失敗</strong><br><span style="font-size:0.85rem;">錯誤：${error.message}</span><br><span style="font-size:0.75rem;">請清除快取並刷新頁面</span></div>`;
    }
  }
}

      ${(data.news || []).map(n => `
