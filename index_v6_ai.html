<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 股票智能分析工具 v8.11.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--muted:#666;--border:#ddd;--accent:#2563eb;--al:#eff6ff;--green:#16a34a;--red:#dc2626;--yel:#d97706;--sbg:#f9fafb;--grad1:#2563eb;--grad2:#1d4ed8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg, #f8f9ff 0%, #fff 100%);color:var(--text);font-size:15px;line-height:1.75}
.wrap{max-width:880px;margin:0 auto;padding:24px 16px 60px}

.header{background:linear-gradient(135deg, var(--grad1) 0%, var(--grad2) 100%);border-radius:16px;padding:32px 28px;margin-bottom:28px;color:#fff;box-shadow:0 10px 30px rgba(37, 99, 235, 0.15);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;right:-10%;width:200px;height:200px;background:rgba(255,255,255,0.1);border-radius:50%;z-index:0}
.header-content{position:relative;z-index:1}
h1{font-size:2rem;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
.vsub{font-size:.75rem;font-weight:600;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:12px;vertical-align:middle;margin-left:12px;border:1px solid rgba(255,255,255,0.3);backdrop-filter:blur(10px)}
.sub{color:rgba(255,255,255,0.85);font-size:.95rem;margin-bottom:0;line-height:1.6}

.sec{margin-bottom:28px}
.st2{font-size:1.1rem;font-weight:700;border-left:4px solid;padding-left:12px;margin-bottom:16px;display:flex;align-items:center;gap:8px}

@media(max-width:768px){
  h1{font-size:1.6rem}
}

@media(max-width:480px){
  .header{padding:20px 16px}
  h1{font-size:1.4rem}
}

.hidden{display:none!important}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="wrap">
<div id="app-header"></div>
<script src="shared-header.js"></script>
<script>
renderAppHeader({
  containerSelector: '#app-header',
  activeTab: 'report',
  icon: '🤖',
  title: '股票智能分析工具',
  version: '8.11.0',
  subtitle: '基於 4 層 AI 分析：財務評分 × 估值模型 × 技術指標 × 企業診斷',
  showProgress: false
});
</script>


<!-- ═══════════════════════════════════════════════════════════ -->
<!-- 財金早報 - 市場數據展示 -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="market-report" style="margin-bottom:28px;"></div>


</div>

<script>
// ═══════════════════════════════════════════════════════════
// 財金早報 - 市場數據加載與展示
// ═══════════════════════════════════════════════════════════

async function loadDailyReport() {
  try {
    console.log('[財金早報] 開始載入數據...');

    // 確保容器存在
    let container = document.getElementById('market-report');
    if (!container) {
      console.warn('[財金早報] 容器不存在，等待 100ms 後重試');
      await new Promise(resolve => setTimeout(resolve, 100));
      container = document.getElementById('market-report');
    }

    if (!container) {
      throw new Error('market-report 容器不存在');
    }

    let reportData = null;

    // 嘗試從相對路徑加載
    try {
      const timestamp = new Date().getTime();
      console.log('[財金早報] 嘗試加載 daily-report.json...');
      const response = await fetch(`./daily-report.json?t=${timestamp}`, {
        cache: 'no-store'
      });

      if (response.ok) {
        reportData = await response.json();
        console.log('[財金早報] 成功加載外部數據，版本:', reportData.version);
      } else {
        console.warn('[財金早報] HTTP 狀態:', response.status);
        throw new Error(`HTTP ${response.status}`);
      }
    } catch (error) {
      console.error('[財金早報] 加載外部數據失敗:', error.message);
      throw error;
    }

    if (!reportData) {
      throw new Error('無法解析數據');
    }

    renderMarketReport(reportData);
    console.log('[財金早報] 數據載入成功');
  } catch (error) {
    console.error('[財金早報] 載入失敗:', error.message);
    // 顯示詳細錯誤提示
    const container = document.getElementById('market-report');
    if (container) {
      container.innerHTML = `<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:16px;color:#991b1b;"><strong>❌ 財金早報數據載入失敗</strong><br><span style="font-size:0.85rem;">錯誤：${error.message}</span><br><span style="font-size:0.75rem;">請清除快取並刷新頁面</span></div>`;
    }
  }
}

// 註：先前此處有 loadGitHubToken()，會要求使用者輸入 GitHub PAT 並存進 localStorage，已移除。
// 原因：(1) 手機上跳出輸入 token 的 prompt 體驗差
//      (2) 將具 repo 寫入權的 token 存在瀏覽器前端並不安全
//      (3) 資料已由 GitHub Actions 排程每日自動更新，不需由前端觸發

function renderMarketReport(data) {
  const container = document.getElementById('market-report');
  if (!container) return;

  const html = `
    <!-- 標題區 -->
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
        <div style="flex:1;">
          <h2 style="margin:0;font-size:1.3rem;font-weight:800;color:#1a1a1a;">📊 每日財金早報</h2>
          <p style="margin:8px 0 0;color:#666;font-size:0.95rem;">${data.date}</p>
          <p style="margin:4px 0 0;color:#999;font-size:0.85rem;">資料基準：${data.basedOn}</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
          <div style="font-size:0.75rem;background:#eef2ff;color:#4f46e5;font-weight:600;padding:8px 12px;border-radius:6px;">
            ${data.riskDashboard.rating}
          </div>
        </div>
      </div>
    </div>

    <!-- 市場概況 -->
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:20px;">
      <h3 style="margin:0 0 16px;font-size:1.1rem;font-weight:700;border-bottom:2px solid #4f46e5;padding-bottom:8px;">🌍 全球市場概況</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;">
        ${(data.markets || []).map(market => `
          <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;">
            <div style="font-weight:700;margin-bottom:8px;font-size:1rem;">${market.name}</div>
            <div style="font-size:0.9rem;color:#444;margin-bottom:10px;line-height:1.8;">
              ${(market.items || []).map(item => `<div>▸ ${item}</div>`).join('')}
            </div>
            <div style="font-size:0.8rem;color:#666;border-top:1px solid #e5e7eb;padding-top:8px;line-height:1.6;">
              💡 ${market.analysis}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- 風險指標儀表板 -->
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:20px;">
      <h3 style="margin:0 0 16px;font-size:1.1rem;font-weight:700;border-bottom:2px solid #d97706;padding-bottom:8px;">⚠️ 市場風險指標儀表板</h3>
      <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:12px;margin-bottom:16px;font-size:0.9rem;">
        <strong>${data.riskDashboard.rating}</strong> | ${data.riskDashboard.summary}
      </div>
      ${(data.riskDashboard.layers || []).map(layer => `
        <div style="margin-bottom:20px;border-left:4px solid #4f46e5;padding-left:16px;">
          <h4 style="margin:0;font-size:1rem;font-weight:700;">【第${layer.number}層】${layer.name}</h4>
          <p style="margin:4px 0;font-size:0.85rem;color:#666;">📌 ${layer.question}</p>
          <div style="margin-top:12px;">
            ${(layer.indicators || []).map(ind => `
              <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:10px;margin-bottom:8px;font-size:0.85rem;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                  <div style="flex:1;">
                    <strong>${ind.name}</strong><br>
                    <span style="color:#666;">現值：${ind.current}</span><br>
                    <span style="color:#888;font-size:0.8rem;">${ind.statusText}</span>
                  </div>
                  <div style="font-size:1.2rem;">${ind.status}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <!-- 綜合研判 -->
    <div style="background:linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);border:1px solid #fca5a5;border-radius:12px;padding:16px;margin-bottom:20px;">
      <h3 style="margin:0 0 12px;font-size:1rem;font-weight:700;color:#7f1d1d;">【綜合研判】</h3>
      <p style="margin:0;font-size:0.9rem;color:#5f2121;line-height:1.8;">${data.synthesis}</p>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #fca5a5;font-size:0.85rem;color:#7f1d1d;font-weight:600;">
        📌 最關鍵觀察指標：${(data.keyObservations || []).map(o => `（${o.number}）${o.title}`).join('；')}
      </div>
    </div>

    <!-- 重要新聞 -->
    <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:20px;">
      <h3 style="margin:0 0 16px;font-size:1.1rem;font-weight:700;border-bottom:2px solid #059669;padding-bottom:8px;">【📰 重要新聞】</h3>
      ${(data.news || []).map(n => `
        <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #e5e7eb;">
          <div style="font-weight:700;margin-bottom:6px;">• ${n.title}</div>
          <div style="font-size:0.9rem;color:#666;line-height:1.6;">${n.description}</div>
        </div>
      `).join('')}
    </div>

    <!-- 今日觀察 -->
    <div style="background:#dbeafe;border:1px solid #93c5fd;border-radius:12px;padding:20px;margin-bottom:20px;">
      <h3 style="margin:0 0 16px;font-size:1.1rem;font-weight:700;color:#1e40af;border-bottom:2px solid #3b82f6;padding-bottom:8px;">【💡 今日觀察】</h3>
      ${(data.observations || []).map(o => `
        <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #93c5fd;">
          <div style="font-weight:700;margin-bottom:6px;color:#1e40af;">${o.emoji} ${o.title}</div>
          <div style="font-size:0.9rem;color:#0c4a6e;line-height:1.6;">${o.content}</div>
        </div>
      `).join('')}
    </div>

    <!-- 免責聲明 -->
    <div style="background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;padding:12px;font-size:0.85rem;color:#666;text-align:center;">
      ${data.disclaimer}
    </div>
  `;

  container.innerHTML = html;
}

// 頁面加載時自動載入財金早報
document.addEventListener('DOMContentLoaded', loadDailyReport);
</script>

</body>
</html>
