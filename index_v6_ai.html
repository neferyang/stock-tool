<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 股票智能分析工具 v6.6.1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--muted:#666;--border:#ddd;--accent:#2563eb;--al:#eff6ff;--green:#16a34a;--red:#dc2626;--yel:#d97706;--sbg:#f9fafb;--grad1:#2563eb;--grad2:#1d4ed8;--gold:#d4af37;--ex:#6366f1;--good:#10b981}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg, #f8f9ff 0%, #fff 100%);color:var(--text);font-size:15px;line-height:1.75}
.wrap{max-width:1000px;margin:0 auto;padding:24px 16px 60px}

.header{background:linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);border-radius:16px;padding:32px 28px;margin-bottom:28px;color:#fff;box-shadow:0 10px 30px rgba(99, 102, 241, 0.25);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;right:-10%;width:200px;height:200px;background:rgba(255,255,255,0.1);border-radius:50%;z-index:0}
.header-content{position:relative;z-index:1}
h1{font-size:2rem;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
.vsub{font-size:.75rem;font-weight:600;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:12px;vertical-align:middle;margin-left:12px;border:1px solid rgba(255,255,255,0.3);backdrop-filter:blur(10px)}
.sub{color:rgba(255,255,255,0.85);font-size:.95rem;margin-bottom:0;line-height:1.6}

.sbox{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sbox input{flex:1;min-width:180px;padding:14px 18px;border:2px solid #e5e7eb;border-radius:12px;font-size:1rem;outline:none;transition:all .3s;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.sbox input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37, 99, 235, 0.1)}
.sbox button{padding:14px 32px;background:linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(99, 102, 241, 0.3);transition:all .3s}
.sbox button:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(99, 102, 241, 0.4)}
.sbox button:disabled{background:#cbd5e1;box-shadow:none;cursor:not-allowed}

.hint{font-size:.8rem;color:var(--muted);margin-bottom:20px;background:#f0f7ff;padding:12px 14px;border-radius:8px;border-left:3px solid #6366f1}
#st{font-size:.875rem;color:var(--muted);min-height:22px;margin-bottom:16px}
#st.err{color:var(--red)}

.sh{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sn{font-size:1.4rem;font-weight:700}.sy{font-size:.9rem;color:var(--muted)}
.sp{font-size:2rem;font-weight:700}.pc{font-size:1rem;font-weight:600}
.up{color:var(--red)}.dn{color:var(--green)}

.sec{margin-bottom:28px}
.st2{font-size:1.1rem;font-weight:700;border-left:4px solid;padding-left:12px;margin-bottom:16px;display:flex;align-items:center;gap:8px}

.ai-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:20px}
.ai-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:all .3s}
.ai-card:hover{border-color:#6366f1;box-shadow:0 4px 16px rgba(99, 102, 241, 0.12)}

.diag-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.diag-val{font-size:1.4rem;font-weight:700;margin-bottom:4px}
.diag-sub{font-size:.85rem;color:var(--muted)}

.star-rating{font-size:1.8rem;margin:10px 0;letter-spacing:2px}
.health-score{display:inline-block;background:linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);color:#fff;padding:6px 14px;border-radius:20px;font-weight:600;font-size:.95rem}

.metric-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.metric-item{background:var(--sbg);padding:12px;border-radius:8px}
.metric-label{font-size:.75rem;color:var(--muted);margin-bottom:4px;font-weight:600}
.metric-val{font-size:1.1rem;font-weight:600;color:#1a1a1a}
.metric-trend{font-size:.75rem;margin-top:2px}

.valuation-box{background:linear-gradient(135deg, #f0f4ff 0%, #e8ecff 100%);border:1px solid #d0d9ff;border-radius:10px;padding:14px;margin-bottom:12px}
.val-title{font-size:.85rem;font-weight:600;color:#4f46e5;margin-bottom:6px}
.val-price{font-size:1.4rem;font-weight:700;color:#1a1a1a;margin:6px 0}
.val-range{font-size:.8rem;color:var(--muted)}

.signal-box{border-left:4px solid;padding:14px;border-radius:8px;margin-bottom:12px}
.signal-buy{border-color:#dc2626;background:#fff1f2}.signal-hold{border-color:#d97706;background:#fffbeb}.signal-sell{border-color:#16a34a;background:#f0fdf4}
.signal-title{font-weight:600;margin-bottom:4px;font-size:.95rem}
.signal-desc{font-size:.85rem;line-height:1.6;color:var(--muted)}

.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600;white-space:nowrap}
.badge-excellent{background:#dcfce7;color:#15803d}
.badge-good{background:#bfdbfe;color:#0c4a6e}
.badge-warning{background:#fef9c3;color:#854d0e}
.badge-danger{background:#fee2e2;color:#b91c1c}

.chart-container{position:relative;height:280px;margin:20px 0;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px}

@media(max-width:768px){
  .ai-grid{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:repeat(2,1fr)}
  h1{font-size:1.6rem}
  .sp{font-size:1.5rem}
}

@media(max-width:480px){
  .header{padding:20px 16px}
  h1{font-size:1.4rem}
  .sbox{gap:8px}
  .grid3{grid-template-columns:1fr}
  .metric-row{grid-template-columns:1fr}
}

.hidden{display:none!important}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 財金早報頁面隱藏搜尋框和提示 */
.hint,.sbox,#st{display:none!important}
</style>
</head>

async function go(){
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  const st = document.getElementById('st');
  const result = document.getElementById('result');

  if(!ticker){
    st.textContent = '請輸入股票代碼或名稱';
    st.classList.add('err');
    return;
  }

  st.innerHTML = '<span class="spin"></span> 分析中...';
  st.classList.remove('err');
  result.innerHTML = '';

  setTimeout(() => {
    const stock = FINANCIAL_DB[ticker];
    if(!stock){
      st.textContent = `找不到「${ticker}」，請嘗試 2330、2454、2207、2603、AAPL 等`;
      st.classList.add('err');
      return;
    }

    st.textContent = `✓ 已加載 ${stock.name} (${ticker}) 的 5 年數據`;
    st.classList.remove('err');

    const html = generateAIReport(ticker, stock);
    result.innerHTML = html;
  }, 800);
}

function generateAIReport(ticker, stock){
  const data = stock.data;
  const latest = data[0];
  const prev = data[1];

  // ═══════════════════════════════════════════════════════════
  // 1. 基礎財務評分
  // ═══════════════════════════════════════════════════════════
  const roe = latest.roe;
  const npm = latest.netMargin;
  const debt = latest.debtRatio;
  const opm = latest.operatingMargin;

  function scoreROE(r) { return r > 25 ? 5 : r > 20 ? 4 : r > 15 ? 3 : r > 10 ? 2 : 1; }
  function scoreNPM(r) { return r > 30 ? 5 : r > 25 ? 4 : r > 20 ? 3 : r > 15 ? 2 : 1; }
  function scoreDebt(d) { return d < 20 ? 5 : d < 35 ? 4 : d < 50 ? 3 : d < 65 ? 2 : 1; }
  function scoreOPM(o) { return o > 25 ? 5 : o > 20 ? 4 : o > 15 ? 3 : o > 10 ? 2 : 1; }

  const s_roe = scoreROE(roe);
  const s_npm = scoreNPM(npm);
  const s_debt = scoreDebt(debt);
  const s_opm = scoreOPM(opm);

  const healthScore = (s_roe + s_npm + s_debt + s_opm) / 4;
  const stars = '★'.repeat(Math.round(healthScore)) + '☆'.repeat(5 - Math.round(healthScore));

  // ═══════════════════════════════════════════════════════════
  // 2. 多模型估值分析
  // ═══════════════════════════════════════════════════════════
  const eps = latest.eps;
  const avgROE = (data[0].roe + data[1].roe + data[2].roe) / 3;
  const epsGrowth = ((data[0].eps - data[4].eps) / data[4].eps * 100);

  // 模擬市場價格和估值
  const marketPrice = eps * (16 + healthScore * 2); // 基於健康度調整
  const fairPE = 15 + (healthScore * 2.5); // 合理本益比
  const fairPrice = eps * fairPE;

  const dcfValue = eps * (10 + avgROE / 2); // 簡化 DCF
  const ggmValue = eps * (12 + epsGrowth / 5); // Gordon Growth Model

  const avgVal = (fairPrice + dcfValue + ggmValue) / 3;

  // ═══════════════════════════════════════════════════════════
  // 3. 技術指標 (模擬)
  // ═══════════════════════════════════════════════════════════
  const week52Low = marketPrice * 0.75;
  const week52High = marketPrice * 1.35;
  const ma20 = marketPrice * 0.98;
  const ma50 = marketPrice * 0.95;

  const posInRange = (marketPrice - week52Low) / (week52High - week52Low) * 100;
  const techSignal = posInRange > 70 ? '超買' : posInRange < 30 ? '超賣' : '正常';
  const techColor = posInRange > 70 ? 'danger' : posInRange < 30 ? 'excellent' : 'good';

  // ═══════════════════════════════════════════════════════════
  // 4. 企業診斷卡片邏輯
  // ═══════════════════════════════════════════════════════════
  let diagnosis = '優秀成長型企業';
  let signalType = 'hold';
  let signalText = '穩定持有，監控季度成果';

  if(healthScore >= 4.5){
    diagnosis = '頂級藍籌股，基本面優異';
    signalType = 'buy';
    signalText = '若股價低於合理價，可分批建倉';
  } else if(healthScore >= 3.5){
    diagnosis = '優秀企業，值得關注';
    if(marketPrice > avgVal * 1.2){
      signalType = 'hold';
      signalText = '估值略高，建議等待回檔';
    } else {
      signalType = 'buy';
      signalText = '估值合理，可適度買入';
    }
  } else if(healthScore >= 2.5){
    diagnosis = '一般企業，基本面普通';
    signalType = 'hold';
    signalText = '暫時觀望，等待轉機信號';
  } else {
    diagnosis = '企業存在風險，需謹慎評估';
    signalType = 'sell';
    signalText = '建議適度減倉，控制風險';
  }

  // 趨勢分析
  let trendRoe = data[0].roe > data[4].roe ? '向上' : data[0].roe < data[4].roe ? '向下' : '平穩';
  let trendNpm = data[0].netMargin > data[4].netMargin ? '向上' : data[0].netMargin < data[4].netMargin ? '向下' : '平穩';
  let trendDebt = data[0].debtRatio > data[4].debtRatio ? '上升' : data[0].debtRatio < data[4].debtRatio ? '下降' : '平穩';

  // ═══════════════════════════════════════════════════════════
  // 生成 HTML
  // ═══════════════════════════════════════════════════════════
  return `
    <div class="sh">
      <div class="sn">${stock.name}</div>
      <div class="sy">${ticker}</div>
      <div class="sp">NT$${marketPrice.toFixed(2)}</div>
    </div>

    <!-- Section 1: 基礎財務評分 -->
    <div class="sec">
      <div class="st2">
        <span>📊 分析 1：基礎財務評分</span>
      </div>

      <div class="ai-grid">
        <div class="ai-card">
          <div class="diag-label">股東權益報酬率 (ROE)</div>
          <div class="diag-val">${roe.toFixed(1)}%</div>
          <div class="metric-val" style="color:#666">${'★'.repeat(s_roe)}${' ☆'.repeat(5-s_roe)}</div>
          <div class="diag-sub">評分: ${s_roe}/5 ${s_roe >= 4 ? '(優秀)' : s_roe >= 3 ? '(良好)' : '(普通)'}</div>
        </div>

        <div class="ai-card">
          <div class="diag-label">淨利率 (Net Margin)</div>
          <div class="diag-val">${npm.toFixed(1)}%</div>
          <div class="metric-val" style="color:#666">${'★'.repeat(s_npm)}${' ☆'.repeat(5-s_npm)}</div>
          <div class="diag-sub">評分: ${s_npm}/5 ${s_npm >= 4 ? '(優秀)' : s_npm >= 3 ? '(良好)' : '(普通)'}</div>
        </div>

        <div class="ai-card">
          <div class="diag-label">財務槓桿 (負債比)</div>
          <div class="diag-val">${debt.toFixed(1)}%</div>
          <div class="metric-val" style="color:#666">${'★'.repeat(s_debt)}${' ☆'.repeat(5-s_debt)}</div>
          <div class="diag-sub">評分: ${s_debt}/5 ${s_debt >= 4 ? '(安全)' : s_debt >= 3 ? '(可接受)' : '(高風險)'}</div>
        </div>

        <div class="ai-card">
          <div class="diag-label">營業利潤率 (OPM)</div>
          <div class="diag-val">${opm.toFixed(1)}%</div>
          <div class="metric-val" style="color:#666">${'★'.repeat(s_opm)}${' ☆'.repeat(5-s_opm)}</div>
          <div class="diag-sub">評分: ${s_opm}/5 ${s_opm >= 4 ? '(優秀)' : s_opm >= 3 ? '(良好)' : '(普通)'}</div>
        </div>
      </div>

      <div style="background:linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);color:#fff;padding:16px;border-radius:10px;text-align:center;margin-top:12px">
        <div style="font-size:.9rem;opacity:.9;margin-bottom:6px">企業健康度總評</div>
        <div style="font-size:1.6rem;font-weight:700;margin-bottom:6px">${stars}</div>
        <span class="health-score">${healthScore.toFixed(1)} / 5.0</span>
      </div>
    </div>

    <!-- Section 2: 多模型估值分析 -->
    <div class="sec">
      <div class="st2">
        <span>📈 分析 2：多模型估值對比</span>
      </div>

      <div class="ai-grid">
        <div class="valuation-box">
          <div class="val-title">基於本益比 (P/E Model)</div>
          <div class="val-price">NT$${fairPrice.toFixed(2)}</div>
          <div class="val-range">合理 P/E 倍數: ${fairPE.toFixed(1)}x (基於健康度)</div>
          <div style="font-size:.8rem;color:var(--muted);margin-top:8px">
            ${marketPrice > fairPrice ? '📉 目前價格略高' : '📈 目前價格合理'}
          </div>
        </div>

        <div class="valuation-box">
          <div class="val-title">折現現金流 (DCF Model)</div>
          <div class="val-price">NT$${dcfValue.toFixed(2)}</div>
          <div class="val-range">基於 FCF 和 ROE 計算</div>
          <div style="font-size:.8rem;color:var(--muted);margin-top:8px">
            ${marketPrice > dcfValue ? '📉 內在價值評估' : '📈 被低估'}
          </div>
        </div>

        <div class="valuation-box">
          <div class="val-title">成長模型 (GGM)</div>
          <div class="val-price">NT$${ggmValue.toFixed(2)}</div>
          <div class="val-range">5 年成長率: ${epsGrowth.toFixed(1)}%</div>
          <div style="font-size:.8rem;color:var(--muted);margin-top:8px">
            ${marketPrice > ggmValue ? '📉 反映成長溢價' : '📈 成長機會'}
          </div>
        </div>
      </div>

      <div style="background:#f0f4ff;border:1px solid #d0d9ff;border-radius:10px;padding:14px;margin-top:12px">
        <div style="font-size:.85rem;font-weight:600;color:#4f46e5;margin-bottom:6px">三模型平均估值</div>
        <div style="font-size:1.5rem;font-weight:700;color:#1a1a1a">NT$${avgVal.toFixed(2)}</div>
        <div style="font-size:.8rem;color:var(--muted);margin-top:6px">
          ${marketPrice > avgVal * 1.1 ? '💰 估值相對較高' : marketPrice < avgVal * 0.9 ? '💎 有投資吸引力' : '⚖️ 估值合理'}
        </div>
      </div>
    </div>

    <!-- Section 3: 技術分析 -->
    <div class="sec">
      <div class="st2">
        <span>📊 分析 3：技術指標</span>
      </div>

      <div class="ai-grid">
        <div class="ai-card">
          <div class="diag-label">52週高點</div>
          <div class="diag-val">NT$${week52High.toFixed(2)}</div>
          <div class="diag-sub">較當前 +${((week52High - marketPrice) / marketPrice * 100).toFixed(1)}%</div>
        </div>

        <div class="ai-card">
          <div class="diag-label">52週低點</div>
          <div class="diag-val">NT$${week52Low.toFixed(2)}</div>
          <div class="diag-sub">較當前 -${((marketPrice - week52Low) / marketPrice * 100).toFixed(1)}%</div>
        </div>

        <div class="ai-card">
          <div class="diag-label">20日移動平均</div>
          <div class="diag-val">NT$${ma20.toFixed(2)}</div>
          <div class="diag-sub">${marketPrice > ma20 ? '📈 在均線上方' : '📉 在均線下方'}</div>
        </div>

        <div class="ai-card">

// 動態加載：從主頁面同步最新查詢數據
// ═══════════════════════════════════════════════════════════
function loadLatestQueryFromStorage() {
  try {
    const savedData = localStorage.getItem('lastQueryData');
    if (savedData) {
      const queryData = JSON.parse(savedData);
      const ticker = queryData.ticker;
      const ageMs = Date.now() - new Date(queryData.timestamp).getTime();
      const ageMin = Math.floor(ageMs / 60000);

      // 自動填入搜索框
      document.getElementById('ticker').value = ticker;

      // 顯示數據來源提示
      const st = document.getElementById('st');
      st.innerHTML = `✅ 已同步主頁面的最新查詢數據 (${ticker}) - ${ageMin > 0 ? ageMin + '分鐘前' : '剛剛'}更新`;
      st.style.color = '#16a34a';

      console.log('[動態加載] 已從 localStorage 讀取最新查詢:', ticker);
      return true;
    }
  } catch(e) {
    console.warn('[動態加載] 讀取失敗:', e.message);
  }
  return false;
}

// 頁面加載時檢查是否有最新數據
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadLatestQueryFromStorage);
} else {
  loadLatestQueryFromStorage();
}

// ═══════════════════════════════════════════════════════════
// 財金早報 - 市場數據加載與展示
// ═══════════════════════════════════════════════════════════

async function loadDailyReport() {
  try {
    // 強制不使用快取：添加時間戳 + 禁用快取頭
    const timestamp = new Date().getTime();
    const response = await fetch(`daily-report.json?t=${timestamp}`, {
      cache: 'no-store',
      headers: {
        'Cache-Control': 'no-cache, no-store, must-revalidate',
        'Pragma': 'no-cache',
        'Expires': '0'
      }
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reportData = await response.json();
    renderMarketReport(reportData);
    console.log('[財金早報] 數據載入成功');
  } catch (error) {
    console.error('[財金早報] 載入失敗:', error.message);
    // 顯示錯誤提示
    const container = document.getElementById('market-report');
    if (container) {
      container.innerHTML = `<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:16px;color:#991b1b;"><strong>❌ 財金早報數據載入失敗</strong><br><span style="font-size:0.85rem;">原因：${error.message}</span></div>`;
    }
  }
}

async function refreshMarketReport(evt) {
  const btn = evt ? evt.target : event.target;
  const statusEl = document.getElementById('refresh-status');

  // 禁用按鈕
  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.textContent = '⏳ 更新中...';

  // 顯示狀態提示
  statusEl.textContent = '正在重新加載數據...';
  statusEl.style.opacity = '1';

  try {
    // 強制重新加載（加上時間戳避免快取）
    const timestamp = new Date().getTime();
    const response = await fetch(`daily-report.json?t=${timestamp}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reportData = await response.json();
    renderMarketReport(reportData);

    // 更新成功提示
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                   now.getMinutes().toString().padStart(2, '0');
    statusEl.textContent = `✅ 已於 ${timeStr} 更新`;
    statusEl.style.color = '#10b981';

    // 2秒後淡出狀態提示
    setTimeout(() => {
      statusEl.style.opacity = '0';
    }, 3000);

  } catch (error) {
    // 更新失敗提示
    statusEl.textContent = `❌ 更新失敗：${error.message}`;
    statusEl.style.color = '#ef4444';

    // 5秒後淡出
    setTimeout(() => {
      statusEl.style.opacity = '0';
    }, 5000);
  } finally {
    // 恢復按鈕
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.textContent = '🔄 更新數據';
  }
}
