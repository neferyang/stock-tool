name: 排程補跑監控

# GitHub Actions 的 cron 排程在平台負載高時可能延遲甚至整次跳過（官方已知限制，
# 尤其整點/偶數小時最容易撞上全球排隊尖峰）。這支workflow每20分鐘檢查一次
# 其他4個排程各自「上次成功執行距今多久」，超過各自允許的最大間隔就用
# workflow_dispatch補觸發，把誤點時間壓在20分鐘內，不用去猜GitHub什麼時候會delay。

on:
  schedule:
    - cron: '7,27,37,47 * * * *'   # 錯開整點/半點，避免自己也撞上GitHub排隊尖峰；多加:37是為了讓
                                    # update-financial-data(預期每小時:17觸發)能在逾期20分鐘內被抓到
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查各排程是否逾期，逾期就補觸發
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          check_and_trigger() {
            local file="$1"
            local max_age_hours="$2"
            local last_run
            last_run=$(gh api "repos/$REPO/actions/workflows/$file/runs?per_page=1&status=completed" \
              --jq '.workflow_runs[0].created_at' 2>/dev/null)

            if [ -z "$last_run" ] || [ "$last_run" = "null" ]; then
              echo "⚠️ $file 查無執行紀錄，略過"
              return
            fi

            local last_ts now_ts age_hours
            last_ts=$(date -d "$last_run" +%s)
            now_ts=$(date +%s)
            age_hours=$(( (now_ts - last_ts) / 3600 ))
            echo "$file：上次執行 $last_run（$age_hours 小時前，門檻 $max_age_hours 小時）"

            if [ "$age_hours" -ge "$max_age_hours" ]; then
              echo "🔁 $file 已逾期，觸發補跑"
              gh workflow run "$file" --repo "$REPO"
            fi
          }

          # update-financial-data.yml 是每小時排程(cron '17 1-23 * * *')，用「距上次執行幾小時」
          # 這種粗粒度門檻抓不到「這次:17沒觸發」，逾期要等滿3小時才補，太鬆。改用「本UTC小時的
          # 預期觸發時間(HH:17)過了20分鐘寬限、且這小時內查無任何執行紀錄」才補跑，且天然只會補一次
          # （一補上就會查到本小時的紀錄），不會跟延遲到達的原生排程疊加超過FinMind每小時額度。
          check_hourly_financial_catchup() {
            local file="update-financial-data.yml"
            local cur_hour cur_min now_ts expected_ts due_ts recent
            cur_hour=$(date -u +%H)
            cur_min=$(date -u +%M)

            if [ "$cur_hour" = "00" ]; then
              echo "$file：UTC 0點排程本身就跳過，不檢查"
              return
            fi

            now_ts=$(date -u +%s)
            expected_ts=$(date -u -d "$(date -u +%Y-%m-%d) ${cur_hour}:17:00" +%s)
            due_ts=$(( expected_ts + 20*60 ))

            if [ "$now_ts" -lt "$due_ts" ]; then
              echo "$file：本小時(UTC ${cur_hour}:17)預期觸發時間+20分鐘寬限未到，略過"
              return
            fi

            recent=$(gh api "repos/$REPO/actions/workflows/$file/runs?per_page=5" \
              --jq '.workflow_runs[] | select(.created_at >= "'"$(date -u -d "$(date -u +%Y-%m-%d) ${cur_hour}:00:00" +%Y-%m-%dT%H:%M:%SZ)"'") | .created_at' 2>/dev/null)

            if [ -n "$recent" ]; then
              echo "$file：本小時已有執行紀錄，略過"
              return
            fi

            echo "🔁 $file 本小時(UTC ${cur_hour}:17)逾20分鐘未觸發，補跑"
            gh workflow run "$file" --repo "$REPO"
          }

          # 門檻需對齊各排程實際cron頻率，2026-07-22排程對調(auto-expand改1天1次、
          # update-financial-data改每小時1次)後這裡曾忘記同步更新，導致
          # auto-expand用舊的3小時門檻誤判「逾期」而被重複補跑、白耗FinMind額度。
          check_and_trigger "auto-expand-stocks.yml" 26
          check_hourly_financial_catchup
          check_and_trigger "daily-report-update.yml" 14
          check_and_trigger "mops_crawler.yml" 192
