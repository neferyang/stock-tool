name: MOPS 爬蟲 - 定期更新 EPS 數據

on:
  # 定時運行：每週一早晨 6:00 UTC (台灣時間 14:00)
  schedule:
    - cron: '0 6 * * 1'

  # 手動觸發
  workflow_dispatch:

jobs:
  crawl-mops:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 設置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 運行 MOPS 爬蟲
        run: |
          cd crawler
          python mops_crawler.py
          ls -lah mops_2026_data.json

      - name: 驗證數據
        run: |
          cd crawler
          python -c "
          import json
          with open('mops_2026_data.json', 'r') as f:
              data = json.load(f)
          success = sum(1 for r in data.values() if not r.get('error'))
          print(f'✓ 爬蟲成功: {success}/{len(data)}')
          "

      - name: 提交數據
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add crawler/mops_2026_data.json
          git commit -m "更新：MOPS 2026 年度 EPS 數據 ($(date '+%Y-%m-%d %H:%M:%S'))" || true
          git push

      - name: 發送通知
        if: always()
        run: |
          echo "✓ MOPS 爬蟲運行完成"
          echo "時間: $(date)"
