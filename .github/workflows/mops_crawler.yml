name: MOPS 爬蟲 - 定期更新 EPS 數據

on:
  # 定時運行：每週一早晨 6:00 UTC (台灣時間 14:00)
  schedule:
    - cron: '0 6 * * 1'

  # 手動觸發
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-mops:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 運行 MOPS 爬蟲(備援/交叉驗證來源)
        run: |
          python fetch-mops-financials.py

      - name: 驗證數據
        run: |
          if [ -f financial-data-mops.json ]; then
            echo "✓ MOPS 數據文件已生成"
            python -c "
import json
with open('financial-data-mops.json', 'r', encoding='utf-8') as f:
    data = json.load(f)
stocks = data.get('stocks', {})
print(f'✓ 爬蟲成功: {len(stocks)} 支股票有資料')
"
          else
            echo "⚠ 未生成 MOPS 數據文件"
          fi

      - name: 合併進 FINANCIAL_DB 備援
        run: |
          python merge-financial-data.py

      - name: 提交數據
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add financial-data-mops.json index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "無變更"
          else
            git commit -m "chore: MOPS 備援數據更新 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          fi

      - name: 發送通知
        if: always()
        run: |
          echo "✓ MOPS 爬蟲運行完成"
          echo "時間: $(date)"
