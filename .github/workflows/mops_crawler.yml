name: 官方財報交叉驗證 - TWSE/TPEx OpenAPI

on:
  # 每週一早晨 6:00 UTC (台灣時間 14:00)
  # 2026-07-16：原本打 mops.twse.com.tw/mops/api 被反爬蟲阻擋（連續失敗超過
  # 1個月），改用 TWSE/TPEx OpenAPI 批次資料集重寫（見 fetch-mops-financials.py）
  schedule:
    - cron: '0 6 * * 1'

  # 手動觸發
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-mops:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 抓取 TWSE/TPEx 官方財報（交叉驗證來源）
        run: |
          python fetch-mops-financials.py

      - name: 驗證數據
        run: |
          if [ -f financial-data-mops.json ]; then
            echo "✓ 資料檔已生成"
            python -c "import json; d=json.load(open('financial-data-mops.json',encoding='utf-8')); print(f'✓ 取得 {len(d.get(\"stocks\",{}))} 支股票全年度資料')"
          else
            echo "⚠ 未生成資料檔"
          fi

      - name: 合併進 FINANCIAL_DB 備援
        run: |
          python merge-financial-data.py

      - name: 提交數據
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add financial-data-mops.json index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "無變更"
          else
            git commit -m "chore: 官方財報交叉驗證資料更新 ($(date '+%Y-%m-%d %H:%M:%S'))"
            for i in 1 2 3 4 5; do
              git push && break
              echo "push被拒絕(遠端有新commit)，pull --rebase後重試 ($i/5)..."
              git pull --rebase origin main
              sleep $((i * 5))
            done
          fi

      - name: 發送通知
        if: always()
        run: |
          echo "✓ 官方財報交叉驗證運行完成"
          echo "時間: $(date)"
