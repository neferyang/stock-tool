name: MOPS 爬蟲 - 定期更新 EPS 數據

on:
  # 排程已停用（2026-07-16）：MOPS 官方 API 持續回應空值/逾時，判斷是對
  # GitHub Actions 的 IP 做了反爬蟲阻擋，自 6/8 起排程執行僅成功過1次。
  # 主要資料源 FinMind（update-financial-data.yml）運作正常不受影響，
  # 此腳本原本只是備援/交叉驗證來源。之後若有更好的繞過方案再重新啟用。
  # schedule:
  #   - cron: '0 6 * * 1'

  # 手動觸發（保留，可隨時測試是否恢復）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-mops:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 運行 MOPS 爬蟲(備援/交叉驗證來源)
        run: |
          python fetch-mops-financials.py

      - name: 驗證數據
        run: |
          if [ -f financial-data-mops.json ]; then
            echo "✓ MOPS 數據文件已生成"
            python -c "import json; d=json.load(open('financial-data-mops.json',encoding='utf-8')); print(f'✓ 爬蟲成功: {len(d.get(\"stocks\",{}))} 支股票有資料')"
          else
            echo "⚠ 未生成 MOPS 數據文件"
          fi

      - name: 合併進 FINANCIAL_DB 備援
        run: |
          python merge-financial-data.py

      - name: 提交數據
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add financial-data-mops.json index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "無變更"
          else
            git commit -m "chore: MOPS 備援數據更新 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push
          fi

      - name: 發送通知
        if: always()
        run: |
          echo "✓ MOPS 爬蟲運行完成"
          echo "時間: $(date)"
