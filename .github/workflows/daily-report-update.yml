name: Daily Financial Report Update

on:
  # 每日台北時間 06:00 (UTC 22:00)
  schedule:
    - cron: '0 22 * * *'

  # 允許手動觸發
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run daily report update script
        run: node update-daily-report.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 檢查是否有更改
          if git diff --quiet daily-report.json; then
            echo "No changes to commit"
          else
            git add daily-report.json
            git commit -m "🔄 Daily report auto-update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
