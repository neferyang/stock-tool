name: Daily Financial Report Update

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run update script
        run: |
          echo "🚀 執行更新腳本..."
          node update-daily-report.js
          echo "✅ 腳本執行完成"

      - name: Check changes
        run: |
          echo "📋 檢查文件狀態..."
          git status
          git diff daily-report.json | head -50

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          if git diff --quiet daily-report.json; then
            echo "✅ 沒有變更"
            exit 0
          fi

          echo "📝 提交變更..."
          git add daily-report.json
          git commit -m "🔄 自動更新: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          echo "🚀 推送到 GitHub..."
          git push https://github-actions[bot]:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main

          echo "✅ 推送完成"
