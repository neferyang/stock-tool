name: Daily Financial Report Update

on:
  # 每日 UTC 22:00 觸發 (台北時間 06:00)
  schedule:
    - cron: '0 22 * * *'
    # 備用：每日 UTC 14:00 (台北時間 22:00)
    - cron: '0 14 * * *'

  # 允許手動觸發
  workflow_dispatch:

  # 允許從其他工作流觸發
  workflow_call:

# 【關鍵】賦予工作流推送權限
permissions:
  contents: write
  pull-requests: read

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run daily report update script
        run: node update-daily-report.js
        continue-on-error: true
        timeout-minutes: 5

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "✅ Git 已配置"

      - name: Validate daily-report.json
        run: |
          if [ ! -f daily-report.json ]; then
            echo "❌ daily-report.json 不存在！"
            exit 1
          fi

          if ! python3 -m json.tool daily-report.json > /dev/null 2>&1; then
            echo "❌ daily-report.json JSON 格式錯誤！"
            exit 1
          fi

          echo "✅ JSON 驗證成功"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 檢查是否有更改
          if git diff --quiet daily-report.json; then
            echo "✅ 沒有新的更改，跳過提交"
            exit 0
          fi

          echo "📝 發現更改，準備提交..."
          git add daily-report.json
          git commit -m "🔄 財金早報自動更新: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || true

          # 設置認證 URL
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # 重試推送
          for i in {1..3}; do
            echo "🚀 嘗試推送 (${i}/3)..."
            if git push; then
              echo "✅ 推送成功"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              sleep 2
            fi
          done

          echo "❌ 推送失敗"
          exit 1
        continue-on-error: false
