name: Daily Financial Report Update

on:
  # 每日 UTC 22:00 觸發 (台北時間 06:00)
  schedule:
    - cron: '0 22 * * *'
    # 備用：每日 UTC 14:00 (台北時間 22:00)
    - cron: '0 14 * * *'

  # 允許手動觸發
  workflow_dispatch:

  # 允許從其他工作流觸發
  workflow_call:

# 【關鍵】賦予工作流推送權限
permissions:
  contents: write
  pull-requests: read

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run daily report update script
        run: node update-daily-report.js
        continue-on-error: true
        timeout-minutes: 5

      - name: Validate daily-report.json
        run: |
          if [ ! -f daily-report.json ]; then
            echo "❌ daily-report.json 不存在！"
            exit 1
          fi

          if ! python3 -m json.tool daily-report.json > /dev/null 2>&1; then
            echo "❌ daily-report.json JSON 格式錯誤！"
            exit 1
          fi

          echo "✅ JSON 驗證成功"

      - name: Commit and push changes
        run: |
          echo "📋 檢查 git 狀態..."
          git status
          echo ""

          # 檢查是否有更改
          if git diff --quiet daily-report.json; then
            echo "✅ 沒有新的更改，跳過提交"
            exit 0
          fi

          echo "📝 發現更改，準備提交..."
          git diff daily-report.json | head -20

          # 配置 git
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          echo "✅ Git 已配置"

          # 添加並提交
          git add daily-report.json
          echo "✅ 文件已添加"

          git commit -m "🔄 財金早報自動更新: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "✅ 提交已創建"

          # 檢查遠程配置
          echo "🔗 遠程配置："
          git remote -v

          # 推送
          echo "🚀 準備推送..."
          git push -v origin HEAD:main 2>&1

          echo "✅ 推送完成"
        continue-on-error: false
