name: Daily Financial Report Update

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run update script
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TWSE_API_KEY: ${{ secrets.TWSE_API_KEY }}
        run: node update-daily-report.js

      - name: Commit and Push via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          echo "🚀 檢查文件變更..."

          # 獲取當前文件 SHA
          CURRENT_SHA=$(git rev-parse HEAD:daily-report.json 2>/dev/null || echo "")
          echo "Current SHA: $CURRENT_SHA"

          # 獲取新文件內容（base64 編碼）
          NEW_CONTENT=$(base64 -w 0 daily-report.json)

          # 檢查是否有變更
          if [ -z "$CURRENT_SHA" ]; then
            echo "❌ 無法獲取文件 SHA"
            exit 1
          fi

          # 使用 GitHub API 更新文件
          echo "📝 使用 GitHub API 更新文件..."

          RESPONSE=$(curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/contents/daily-report.json" \
            -d "{
              \"message\": \"🔄 自動更新: $(date -u +'%Y-%m-%d %H:%M:%S UTC')\",
              \"content\": \"$NEW_CONTENT\",
              \"branch\": \"$BRANCH\",
              \"sha\": \"$CURRENT_SHA\",
              \"committer\": {
                \"name\": \"github-actions[bot]\",
                \"email\": \"github-actions[bot]@users.noreply.github.com\"
              }
            }")

          echo "API Response:"
          echo "$RESPONSE" | jq '.' || echo "$RESPONSE"

          # 檢查是否成功
          if echo "$RESPONSE" | grep -q '"sha"'; then
            echo "✅ 文件已成功更新"
          else
            echo "⚠️ API 響應異常，可能沒有變更或已經推送"
          fi
