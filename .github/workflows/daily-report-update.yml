name: Daily Financial Report Update

on:
  schedule:
    - cron: '0 22 * * *'   # 台北 06:00（美股收盤後 2hr，亞洲開盤前）
    - cron: '0 21 * * *'   # 台北 05:00（美股收盤後 1hr = 最早可拿到當日美股收盤）
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pytz

      - name: Fetch market indices
        run: python fetch-market-data.py

      - name: Generate market analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate-market-analysis.py

      - name: Generate news and highlights
        run: python generate-news-highlights.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update daily report
        run: node update-daily-report.js

      - name: Generate config with token
        env:
          GITHUB_TOKEN_CONFIG: ${{ secrets.GITHUB_TOKEN_CONFIG }}
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime

          config = {
            "token": """${{ secrets.GITHUB_TOKEN_CONFIG }}""",
            "generatedAt": datetime.utcnow().isoformat() + "Z",
            "source": "github-actions"
          }

          with open('github-config.json', 'w') as f:
            json.dump(config, f, indent=2)

          print("✅ 已生成 github-config.json")
          EOF

      - name: Push via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          CURRENT_SHA=$(git rev-parse HEAD:daily-report.json 2>/dev/null || echo "")
          if [ -z "$CURRENT_SHA" ]; then
            echo "❌ 無法獲取 SHA"
            exit 1
          fi

          NEW_CONTENT=$(base64 -w 0 daily-report.json)

          RESPONSE=$(curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/contents/daily-report.json" \
            -d "{
              \"message\": \"🔄 自動更新: $(date -u +'%Y-%m-%d %H:%M:%S UTC')\",
              \"content\": \"$NEW_CONTENT\",
              \"branch\": \"$BRANCH\",
              \"sha\": \"$CURRENT_SHA\",
              \"committer\": {
                \"name\": \"github-actions[bot]\",
                \"email\": \"github-actions[bot]@users.noreply.github.com\"
              }
            }")

          echo "$RESPONSE" | python3 -c "import json,sys; r=json.load(sys.stdin); print('✅ 已更新:', r.get('content',{}).get('sha','?')[:8])" 2>/dev/null || echo "$RESPONSE"

      - name: Push config with token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          CURRENT_SHA=$(git rev-parse HEAD:github-config.json 2>/dev/null || echo "")
          NEW_CONTENT=$(base64 -w 0 github-config.json)

          if [ -z "$CURRENT_SHA" ]; then
            # 新建文件
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/contents/github-config.json" \
              -d "{
                \"message\": \"🔑 更新 GitHub 配置\",
                \"content\": \"$NEW_CONTENT\",
                \"branch\": \"$BRANCH\",
                \"committer\": {
                  \"name\": \"github-actions[bot]\",
                  \"email\": \"github-actions[bot]@users.noreply.github.com\"
                }
              }" > /dev/null
          else
            # 更新現有文件
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/contents/github-config.json" \
              -d "{
                \"message\": \"🔑 更新 GitHub 配置\",
                \"content\": \"$NEW_CONTENT\",
                \"branch\": \"$BRANCH\",
                \"sha\": \"$CURRENT_SHA\",
                \"committer\": {
                  \"name\": \"github-actions[bot]\",
                  \"email\": \"github-actions[bot]@users.noreply.github.com\"
                }
              }" > /dev/null
          fi

          echo "✅ 配置已推送"
