name: Daily Financial Report Update

on:
  # 每日 UTC 22:00 觸發 (台北時間 06:00)
  schedule:
    - cron: '0 22 * * *'
    # 備用：每日 UTC 14:00 (台北時間 22:00)
    - cron: '0 14 * * *'

  # 允許手動觸發
  workflow_dispatch:

  # 允許從其他工作流觸發
  workflow_call:

# 【關鍵】賦予工作流推送權限
permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run daily report update script
        run: node update-daily-report.js
        continue-on-error: true
        timeout-minutes: 5

      - name: Validate daily-report.json
        run: |
          if [ ! -f daily-report.json ]; then
            echo "❌ daily-report.json 不存在！"
            exit 1
          fi

          if ! python3 -m json.tool daily-report.json > /dev/null 2>&1; then
            echo "❌ daily-report.json JSON 格式錯誤！"
            exit 1
          fi

          echo "✅ JSON 驗證成功"

      - name: Auto commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 財金早報自動更新: ${{ github.event.head_commit.timestamp }}"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: daily-report.json
          status_options: '--porcelain'
          skip_dirty_check: false
          create_branch: false
