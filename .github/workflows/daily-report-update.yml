name: Daily Financial Report Update

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance

      - name: Fetch market indices
        run: python fetch-market-data.py

      - name: Generate market analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate-market-analysis.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update daily report
        run: node update-daily-report.js

      - name: Push via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          CURRENT_SHA=$(git rev-parse HEAD:daily-report.json 2>/dev/null || echo "")
          if [ -z "$CURRENT_SHA" ]; then
            echo "❌ 無法獲取 SHA"
            exit 1
          fi

          NEW_CONTENT=$(base64 -w 0 daily-report.json)

          RESPONSE=$(curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/contents/daily-report.json" \
            -d "{
              \"message\": \"🔄 自動更新: $(date -u +'%Y-%m-%d %H:%M:%S UTC')\",
              \"content\": \"$NEW_CONTENT\",
              \"branch\": \"$BRANCH\",
              \"sha\": \"$CURRENT_SHA\",
              \"committer\": {
                \"name\": \"github-actions[bot]\",
                \"email\": \"github-actions[bot]@users.noreply.github.com\"
              }
            }")

          echo "$RESPONSE" | python3 -c "import json,sys; r=json.load(sys.stdin); print('✅ 已更新:', r.get('content',{}).get('sha','?')[:8])" 2>/dev/null || echo "$RESPONSE"
