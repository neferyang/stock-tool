name: Quarterly Financial Data Update

on:
  # 每季首日凌晨 6:00（台北時間）執行
  # Q1: 2/1, Q2: 5/1, Q3: 8/1, Q4: 11/1
  schedule:
    - cron: '0 22 1 2,5,8,11 *'  # UTC 22:00 = 台北時間 6:00（下一日）

  # 允許手動觸發
  workflow_dispatch:
    inputs:
      stocks:
        description: '股票代號，以逗號分隔（如 2330,2207,3030）'
        required: false
        default: '2330,2207,3030,1101,2603,2201'

permissions:
  contents: write

jobs:
  update-quarterly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml urllib3

      - name: Fetch quarterly financial data
        id: fetch
        run: |
          python3 fetch-mops-financials.py
          echo "status=completed" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check if data was updated
        run: |
          if [ -f "financial-data-mops.json" ]; then
            echo "✅ 成功獲取財報數據"
            cat financial-data-mops.json | head -20
          else
            echo "⚠️ 自動抓取失敗，請手動更新 financial-data-template.json"
          fi

      - name: Merge financial data to index.html
        run: |
          python3 merge-financial-data.py
        continue-on-error: true

      - name: Commit and push if changes exist
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"

          # 檢查是否有變更
          if git diff --quiet; then
            echo "ℹ️ 無數據變更"
          else
            echo "🔄 發現變更，準備提交..."
            git add index.html financial-data-template.json financial-data-mops.json 2>/dev/null || true

            # 獲取季度信息
            MONTH=$(date -u +'%m')
            if [ "$MONTH" = "02" ]; then
              QUARTER="Q1"
            elif [ "$MONTH" = "05" ]; then
              QUARTER="Q2"
            elif [ "$MONTH" = "08" ]; then
              QUARTER="Q3"
            else
              QUARTER="Q4"
            fi

            git commit -m "🔄 自動更新: 2026年 $QUARTER 季度財報數據 ($(date -u +'%Y-%m-%d'))"
            git push
            echo "✅ 已推送更新"
          fi

      - name: Create issue if update failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 季度財報自動更新失敗',
              body: `
              自動財報更新工作流執行失敗。

              **需要手動操作：**
              1. 編輯 \`financial-data-template.json\` 填入最新季度財報
              2. 運行 \`python3 merge-financial-data.py\`
              3. 提交並推送變更

              詳見：[FINANCIAL-DATA-UPDATE-GUIDE.md](./FINANCIAL-DATA-UPDATE-GUIDE.md)
              `,
              labels: ['財報數據', 'manual-action']
            })
