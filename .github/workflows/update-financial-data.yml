name: Update Financial Data Daily

on:
  schedule:
    # 改為每 2 小時執行一次(UTC 奇數小時 03~23，一天11次)，加速當季財報追更速度。
    # 刻意避開 UTC 00:00(auto-expand-stocks.yml 排程，需300次額度)前後，
    # 免得同一小時內 540+300=840 次超出 FinMind 免費版 600次/hr 上限
    - cron: '17 3-23/2 * * *'
  workflow_dispatch:  # 支持手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許推送到倉庫

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Fetch Financial Data from FinMind API
        run: |
          python finmind-data-fetcher.py
        env:
          PYTHONIOENCODING: utf-8
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: Check if Data Changed
        id: check_changes
        run: |
          if git diff --quiet financial-data-complete.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data has been updated"
          fi

      - name: Commit and Push Changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add financial-data-complete.json
          git commit -m "chore: auto update financial data from FinMind API ($(date '+%Y-%m-%d %H:%M:%S'))"
          for i in 1 2 3 4 5; do
            git push origin main && break
            echo "Push 被拒絕(遠端有新commit)，以本地新資料為主 merge 後重試 ($i/5)..."
            git fetch origin main
            git merge -X ours origin/main --no-edit
            sleep $((i * 5))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: financial-data-output
          path: financial-data-complete.json
          retention-days: 7

      - name: Create Workflow Summary
        if: always()
        run: |
          echo "## 📊 Financial Data Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f financial-data-complete.json ]; then
            STOCK_COUNT=$(grep -o '"[0-9]\{4\}":' financial-data-complete.json | wc -l)
            echo "**Stocks in DB**: $STOCK_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
