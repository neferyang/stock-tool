name: Update Financial Data Daily

on:
  schedule:
    # 每天午夜 00:00 UTC (台北時間 08:00) 運行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許推送到倉庫

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Financial Data from FinMind API
        run: |
          python update_financial_data.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Check if Data Changed
        id: check_changes
        run: |
          if git diff --quiet financial_db_output.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data has been updated"
          fi

      - name: Commit and Push Changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add financial_db_output.js financial_db_output.json
          git commit -m "chore: auto update financial data from FinMind API ($(date '+%Y-%m-%d %H:%M:%S'))"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: financial-data-output
          path: |
            financial_db_output.js
            financial_db_output.json
          retention-days: 7

      - name: Create Workflow Summary
        if: always()
        run: |
          echo "## 📊 Financial Data Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f financial_db_output.json ]; then
            STOCK_COUNT=$(grep -o '"[0-9]\{4\}":' financial_db_output.json | wc -l)
            echo "**Stocks Updated**: $STOCK_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
