name: Update Financial Data Daily

on:
  schedule:
    # 每小時一次，跳過UTC 0點和1點兩小時給auto-expand-stocks.yml(00:23跑，最多300次
    # 呼叫)獨享。FinMind的api_request_limit_hour=600官方文件未講清楚是固定整點重置
    # 還是滾動60分鐘窗口(2026-07-24實測現象較符合滾動窗口)，兩小時緩衝可以涵蓋
    # auto-expand跟財報更新彼此不撞額度，不論哪種機制都安全(00:23到下次02:17間隔
    # 114分鐘，遠超60分鐘窗口)。
    - cron: '17 2-23 * * *'
  workflow_dispatch:  # 支持手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許推送到倉庫

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Fetch Financial Data from FinMind API
        run: |
          python finmind-data-fetcher.py
        env:
          PYTHONIOENCODING: utf-8
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: Check if Data Changed
        id: check_changes
        run: |
          if git diff --quiet financial-data-complete.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data has been updated"
          fi

      - name: Commit and Push Changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add financial-data-complete.json
          git commit -m "chore: auto update financial data from FinMind API ($(date '+%Y-%m-%d %H:%M:%S'))"
          for i in 1 2 3 4 5; do
            git push origin main && break
            echo "Push 被拒絕(遠端有新commit)，以本地新資料為主 merge 後重試 ($i/5)..."
            git fetch origin main
            git merge -X ours origin/main --no-edit
            sleep $((i * 5))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: financial-data-output
          path: financial-data-complete.json
          retention-days: 7

      - name: Create Workflow Summary
        if: always()
        run: |
          echo "## 📊 Financial Data Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f financial-data-complete.json ]; then
            STOCK_COUNT=$(grep -o '"[0-9]\{4\}":' financial-data-complete.json | wc -l)
            echo "**Stocks in DB**: $STOCK_COUNT" >> $GITHUB_STEP_SUMMARY
          fi
