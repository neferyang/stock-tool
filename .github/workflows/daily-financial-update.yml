name: 每日財務數據更新

on:
  schedule:
    # 每天 UTC 時間 02:00 運行 (台北時間 10:00)
    - cron: '0 2 * * *'

  # 允許手動觸發
  workflow_dispatch:

jobs:
  update-financial-data:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 設置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: 執行財務數據更新
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python finmind-data-fetcher.py

      - name: 檢查是否有變更
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 配置 Git
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: 提交更新
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          git add financial-data-complete.json
          git commit -m "chore: 每日財務數據更新 ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"

      - name: 推送更新
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

  notify-status:
    needs: update-financial-data
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 記錄更新結果
        run: |
          echo "✅ 每日財務數據更新完成"
          echo "時間: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "狀態: ${{ job.status }}"
