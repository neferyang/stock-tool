<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票估價分析工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--muted:#666;--border:#ddd;--accent:#2563eb;--al:#eff6ff;--green:#16a34a;--red:#dc2626;--yel:#d97706;--sbg:#f9fafb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.75}
.container{max-width:860px;margin:0 auto;padding:24px 16px 60px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:.875rem;margin-bottom:24px}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px;cursor:pointer}
.tab-btn{padding:12px 20px;background:none;border:none;color:var(--muted);font-size:.95rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}
.sbox{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sbox input{flex:1;min-width:160px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:1rem;outline:none;transition:border-color .2s}
.sbox input:focus{border-color:var(--accent)}
.sbox button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
.sbox button:hover{background:#1d4ed8}
.sbox button:disabled{background:#93c5fd;cursor:not-allowed}
.hint{font-size:.8rem;color:var(--muted);margin-bottom:20px}
#status{font-size:.875rem;color:var(--muted);min-height:22px;margin-bottom:16px}
#status.err{color:var(--red)}
.sh{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sname{font-size:1.4rem;font-weight:700}.ssym{font-size:.9rem;color:var(--muted)}
.sprice{font-size:2rem;font-weight:700}.pchg{font-size:1rem;font-weight:600}
.up{color:var(--red)}.down{color:var(--green)}
.itag{background:var(--al);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.sec{margin-bottom:28px}
.stitle{font-size:1rem;font-weight:700;border-left:3px solid var(--accent);padding-left:10px;margin-bottom:14px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.sc{background:var(--sbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.sl{font-size:.75rem;color:var(--muted)}.sv{font-size:1.05rem;font-weight:600}
.vtable{width:100%;border-collapse:collapse;font-size:.9rem}
.vtable th,.vtable td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
.vtable th{background:var(--sbg);font-weight:600;font-size:.8rem;color:var(--muted)}
.vtable tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600;white-space:nowrap}
.bl{background:#dcfce7;color:#15803d}.bf{background:#fef9c3;color:#854d0e}.bh{background:#fee2e2;color:#b91c1c}.bn{background:#f3f4f6;color:#6b7280}
.verd{border-radius:10px;padding:16px 20px;margin-bottom:28px;border-left:4px solid}
.verd.buy{border-color:var(--red);background:#fff1f2}
.verd.hold{border-color:var(--yel);background:#fffbeb}
.verd.sell{border-color:var(--green);background:#f0fdf4}
.vt{font-weight:700;font-size:1.1rem;margin-bottom:6px}.vb{font-size:.875rem;line-height:1.8}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.tc{background:var(--sbg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.tl{font-size:.75rem;color:var(--muted);margin-bottom:2px}
.tv{font-size:1rem;font-weight:600}.ts{font-size:.75rem;margin-top:2px}
.sbuy{color:var(--red)}.ssell{color:var(--green)}.sneut{color:var(--yel)}
.cwrap{position:relative;height:260px;margin-bottom:8px}
.pbtns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pbtn{padding:4px 12px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;cursor:pointer;background:#fff}
.pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.warn-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:12px 16px;font-size:.85rem;margin-bottom:16px;color:#78350f}
@media(max-width:480px){.sgrid{grid-template-columns:repeat(2,1fr)}.tgrid{grid-template-columns:repeat(2,1fr)}.sprice{font-size:1.5rem}.vtable{font-size:.8rem}.vtable th,.vtable td{padding:7px 8px}.tabs{flex-wrap:wrap}.tab-btn{padding:10px 14px;font-size:.85rem}}
</style>
</head>
<body>
<div class="container">
<h1>📊 財務分析平台</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('stock',this)">📈 股票估價工具</button>
  <button class="tab-btn" onclick="switchTab('report',this)">📡 財金早報</button>
</div>

<!-- 股票估價分頁 -->
<div id="stock-tab" class="tab-content">
  <p class="subtitle">支援台股（數字代號如 2330）、美股（如 AAPL）、ETF（如 0050、SPY）。資料即時來源：Yahoo Finance</p>

  <div class="sbox">
    <input type="text" id="ti" placeholder="輸入代號，如 2330、AAPL、0050、SPY" autocomplete="off" autocapitalize="characters"/>
    <button id="btn" onclick="go()">分析</button>
  </div>
  <p class="hint">台股輸入4~6位數字（自動加.TW）；美股直接英文代號；按 Enter 也可查詢。<br>
  範例：2330 台積電｜2317 鴻海｜0050 元大台灣50｜AAPL｜TSLA｜SPY</p>

  <div id="status"></div>
  <div id="result" class="hidden"></div>
</div>

<!-- 財金早報分頁 -->
<div id="report-tab" class="tab-content hidden">
  <p class="subtitle">📊 2026年6月15日 市場風險指標儀表板</p>
  <div id="report-content" style="overflow-y:auto;max-height:80vh"></div>
</div>

</div>

<script>
// ─────────────────────────────────────────────
// Tab switching & report data
// ─────────────────────────────────────────────
function switchTab(tabName, btn) {
  // 隱藏所有內容
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

  // 顯示選中分頁
  document.getElementById(tabName + '-tab').classList.remove('hidden');
  btn.classList.add('active');

  // 如果是早報，生成報告
  if (tabName === 'report') {
    renderFinancialReport();
  }
}

// ─────────────────────────────────────────────
// Yahoo Finance API helper
// 策略：直接從瀏覽器呼叫 Yahoo Finance（不需 proxy）
// Yahoo 2024 後要求 crumb，先取得後才能打 quoteSummary
// ─────────────────────────────────────────────
let yfCrumb = null;
let yfCookieReady = false;

async function initYF() {
  if (yfCrumb) return true;
  try {
    // Step 1: Visit Yahoo Finance to get session cookie
    await fetch('https://finance.yahoo.com/', {
      credentials: 'include',
      mode: 'no-cors'  // just to set cookie
    });
    // Step 2: Get crumb
    const r = await fetch('https://query1.finance.yahoo.com/v1/test/getcrumb', {
      credentials: 'include',
      headers: { 'User-Agent': 'Mozilla/5.0' }
    });
    if (r.ok) {
      yfCrumb = await r.text();
      yfCookieReady = true;
      return true;
    }
  } catch(e) {}
  return false;
}

// 備援：改用 Yahoo Finance 的 v8 chart endpoint（不需 crumb）
// 以及 v7 quote endpoint
async function fetchQuote(ticker) {
  // 方法1: v7/finance/quote（通常不需 crumb）
  const url1 = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,marketCap,trailingPE,forwardPE,priceToBook,dividendYield,dividendRate,trailingEps,forwardEps,bookValue,fiftyTwoWeekLow,fiftyTwoWeekHigh,beta,returnOnEquity,grossMargins,debtToEquity,pegRatio,enterpriseToEbitda,shortName,longName,sector,industry,quoteType`;
  try {
    const r = await fetch(url1, {
      credentials: 'include',
      headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36', 'Accept': 'application/json' }
    });
    if (r.ok) {
      const d = await r.json();
      const q = d?.quoteResponse?.result?.[0];
      if (q) return { source: 'v7', data: q };
    }
  } catch(e) {}

  // 方法2: 加 crumb 打 quoteSummary
  if (!yfCrumb) await initYF();
  const crumbParam = yfCrumb ? `&crumb=${encodeURIComponent(yfCrumb)}` : '';
  const url2 = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=summaryDetail,financialData,defaultKeyStatistics,price${crumbParam}`;
  try {
    const r = await fetch(url2, {
      credentials: 'include',
      headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)' }
    });
    if (r.ok) {
      const d = await r.json();
      const rr = d?.quoteSummary?.result?.[0];
      if (rr) return { source: 'summary', data: rr };
    }
  } catch(e) {}

  // 方法3: 備援 proxy（最後手段）
  const proxies = [
    'https://corsproxy.io/?',
    'https://thingproxy.freeboard.io/fetch/',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  for (const px of proxies) {
    try {
      const r = await fetch(px + encodeURIComponent(url1), { signal: AbortSignal.timeout(12000) });
      if (r.ok) {
        const d = await r.json();
        const q = d?.quoteResponse?.result?.[0];
        if (q) return { source: 'proxy', data: q };
      }
    } catch(e) {}
  }
  throw new Error('無法連接 Yahoo Finance，請稍後再試');
}

async function fetchChart(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=2y`;
  // 直連
  try {
    const r = await fetch(url, {
      credentials: 'include',
      headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
    });
    if (r.ok) {
      const d = await r.json();
      if (d?.chart?.result?.[0]) return d.chart.result[0];
    }
  } catch(e) {}

  // 備援 proxy
  const proxies = [
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest='
  ];
  for (const px of proxies) {
    try {
      const r = await fetch(px + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
      if (r.ok) {
        const d = await r.json();
        if (d?.chart?.result?.[0]) return d.chart.result[0];
      }
    } catch(e) {}
  }
  throw new Error('無法取得歷史價格資料');
}

// 從不同來源標準化 info 物件
function normalizeInfo(source, data) {
  if (source === 'v7') {
    // v7/quote 已經是平坦結構
    return data;
  }
  // quoteSummary：合併各模組並展開 .raw
  const raw = Object.assign({}, data.summaryDetail, data.financialData, data.defaultKeyStatistics, data.price);
  const out = {};
  for (const k of Object.keys(raw)) {
    const v = raw[k];
    out[k] = (v && typeof v === 'object' && 'raw' in v) ? v.raw : v;
  }
  if (data.price) {
    out.currentPrice = data.price.regularMarketPrice?.raw ?? out.currentPrice;
    out.shortName = data.price.shortName || data.price.longName || out.shortName;
    out.sector = data.price.sector || out.sector || '';
    out.industry = data.price.industry || out.industry || '';
    out.regularMarketChange = data.price.regularMarketChange?.raw;
    out.regularMarketChangePercent = data.price.regularMarketChangePercent?.raw;
    out.quoteType = data.price.quoteType || out.quoteType;
  }
  return out;
}

// ── Utils ──────────────────────────────────
function fmt(n,d=2){if(n==null||isNaN(n)||!isFinite(n))return'N/A';return Number(n).toFixed(d);}
function fmtB(n){if(!n||isNaN(n))return'N/A';const a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2)+' T';if(a>=1e9)return(n/1e9).toFixed(2)+' B';if(a>=1e6)return(n/1e6).toFixed(2)+' M';return n.toFixed(0);}
function g(o,k){return o[k]??null;}

function classifyIndustry(i){
  const sec=(i.sector||'').toLowerCase(),ind=(i.industry||'').toLowerCase(),nm=(i.shortName||i.longName||'').toLowerCase(),qt=(i.quoteType||'').toUpperCase();
  if(qt==='ETF'||/^00\d{2,3}/.test((i.symbol||'').toUpperCase())||nm.includes('etf')||nm.includes('基金'))return'ETF';
  if(sec.includes('financial')||ind.includes('bank')||ind.includes('insurance')||nm.includes('金控')||nm.includes('銀行')||nm.includes('壽險'))return'金融保險';
  if(sec.includes('real estate')||ind.includes('reit'))return'不動產/REITs';
  if(sec.includes('utilities')||sec.includes('communication')||ind.includes('telecom')||nm.includes('電信'))return'公用事業/電信';
  if(sec.includes('energy')||ind.includes('oil')||ind.includes('mining')||ind.includes('steel')||ind.includes('shipping')||nm.includes('航運')||nm.includes('鋼鐵'))return'景氣循環/原物料';
  if(sec.includes('technology')||ind.includes('semiconductor')||ind.includes('electronic')||nm.includes('科技')||nm.includes('半導體')||nm.includes('台積')||nm.includes('聯發'))return'科技/半導體';
  if(sec.includes('healthcare')||sec.includes('biotech')||nm.includes('生技')||nm.includes('醫療')||nm.includes('藥'))return'生技/醫療';
  return'一般製造/消費';
}

// ── Technical ──────────────────────────────
function calcMA(a,n){if(!a||a.length<n)return null;return a.slice(-n).reduce((s,v)=>s+v,0)/n;}
function calcMALine(a,n){return a.map((_,i)=>{if(i<n-1)return null;return a.slice(i-n+1,i+1).reduce((s,v)=>s+v,0)/n;});}
function calcEMA(a,n){if(!a||a.length<n)return null;const k=2/(n+1);let e=a.slice(0,n).reduce((s,v)=>s+v,0)/n;for(let i=n;i<a.length;i++)e=a[i]*k+e*(1-k);return e;}
function calcRSI(a,n=14){if(!a||a.length<n+1)return null;let g=0,l=0;for(let i=a.length-n;i<a.length;i++){const d=a[i]-a[i-1];if(d>0)g+=d;else l-=d;}return 100-100/(1+(g/(l||1e-9)));}
function calcMACD(a){
  if(!a||a.length<35)return null;
  const st=Math.max(0,a.length-70);const difs=[];
  for(let i=st;i<a.length;i++){const s=a.slice(0,i+1);const e12=calcEMA(s,12);const e26=calcEMA(s,26);if(e12&&e26)difs.push(e12-e26);}
  if(difs.length<9)return null;
  const dif=difs[difs.length-1];const dea=calcEMA(difs,9);
  return{dif,dea,hist:dif-(dea||0)};
}
function calcKD(hi,lo,cl,n=9){
  if(!cl||cl.length<n)return null;
  const hh=Math.max(...hi.slice(-n));const ll=Math.min(...lo.slice(-n));
  const rsv=hh===ll?50:(cl[cl.length-1]-ll)/(hh-ll)*100;
  return{k:rsv*(2/3)+50*(1/3),d:rsv*(2/9)+50*(7/9)};
}
function calcBoll(a,n=20){
  if(!a||a.length<n)return null;
  const sl=a.slice(-n);const mid=sl.reduce((s,v)=>s+v,0)/n;
  const std=Math.sqrt(sl.reduce((s,v)=>s+(v-mid)**2,0)/n);
  return{upper:mid+2*std,mid,lower:mid-2*std,bw:(4*std)/mid};
}

// ── Valuation ──────────────────────────────
function bdg(est,cur){
  if(est==='N/A'||!cur||isNaN(parseFloat(est)))return'<span class="badge bn">資料不足</span>';
  const r=cur/parseFloat(est);
  if(r<0.88)return'<span class="badge bl">偏低 ✓</span>';
  if(r>1.15)return'<span class="badge bh">偏高 !</span>';
  return'<span class="badge bf">合理</span>';
}

function runVals(info,ind){
  const price=info.regularMarketPrice||info.currentPrice||0;
  const eps=info.epsTrailingTwelveMonths||info.trailingEps;
  const fwEps=info.epsForward||info.forwardEps;
  const bvps=info.bookValue;
  const div=info.trailingAnnualDividendRate||info.dividendRate||0;
  const pe=info.trailingPE;const fwPE=info.forwardPE;
  const pb=info.priceToBook;const peg=info.pegRatio||info.trailingPegRatio;
  const evEb=info.enterpriseToEbitda;const roe=info.returnOnEquity;
  const beta=info.beta||info.beta3Year;
  const res=[];

  if(fwEps&&fwPE){const t=fwEps*fwPE;res.push({m:'Forward P/E 目標價',d:`預估EPS ${fmt(fwEps)} × Forward P/E ${fmt(fwPE,1)}`,t:fmt(t),b:bdg(fmt(t),price)});}
  else if(eps&&pe){const t=eps*pe;res.push({m:'Trailing P/E 目標價',d:`EPS ${fmt(eps)} × P/E ${fmt(pe,1)}`,t:fmt(t),b:bdg(fmt(t),price)});}

  if(peg!=null){const s=peg<1?'<span class="badge bl">PEG < 1 低估</span>':peg<2?'<span class="badge bf">PEG 合理</span>':'<span class="badge bh">PEG > 2 偏貴</span>';res.push({m:'PEG 本益成長比',d:`PEG = ${fmt(peg)}（< 1 視為低估，適合高成長股）`,t:fmt(peg),b:s});}

  if(bvps&&pb){const fp=ind==='金融保險'?1.2:ind==='景氣循環/原物料'?1.0:2.0;const t=bvps*fp;res.push({m:'P/B 淨值估價',d:`每股淨值 ${fmt(bvps)} × 合理P/B ${fp}（目前P/B=${fmt(pb)}）`,t:fmt(t),b:bdg(fmt(t),price)});}

  if(div>0){res.push({m:'殖利率防線（5%）',d:`股利 ${fmt(div)} ÷ 5% — 機構被動買盤支撐`,t:fmt(div/0.05),b:bdg(fmt(div/0.05),price)});const d1=div*1.02;const ggm=d1/(0.06-0.02);res.push({m:'GGM 股息折現',d:`D₁=${fmt(d1)} ÷ (r=6% − g=2%)`,t:fmt(ggm),b:bdg(fmt(ggm),price)});}

  if(evEb!=null){const fair=ind==='景氣循環/原物料'?8:ind==='科技/半導體'?18:12;const s=evEb<fair*0.85?'<span class="badge bl">偏低 ✓</span>':evEb>fair*1.2?'<span class="badge bh">偏高 !</span>':'<span class="badge bf">合理</span>';res.push({m:'EV/EBITDA',d:`目前 ${fmt(evEb)}x（${ind}合理區間約 ${fair}x）`,t:fmt(evEb)+'x',b:s});}

  if(ind==='金融保險'&&bvps&&roe){const t=Math.max(bvps*(1+(roe-0.08)/0.08),bvps*0.7);res.push({m:'RIM 剩餘盈餘模型',d:`淨值 ${fmt(bvps)} × (1+(ROE${fmt(roe*100,1)}%−8%)/8%)`,t:fmt(t),b:bdg(fmt(t),price)});}

  if(fwEps&&fwEps>0){const wacc=beta?Math.min(Math.max(0.05+beta*0.045,0.07),0.14):0.09;let dcf=0,cf=fwEps;for(let i=1;i<=5;i++){cf*=1.12;dcf+=cf/Math.pow(1+wacc,i);}const tv=(cf*1.03)/(wacc-0.03);dcf+=tv/Math.pow(1+wacc,5);res.push({m:'DCF 簡化估值',d:`WACC=${fmt(wacc*100,1)}%，5年@12%成長後@3%終值`,t:fmt(dcf),b:bdg(fmt(dcf),price)});}

  return res;
}

function mkVerdict(info,vals,tech,ind){
  let bull=0,bear=0;
  vals.forEach(v=>{if(v.b.includes('偏低')||v.b.includes('< 1'))bull++;if(v.b.includes('偏高')||v.b.includes('> 2'))bear++;});
  if(tech.rsi<35)bull++;if(tech.rsi>68)bear++;
  if(tech.macdBull)bull++;if(tech.macdBear)bear++;
  if(tech.kd<25)bull++;if(tech.kd>78)bear++;
  const lo=fmt(info.fiftyTwoWeekLow),hi=fmt(info.fiftyTwoWeekHigh);
  if(bull>=2&&bull>bear)return{type:'buy',title:'🔴 估值偏低，可考慮買進或分批布局',body:`多個估值模型顯示股價低於合理價值，技術面亦出現超賣或反彈訊號。適合${ind==='ETF'?'定期定額或逢低加碼':'確認右側方向後分批建倉'}。52週低點 ${lo} 為重要支撐，請設好停損點。`};
  if(bear>=2&&bear>bull)return{type:'sell',title:'🟢 估值偏高，建議謹慎或考慮減碼',body:`多個估值模型顯示股價已超過合理估值，技術面亦有超買跡象。持有者可考慮分批減碼或設停利。52週高點 ${hi} 為強阻力，留意回落風險。`};
  return{type:'hold',title:'🟡 估值合理，持有觀望',body:`目前股價處於合理估值區間，多空訊號混合。建議持有並觀察突破方向，關注下次財報及產業動向。參考區間：${lo} ~ ${hi}。`};
}
